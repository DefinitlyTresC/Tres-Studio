<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Drift — Tres Carter</title>
<link rel="icon" href="../favicon/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   Drift — fluid study, six lenses
   Palette + type matched to tres.studio
   ════════════════════════════════════════════════ */
:root {
  --white:     #FFFFFF;
  --black:     #0A0A0A;
  --ink:       #0A0A0A;
  --ink-soft:  #6B6B6B;
  --ink-faint: #B5B5B5;
  --yellow:    #F5CB5C;
  --line:      #ECECEC;
  --display:   'Bebas Neue', sans-serif;
  --body:      'DM Sans', system-ui, -apple-system, sans-serif;
  --ease:      cubic-bezier(.2, .8, .2, 1);
  --ease-out:  cubic-bezier(.16, 1, .3, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
  background: var(--white);
  color: var(--black);
  font-family: var(--body);
  font-weight: 300;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
body { cursor: none; }
body.body-dark { background: var(--black); color: var(--white); }
@media (hover: none) { body { cursor: auto; } }

a { color: inherit; text-decoration: none; }
button {
  font: inherit;
  color: inherit;
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: inherit;
}
@media (hover: none) { button { cursor: pointer; } }

/* ─── Dot grid background (matches his site) ─── */
.dot-grid {
  position: fixed;
  inset: -80px;
  z-index: 0;
  pointer-events: none;
  background-image: radial-gradient(circle, rgba(10,10,10,0.07) 1px, transparent 1.4px);
  background-size: 32px 32px;
  transition: background-image 0.7s var(--ease), opacity 0.7s var(--ease);
}
.dot-grid.dark {
  background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1.4px);
}

/* ─── Canvas (fluid sim renders here) ─── */
#bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  background: var(--white);
  transition: background 0.7s var(--ease);
  display: block;
  touch-action: none;
}

/* ─── Top bar ─── */
.top {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 30;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.5rem clamp(1.5rem, 4vw, 3rem);
  pointer-events: none;
  mix-blend-mode: difference;
  color: var(--white);
}
.top > * { pointer-events: auto; }
.mark {
  font-family: var(--display);
  font-size: 0.95rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  transition: opacity 0.3s;
}
.mark .y { color: var(--yellow); }
.mark:hover { opacity: 0.6; }
.top-right {
  display: flex;
  align-items: center;
  gap: 1.5rem;
  font-size: 0.6rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
}
.top-right .y { color: var(--yellow); }
.adv-toggle {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid currentColor;
  border-radius: 50%;
  font-size: 1rem;
  font-family: var(--body);
  font-weight: 300;
  transition: all 0.3s var(--ease);
  padding-bottom: 2px;
}
.adv-toggle:hover {
  background: var(--yellow);
  color: var(--black);
  border-color: var(--yellow);
}
.back-link {
  font-size: 0.6rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  opacity: 0.7;
  transition: opacity 0.25s, transform 0.4s var(--ease);
}
.back-link:hover {
  opacity: 1;
  transform: translateX(-3px);
}

/* ─── Bottom bar ─── */
.bottom {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 30;
  padding: clamp(1rem, 2vw, 1.5rem) clamp(1.5rem, 4vw, 3rem) clamp(1.5rem, 3vw, 2.2rem);
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 2rem;
  pointer-events: none;
  mix-blend-mode: difference;
  color: var(--white);
}
.bottom > * { pointer-events: auto; }

.studies {
  display: flex;
  flex-wrap: wrap;
  gap: clamp(1rem, 2.6vw, 2.4rem);
  align-items: baseline;
}
.study-tab {
  font-family: var(--display);
  font-size: clamp(0.95rem, 1.4vw, 1.2rem);
  letter-spacing: 0.06em;
  padding: 0.4rem 0;
  position: relative;
  opacity: 0.38;
  transition: opacity 0.5s var(--ease);
  display: inline-flex;
  align-items: baseline;
  gap: 0.55em;
  white-space: nowrap;
}
.study-tab .n {
  font-size: 0.7em;
  opacity: 0.75;
  letter-spacing: 0.05em;
}
.study-tab:hover { opacity: 0.85; }
.study-tab.active { opacity: 1; }
.study-tab.active::before {
  content: '';
  position: absolute;
  left: -0.9em;
  top: 50%;
  transform: translateY(-50%);
  width: 0.32em;
  height: 0.32em;
  background: var(--yellow);
  border-radius: 50%;
}

.right-cluster {
  display: flex;
  align-items: center;
  gap: clamp(1rem, 2vw, 1.6rem);
}
.palette {
  display: flex;
  gap: 0.55rem;
  align-items: center;
}
.swatch {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.18);
  transition: transform 0.35s var(--ease), border-color 0.3s;
  flex-shrink: 0;
}
.swatch:hover { transform: scale(1.18); }
.swatch.active {
  transform: scale(1.3);
  border-color: var(--yellow);
}
.actions {
  display: flex;
  gap: 1.1rem;
  font-size: 0.6rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  font-weight: 400;
}
.actions button { padding: 0.3rem 0; transition: opacity 0.3s; font-weight: 400; }
.actions button:hover { opacity: 0.55; }

/* ─── Study transition overlay ─── */
.study-overlay {
  position: fixed;
  inset: 0;
  z-index: 25;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  opacity: 0;
  mix-blend-mode: difference;
  color: var(--white);
  transition: opacity 0.5s var(--ease);
}
.study-overlay.show { opacity: 1; }
.study-overlay .n {
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.4em;
  margin-bottom: 1rem;
  opacity: 0.75;
}
.study-overlay .n .y { color: var(--yellow); }
.study-overlay .name {
  font-family: var(--display);
  font-size: clamp(4rem, 14vw, 12rem);
  letter-spacing: -0.005em;
  line-height: 0.85;
  margin-bottom: 1.2rem;
}
.study-overlay .tag {
  font-size: 0.62rem;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  opacity: 0.7;
}

/* ─── Brush cursor ─── */
.brush {
  position: fixed;
  top: 0; left: 0;
  border: 1.5px solid var(--black);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.3s var(--ease), height 0.3s var(--ease),
              background 0.2s, border-color 0.3s, opacity 0.3s;
  mix-blend-mode: difference;
  border-color: var(--white);
  opacity: 0.85;
}
.brush::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  width: 4px; height: 4px;
  background: currentColor;
  color: var(--white);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.4;
}
.brush.painting {
  background: var(--yellow);
  mix-blend-mode: normal;
  opacity: 0.32;
  border-color: var(--yellow);
}
@media (hover: none) { .brush { display: none; } }

/* ─── Hint shown on first load ─── */
.hint {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  text-align: center;
  pointer-events: none;
  mix-blend-mode: difference;
  color: var(--white);
  opacity: 1;
  transition: opacity 1s var(--ease);
}
.hint.hide { opacity: 0; }
.hint .big {
  font-family: var(--display);
  font-size: clamp(3rem, 9vw, 7rem);
  letter-spacing: 0.005em;
  line-height: 0.9;
  margin-bottom: 1.2rem;
}
.hint .big .y { color: var(--yellow); }
.hint .small {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  opacity: 0.78;
  line-height: 1.9;
}
.hint kbd {
  display: inline-block;
  padding: 0.2em 0.55em;
  margin: 0 0.12em;
  border: 1px solid currentColor;
  border-radius: 4px;
  font-family: var(--body);
  font-size: 0.85em;
  letter-spacing: 0.1em;
  font-weight: 400;
}

/* ─── Advanced panel ─── */
.adv {
  position: fixed;
  top: 0; right: 0;
  width: min(380px, 90vw);
  height: 100%;
  background: rgba(255, 255, 255, 0.97);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-left: 1px solid var(--line);
  z-index: 40;
  padding: 5.5rem clamp(1.5rem, 3vw, 2.4rem) 2rem;
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.55s var(--ease);
  color: var(--black);
}
.adv.open { transform: translateX(0); }
.adv-head {
  font-family: var(--display);
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--ink-soft);
  margin-bottom: 2rem;
  border-bottom: 1px solid var(--line);
  padding-bottom: 1rem;
}
.adv-head .y { color: var(--yellow); }
.adv-row { margin-bottom: 1.3rem; }
.adv-row label {
  display: flex;
  justify-content: space-between;
  font-size: 0.55rem;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 0.35rem;
}
.adv-row label .v {
  color: var(--black);
  font-family: var(--display);
  letter-spacing: 0.06em;
}
.adv-row input[type=range] {
  width: 100%;
  accent-color: var(--yellow);
  cursor: pointer;
  height: 4px;
}
.adv-close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--black);
  border-radius: 50%;
  font-size: 0.95rem;
  color: var(--black);
  font-weight: 300;
}
.adv-close:hover { background: var(--yellow); border-color: var(--yellow); }

/* ─── Save flash ─── */
.flash {
  position: fixed;
  inset: 0;
  background: var(--yellow);
  z-index: 50;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s var(--ease);
}
.flash.go { opacity: 0.9; }

/* ─── Mobile ─── */
@media (max-width: 760px) {
  .top { padding: 1.1rem 1.2rem; }
  .top-right span { display: none; }
  .bottom {
    grid-template-columns: 1fr;
    gap: 1rem;
    padding: 1rem 1.2rem 1.3rem;
  }
  .studies {
    gap: 0.7rem 1rem;
    justify-content: flex-start;
  }
  .study-tab { font-size: 0.95rem; }
  .right-cluster { justify-content: space-between; }
  .swatch { width: 28px; height: 28px; }
  .hint .big { font-size: 3rem; }
  .hint .small { font-size: 0.55rem; letter-spacing: 0.22em; }
}
</style>
</head>
<body>

<div class="dot-grid" id="dotGrid"></div>
<canvas id="bg"></canvas>

<nav class="top">
  <a class="mark" href="../index.html">Tres Carter<span class="y">.</span></a>
  <div class="top-right">
    <a class="back-link" href="../lab.html">← Lab</a>
    <span>— Lab<span class="y"> · </span>Drift</span>
    <button class="adv-toggle" id="advOpen" aria-label="Advanced controls">+</button>
  </div>
</nav>

<div class="study-overlay" id="studyOverlay">
  <div class="n">Study<span class="y"> · </span><span id="oN">01</span></div>
  <div class="name" id="oName">DRIFT</div>
</div>

<div class="hint" id="hint">
  <div class="big">DRIFT<span class="y">.</span></div>
  <div class="small">
    Drag to paint &nbsp;·&nbsp; <kbd>1</kbd>–<kbd>6</kbd> for studies<br>
    <kbd>C</kbd> clear &nbsp;·&nbsp; <kbd>S</kbd> save &nbsp;·&nbsp; <kbd>?</kbd> controls
  </div>
</div>

<div class="bottom">
  <div class="studies" id="studies"></div>
  <div class="right-cluster">
    <div class="palette" id="palette"></div>
    <div class="actions">
      <button id="saveBtn">Save</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>
</div>

<div class="brush" id="brush" style="width: 60px; height: 60px;"></div>

<aside class="adv" id="adv">
  <button class="adv-close" id="advClose" aria-label="Close">×</button>
  <div class="adv-head">— Advanced<span class="y"> · </span>Control</div>

  <div class="adv-row">
    <label>Brush Radius <span class="v" id="vRad">0.030</span></label>
    <input id="rad" type="range" min="0.005" max="0.12" step="0.001" value="0.03">
  </div>
  <div class="adv-row">
    <label>Ink Amount <span class="v" id="vInk">0.60</span></label>
    <input id="ink" type="range" min="0.05" max="3.0" step="0.01" value="0.6">
  </div>
  <div class="adv-row">
    <label>Flow Force <span class="v" id="vForce">80</span></label>
    <input id="force" type="range" min="0" max="300" step="1" value="80">
  </div>
  <div class="adv-row">
    <label>Vorticity <span class="v" id="vVort">1.2</span></label>
    <input id="vort" type="range" min="0" max="5.0" step="0.05" value="1.2">
  </div>
  <div class="adv-row">
    <label>Dye Dissipation <span class="v" id="vDiss">0.9998</span></label>
    <input id="diss" type="range" min="0.92" max="1.0" step="0.0001" value="0.9998">
  </div>
  <div class="adv-row">
    <label>Velocity Dissipation <span class="v" id="vVdiss">0.9995</span></label>
    <input id="vdiss" type="range" min="0.92" max="1.0" step="0.0001" value="0.9995">
  </div>
  <div class="adv-row">
    <label>Bloom <span class="v" id="vBloom">0.80</span></label>
    <input id="bloom" type="range" min="0" max="3" step="0.02" value="0.8">
  </div>
  <div class="adv-row">
    <label>Saturation <span class="v" id="vSat">1.40</span></label>
    <input id="sat" type="range" min="0.6" max="2.2" step="0.02" value="1.4">
  </div>
  <div class="adv-row">
    <label>Iterations <span class="v" id="vIters">35</span></label>
    <input id="iters" type="range" min="6" max="80" step="1" value="35">
  </div>
</aside>

<div class="flash" id="flash"></div>

<script>
(() => {
'use strict';

// ════════════════════════════════════════════════
// STUDIES — six lenses
// ════════════════════════════════════════════════
const STUDIES = [
  {
    n: '01', name: 'DRIFT', tag: 'ink on still water',
    bg: '#FFFFFF', dark: false,
    palette: ['#0A0A0A','#3A3A3A','#6B6B6B','#B5B5B5','#F5CB5C'],
    p: { brush:0.045, ink:0.55, force:55, vort:0.6, diss:0.9998, vdiss:0.9995, bloom:0.18, sat:1.05, iters:35, blend:0 }
  },
  {
    n: '02', name: 'TIDE', tag: '30A in liquid form',
    bg: '#FFFFFF', dark: false,
    palette: ['#1F3A52','#487FA8','#B5D2DE','#E8D4A8','#F5CB5C'],
    p: { brush:0.05, ink:0.70, force:95, vort:1.0, diss:0.9997, vdiss:0.9993, bloom:0.45, sat:1.35, iters:30, blend:0 }
  },
  {
    n: '03', name: 'PLUME', tag: 'gold caught in updraft',
    bg: '#FFFFFF', dark: false,
    palette: ['#F5CB5C','#E5B83D','#C99A1F','#7A5C0E','#0A0A0A'],
    p: { brush:0.038, ink:0.80, force:130, vort:2.4, diss:0.9996, vdiss:0.9990, bloom:1.20, sat:1.45, iters:30, blend:0 }
  },
  {
    n: '04', name: 'MARBLE', tag: 'suminagashi · paper float',
    bg: '#F4EFE3', dark: false,
    palette: ['#0A0A0A','#8E2B2B','#1F3A52','#C99A1F','#3D5A3D'],
    p: { brush:0.028, ink:1.10, force:45, vort:0.4, diss:0.9999, vdiss:0.9996, bloom:0.08, sat:1.0, iters:40, blend:0 }
  },
  {
    n: '05', name: 'STORM', tag: 'hurricane — Atlantic basin',
    bg: '#FFFFFF', dark: false,
    palette: ['#0A0A0A','#F5CB5C','#3A3A3A','#6B6B6B','#FFFFFF'],
    p: { brush:0.05, ink:0.70, force:200, vort:3.8, diss:0.9995, vdiss:0.9988, bloom:0.45, sat:1.25, iters:25, blend:0 }
  },
  {
    n: '06', name: 'VOID', tag: 'nebula · night work',
    bg: '#0A0A0A', dark: true,
    palette: ['#F5CB5C','#FFFFFF','#FF6B6B','#27C3FF','#9F7BFF'],
    p: { brush:0.05, ink:0.95, force:110, vort:1.6, diss:0.9997, vdiss:0.9993, bloom:1.70, sat:1.55, iters:30, blend:1 }
  }
];

let currentStudy = 0;
let activeColorIdx = 0;
let hintHidden = false;

const $ = id => document.getElementById(id);
const canvas = $('bg');

function hexToRGB(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n>>16 & 255)/255, (n>>8 & 255)/255, (n & 255)/255];
}

// ════════════════════════════════════════════════
// UI rendering
// ════════════════════════════════════════════════
function renderStudies() {
  $('studies').innerHTML = STUDIES.map((s, i) =>
    `<button class="study-tab ${i===currentStudy?'active':''}" data-i="${i}"><span class="n">${s.n}</span>${s.name}</button>`
  ).join('');
  $('studies').querySelectorAll('.study-tab').forEach(b => {
    b.addEventListener('click', () => setStudy(+b.dataset.i));
  });
}

function renderPalette() {
  const s = STUDIES[currentStudy];
  $('palette').innerHTML = s.palette.map((c, i) =>
    `<span class="swatch ${i===activeColorIdx?'active':''}" data-i="${i}" style="background:${c}"></span>`
  ).join('');
  $('palette').querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      activeColorIdx = +sw.dataset.i;
      renderPalette();
    });
  });
}

function applyParams() {
  const p = STUDIES[currentStudy].p;
  $('rad').value   = p.brush; $('vRad').textContent   = p.brush.toFixed(3);
  $('ink').value   = p.ink;   $('vInk').textContent   = p.ink.toFixed(2);
  $('force').value = p.force; $('vForce').textContent = p.force;
  $('vort').value  = p.vort;  $('vVort').textContent  = p.vort.toFixed(2);
  $('diss').value  = p.diss;  $('vDiss').textContent  = p.diss.toFixed(4);
  $('vdiss').value = p.vdiss; $('vVdiss').textContent = p.vdiss.toFixed(4);
  $('bloom').value = p.bloom; $('vBloom').textContent = p.bloom.toFixed(2);
  $('sat').value   = p.sat;   $('vSat').textContent   = p.sat.toFixed(2);
  $('iters').value = p.iters; $('vIters').textContent = p.iters;
  pointer.radius = p.brush;
  updateBrushSize();
}

function setStudy(i, skipOverlay) {
  if (i === currentStudy && !skipOverlay) return;
  currentStudy = i;
  const s = STUDIES[i];
  activeColorIdx = 0;
  canvas.style.background = s.bg;
  $('dotGrid').classList.toggle('dark', s.dark);
  document.body.classList.toggle('body-dark', s.dark);
  $('brush').style.borderColor = s.dark ? '#FFFFFF' : '#0A0A0A';
  applyParams();
  renderStudies();
  renderPalette();
  // overlay
  const o = $('studyOverlay');
  $('oN').textContent = s.n;
  $('oName').textContent = s.name;
  if (!skipOverlay) {
    o.classList.add('show');
    clearTimeout(setStudy._t);
    setStudy._t = setTimeout(() => o.classList.remove('show'), 1200);
  }
  clearSim();
}

function dismissHint() {
  if (hintHidden) return;
  hintHidden = true;
  $('hint').classList.add('hide');
  setTimeout(() => $('hint').style.display = 'none', 1000);
}

// Advanced sliders → live update
['rad','ink','force','vort','diss','vdiss','bloom','sat','iters'].forEach(id => {
  $(id).addEventListener('input', () => {
    const el = $(id);
    const v = +el.value;
    const vid = 'v' + id.charAt(0).toUpperCase() + id.slice(1);
    const prec = (id==='diss'||id==='vdiss')?4 : (id==='rad')?3 : (id==='iters'||id==='force')?0 : 2;
    $(vid).textContent = prec===0 ? v.toString() : v.toFixed(prec);
    if (id === 'rad') { pointer.radius = v; updateBrushSize(); }
  });
});

// ─── Shaders ───
const VS = `#version 300 es
precision highp float;
const vec2 v[3] = vec2[3](vec2(-1,-1), vec2(3,-1), vec2(-1,3));
out vec2 uv;
void main() { vec2 p = v[gl_VertexID]; uv = 0.5*(p+1.0); gl_Position = vec4(p, 0, 1); }`;

function compile(fs) {
  const vs = gl.createShader(gl.VERTEX_SHADER);
  gl.shaderSource(vs, VS); gl.compileShader(vs);
  const f = gl.createShader(gl.FRAGMENT_SHADER);
  gl.shaderSource(f, fs); gl.compileShader(f);
  if (!gl.getShaderParameter(f, gl.COMPILE_STATUS)) console.error('FS:', gl.getShaderInfoLog(f));
  const p = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, f);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error('LINK:', gl.getProgramInfoLog(p));
  return p;
}

const CLEAR = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D T; uniform float k;
void main() { o = texture(T, uv) * k; }`;

const BRIGHT = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D T; uniform float th; uniform float sc; uniform int dark; uniform vec3 paper;
void main() {
  vec3 c = texture(T, uv).rgb;
  if (dark == 1) {
    // VOID: bg is black, dye IS the bright thing — threshold-extract bright
    o = vec4(max(c - vec3(th), 0.0) * sc, 1.0);
  } else {
    // Light studies: extract regions FAR from paper color (= ink areas).
    // Bloom emits the SATURATED chroma of the ink, so we add gentle color glow
    // around ink edges instead of brightening the whole white field.
    float dist = length(c - paper);
    float strength = smoothstep(0.15, 0.7, dist) * sc;
    // Glow color = the ink itself, but biased toward chroma not lightness
    vec3 glow = c * strength;
    o = vec4(glow, 1.0);
  }
}`;

const ADVECT = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D Vel, Src; uniform vec2 texel; uniform float dt; uniform float diss;
uniform vec3 paper; uniform int isDye;
void main() {
  vec2 v = texture(Vel, uv).xy;
  vec2 coord = uv - dt * v * texel;
  vec4 s = texture(Src, coord);
  if (isDye == 1) {
    // Dye lerps toward paper color (so paper stays paper-colored as ink fades)
    s.rgb = mix(s.rgb, paper, 1.0 - diss);
    o = s;
  } else {
    // Velocity multiplies toward zero (standard)
    o = s * diss;
  }
}`;

const DIVG = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D Vel; uniform vec2 texel;
void main() {
  float L = texture(Vel, uv - vec2(texel.x, 0)).x;
  float R = texture(Vel, uv + vec2(texel.x, 0)).x;
  float B = texture(Vel, uv - vec2(0, texel.y)).y;
  float T = texture(Vel, uv + vec2(0, texel.y)).y;
  o = vec4(0.5 * ((R-L) + (T-B)), 0, 0, 1);
}`;

const JAC = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D P, Div; uniform vec2 texel;
void main() {
  float L = texture(P, uv - vec2(texel.x, 0)).x;
  float R = texture(P, uv + vec2(texel.x, 0)).x;
  float B = texture(P, uv - vec2(0, texel.y)).x;
  float T = texture(P, uv + vec2(0, texel.y)).x;
  float d = texture(Div, uv).x;
  o = vec4((L + R + B + T - d) * 0.25, 0, 0, 1);
}`;

const GRAD = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D Vel, P; uniform vec2 texel;
void main() {
  float L = texture(P, uv - vec2(texel.x, 0)).x;
  float R = texture(P, uv + vec2(texel.x, 0)).x;
  float B = texture(P, uv - vec2(0, texel.y)).x;
  float T = texture(P, uv + vec2(0, texel.y)).x;
  vec2 v = texture(Vel, uv).xy - 0.5 * vec2(R - L, T - B);
  o = vec4(v, 0, 1);
}`;

const CURL = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D Vel; uniform vec2 texel;
void main() {
  float L = texture(Vel, uv - vec2(texel.x, 0)).y;
  float R = texture(Vel, uv + vec2(texel.x, 0)).y;
  float B = texture(Vel, uv - vec2(0, texel.y)).x;
  float T = texture(Vel, uv + vec2(0, texel.y)).x;
  o = vec4((R - L) - (T - B), 0, 0, 1);
}`;

const VORT = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D Vel, Curl; uniform vec2 texel;
uniform float dt, vort, limit;
void main() {
  float L = texture(Curl, uv - vec2(texel.x, 0)).x;
  float R = texture(Curl, uv + vec2(texel.x, 0)).x;
  float B = texture(Curl, uv - vec2(0, texel.y)).x;
  float T = texture(Curl, uv + vec2(0, texel.y)).x;
  vec2 g = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L)) + 1e-5;
  float c = texture(Curl, uv).x;
  vec2 f = vort * vec2(g.y, -g.x) * c;
  float m = length(f);
  if (m > limit) f *= limit / (m + 1e-6);
  vec2 v = texture(Vel, uv).xy + dt * f;
  o = vec4(v, 0, 1);
}`;

const SPLAT = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D T;
uniform vec2 point; uniform float radius; uniform vec3 color;
uniform vec2 force; uniform int mode; uniform float maxVel; uniform float inkGain; uniform int inkMode;
uniform vec3 paperColor; uniform int hasPaper;
void main() {
  vec4 base = texture(T, uv);
  float d = distance(uv, point);
  float fall = exp(-d*d / max(radius*radius, 1e-6));
  float a = 1.0 - exp(-fall * inkGain);
  if (mode == 0) {
    vec3 s = clamp(color, 0.0, 1.0);
    vec3 b = clamp(base.rgb, 0.0, 1.0);
    vec3 outc;
    if (inkMode == 1) {
      // Additive saturating (for VOID — dark bg)
      outc = b + s * a * (1.0 - b);
    } else {
      // Blend toward color (default for all light-bg studies)
      outc = mix(b, s, a);
    }
    o = vec4(outc, 1.0);
  } else {
    vec2 v = base.xy + force * fall;
    float m = length(v);
    if (m > maxVel) v *= maxVel / (m + 1e-6);
    o = vec4(v, 0, 1);
  }
}`;

const BLUR = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D T; uniform vec2 dir;
void main() {
  vec2 tx = 1.0 / vec2(textureSize(T, 0));
  float w[5] = float[5](0.227027, 0.316216, 0.070270, 0.010381, 0.004);
  vec3 s = w[0] * texture(T, uv).rgb;
  for (int i = 1; i < 5; i++) {
    s += w[i] * texture(T, uv + dir * float(i) * tx).rgb;
    s += w[i] * texture(T, uv - dir * float(i) * tx).rgb;
  }
  o = vec4(s, 1.0);
}`;

const DISP = `#version 300 es
precision highp float; in vec2 uv; out vec4 o;
uniform sampler2D Dye, Glow;
uniform float satBoost, bloomK;
uniform int darkMode;
uniform vec3 paper;
vec3 rgb2hsv(vec3 c) {
  float M = max(max(c.r, c.g), c.b);
  float m = min(min(c.r, c.g), c.b);
  float d = M - m;
  float h = 0.0;
  if (d > 1e-5) {
    if (M == c.r) h = mod((c.g - c.b) / d, 6.0);
    else if (M == c.g) h = (c.b - c.r) / d + 2.0;
    else h = (c.r - c.g) / d + 4.0;
  }
  h /= 6.0;
  float s = M > 0.0 ? d / M : 0.0;
  return vec3(h, s, M);
}
vec3 hsv2rgb(vec3 c) {
  float h = c.x * 6.0; float s = c.y; float v = c.z;
  int i = int(floor(h)); float f = h - float(i);
  float p = v*(1.0-s), q = v*(1.0-f*s), t = v*(1.0-(1.0-f)*s);
  if (i == 0) return vec3(v,t,p); if (i == 1) return vec3(q,v,p);
  if (i == 2) return vec3(p,v,t); if (i == 3) return vec3(p,q,v);
  if (i == 4) return vec3(t,p,v); return vec3(v,p,q);
}
void main() {
  vec3 dye = texture(Dye, uv).rgb;
  vec3 g   = texture(Glow, uv).rgb;
  vec3 c;
  if (darkMode == 1) {
    // VOID: bg is black, dye is the picture itself
    c = clamp(dye, 0.0, 1.0);
    vec3 hsv = rgb2hsv(c); hsv.y = clamp(hsv.y * satBoost, 0.0, 1.0); c = hsv2rgb(hsv);
    c += g * bloomK;
  } else {
    // Light studies: dye represents how much we've moved toward color
    // Blend dye over paper color, then add glow
    c = clamp(dye, 0.0, 1.0);
    vec3 hsv = rgb2hsv(c); hsv.y = clamp(hsv.y * satBoost, 0.0, 1.0); c = hsv2rgb(hsv);
    // soft bloom — additive, scaled by ink density relative to paper
    c += g * bloomK * 0.6;
  }
  c = clamp(c, 0.0, 1.4);
  c = pow(c, vec3(1.0 / 2.2));
  // subtle vignette
  vec2 p = uv * 2.0 - 1.0;
  c *= 1.0 - 0.10 * dot(p, p);
  o = vec4(c, 1.0);
}`;

const P = {
  clear:    compile(CLEAR),
  bright:   compile(BRIGHT),
  advect:   compile(ADVECT),
  divergence: compile(DIVG),
  jacobi:   compile(JAC),
  gradient: compile(GRAD),
  curl:     compile(CURL),
  vorticity: compile(VORT),
  splat:    compile(SPLAT),
  blur:     compile(BLUR),
  display:  compile(DISP),
};

function fbo(w, h) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { tex: t, fb, w, h };
}
function pair(w, h) { return { read: fbo(w, h), write: fbo(w, h), swap() { const t = this.read; this.read = this.write; this.write = t; } }; }
function setF(b) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, b ? b.fb : null);
  gl.viewport(0, 0, b ? b.w : gl.drawingBufferWidth, b ? b.h : gl.drawingBufferHeight);
}
function bind(unit, tex, name, pr) {
  gl.activeTexture(gl.TEXTURE0 + unit);
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.uniform1i(gl.getUniformLocation(pr, name), unit);
}
function blit() { gl.drawArrays(gl.TRIANGLES, 0, 3); }

let sim = null, needsResize = true;

function createSim() {
  const SIM_RES = 320;
  const w = Math.max(32, Math.floor(canvas.clientWidth));
  const h = Math.max(32, Math.floor(canvas.clientHeight));
  const scale = Math.min(1, SIM_RES / Math.max(w, h));
  const W = Math.max(16, Math.floor(w * scale));
  const H = Math.max(16, Math.floor(h * scale));
  const vel = pair(W, H), dye = pair(W, H), press = pair(W, H);
  const div = fbo(W, H), curl = fbo(W, H);
  const gA = pair(W, H), gB = pair(W, H);
  [vel.read, vel.write, dye.read, dye.write, press.read, press.write, div, curl, gA.read, gA.write, gB.read, gB.write].forEach(t => {
    setF(t); gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT);
  });
  return { W, H, vel, dye, press, div, curl, gA, gB };
}
function clearSim() {
  if (!sim) return;
  [sim.vel.read, sim.vel.write, sim.dye.read, sim.dye.write, sim.press.read, sim.press.write, sim.div, sim.curl, sim.gA.read, sim.gA.write, sim.gB.read, sim.gB.write].forEach(t => {
    setF(t); gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT);
  });
}
function resize() {
  const ratio = Math.min(2, window.devicePixelRatio || 1);
  const w = Math.floor(canvas.clientWidth * ratio);
  const h = Math.floor(canvas.clientHeight * ratio);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w; canvas.height = h;
    needsResize = true;
  }
  if (!sim || needsResize) { sim = createSim(); needsResize = false; }
}
window.addEventListener('resize', () => needsResize = true);

// ════════════════════════════════════════════════
// Pointer
// ════════════════════════════════════════════════
const pointer = { down: false, x: 0.5, y: 0.5, px: 0.5, py: 0.5, dx: 0, dy: 0, radius: 0.045 };

function uvFrom(e) {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width;
  const y = 1.0 - (e.clientY - r.top) / r.height;
  return [x, y];
}
function updateBrushSize() {
  const r = (+$('rad').value) * Math.min(window.innerWidth, window.innerHeight) * 1.4;
  const px = Math.max(20, Math.min(220, r));
  $('brush').style.width = px + 'px';
  $('brush').style.height = px + 'px';
}
window.addEventListener('mousemove', e => {
  $('brush').style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
});
canvas.addEventListener('pointerdown', e => {
  pointer.down = true;
  $('brush').classList.add('painting');
  const [u, v] = uvFrom(e);
  pointer.x = pointer.px = u;
  pointer.y = pointer.py = v;
  pointer.dx = 0; pointer.dy = 0;
  dismissHint();
});
window.addEventListener('pointerup', () => {
  pointer.down = false;
  $('brush').classList.remove('painting');
});
window.addEventListener('pointermove', e => {
  const [u, v] = uvFrom(e);
  pointer.dx = u - pointer.x;
  pointer.dy = v - pointer.y;
  pointer.px = pointer.x; pointer.py = pointer.y;
  pointer.x = u; pointer.y = v;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const cur = +$('rad').value;
  const nxt = Math.max(0.005, Math.min(0.12, cur + (e.deltaY < 0 ? 0.004 : -0.004)));
  $('rad').value = nxt;
  $('vRad').textContent = nxt.toFixed(3);
  pointer.radius = nxt;
  updateBrushSize();
}, { passive: false });

// touch dismiss hint
canvas.addEventListener('touchstart', () => dismissHint(), { passive: true });

// ════════════════════════════════════════════════
// Save & flash
// ════════════════════════════════════════════════
function savePulse() {
  const f = $('flash');
  f.classList.add('go');
  setTimeout(() => f.classList.remove('go'), 250);
}
function saveImg() {
  savePulse();
  setTimeout(() => {
    const a = document.createElement('a');
    a.download = `drift-${STUDIES[currentStudy].name.toLowerCase()}-${Date.now()}.png`;
    a.href = canvas.toDataURL('image/png');

}

// ════════════════════════════════════════════════
// Initialize paper color in dye texture (so blending works)
// ════════════════════════════════════════════════
function paintPaperBg(hex) {
  if (!sim) return;
  const [r, g, b] = hexToRGB(hex);
  // Use splat with huge radius to fill the dye buffer with paper color
  setF(sim.dye.write);
  const p = P.splat; gl.useProgram(p);
  bind(0, sim.dye.read.tex, 'T', p);
  gl.uniform2f(gl.getUniformLocation(p, 'point'), 0.5, 0.5);
  gl.uniform1f(gl.getUniformLocation(p, 'radius'), 10.0); // huge — fills entire buffer
  gl.uniform3f(gl.getUniformLocation(p, 'color'), r, g, b);
  gl.uniform2f(gl.getUniformLocation(p, 'force'), 0, 0);
  gl.uniform1i(gl.getUniformLocation(p, 'mode'), 0);
  gl.uniform1f(gl.getUniformLocation(p, 'maxVel'), 800);
  gl.uniform1f(gl.getUniformLocation(p, 'inkGain'), 50.0); // huge — fully opaque
  gl.uniform1i(gl.getUniformLocation(p, 'inkMode'), 0);
  blit();
  sim.dye.swap();
}

// Override clearSim to repaint paper for light studies
const _clearSim = clearSim;
clearSim = function() {
  _clearSim();
  // For light studies, refill dye buffer with paper color so the first stroke
  // blends correctly into the background instead of from black
  const s = STUDIES[currentStudy];
  if (!s.dark) {
    requestAnimationFrame(() => paintPaperBg(s.bg));
  }
};

// ════════════════════════════════════════════════
// Render loop
// ════════════════════════════════════════════════
let last = performance.now();
function frame(t) {
  resize();
  const dt = Math.min(0.033, (t - last) / 1000) * 0.9;
  last = t;
  const texel = [1 / sim.W, 1 / sim.H];
  const s = STUDIES[currentStudy];

  // advect velocity
  setF(sim.vel.write);
  let p = P.advect; gl.useProgram(p);
  bind(0, sim.vel.read.tex, 'Vel', p);
  bind(1, sim.vel.read.tex, 'Src', p);
  gl.uniform2f(gl.getUniformLocation(p, 'texel'), texel[0], texel[1]);
  gl.uniform1f(gl.getUniformLocation(p, 'dt'), dt * 60.0);
  gl.uniform1f(gl.getUniformLocation(p, 'diss'), +$('vdiss').value);
  gl.uniform3f(gl.getUniformLocation(p, 'paper'), 0, 0, 0);
  gl.uniform1i(gl.getUniformLocation(p, 'isDye'), 0);
  blit(); sim.vel.swap();

  // vorticity
  setF(sim.curl);
  p = P.curl; gl.useProgram(p);
  bind(0, sim.vel.read.tex, 'Vel', p);
  gl.uniform2f(gl.getUniformLocation(p, 'texel'), texel[0], texel[1]);
  blit();
  setF(sim.vel.write);
  p = P.vorticity; gl.useProgram(p);
  bind(0, sim.vel.read.tex, 'Vel', p);
  bind(1, sim.curl.tex, 'Curl', p);
  gl.uniform2f(gl.getUniformLocation(p, 'texel'), texel[0], texel[1]);
  gl.uniform1f(gl.getUniformLocation(p, 'dt'), dt);
  gl.uniform1f(gl.getUniformLocation(p, 'vort'), +$('vort').value);
  gl.uniform1f(gl.getUniformLocation(p, 'limit'), 200.0);
  blit(); sim.vel.swap();

  // divergence
  setF(sim.div);
  p = P.divergence; gl.useProgram(p);
  bind(0, sim.vel.read.tex, 'Vel', p);
  gl.uniform2f(gl.getUniformLocation(p, 'texel'), texel[0], texel[1]);
  blit();

  // pressure solve
  setF(sim.press.write);
  p = P.clear; gl.useProgram(p);
  bind(0, sim.press.read.tex, 'T', p);
  gl.uniform1f(gl.getUniformLocation(p, 'k'), 0.97);
  blit(); sim.press.swap();
  const iters = parseInt($('iters').value, 10);
  for (let i = 0; i < iters; i++) {
    setF(sim.press.write);
    p = P.jacobi; gl.useProgram(p);
    bind(0, sim.press.read.tex, 'P', p);
    bind(1, sim.div.tex, 'Div', p);
    gl.uniform2f(gl.getUniformLocation(p, 'texel'), texel[0], texel[1]);
    blit(); sim.press.swap();
  }

  // subtract gradient
  setF(sim.vel.write);
  p = P.gradient; gl.useProgram(p);
  bind(0, sim.vel.read.tex, 'Vel', p);
  bind(1, sim.press.read.tex, 'P', p);
  gl.uniform2f(gl.getUniformLocation(p, 'texel'), texel[0], texel[1]);
  blit(); sim.vel.swap();

  // advect dye
  setF(sim.dye.write);
  p = P.advect; gl.useProgram(p);
  bind(0, sim.vel.read.tex, 'Vel', p);
  bind(1, sim.dye.read.tex, 'Src', p);
  gl.uniform2f(gl.getUniformLocation(p, 'texel'), texel[0], texel[1]);
  gl.uniform1f(gl.getUniformLocation(p, 'dt'), dt * 60.0);
  gl.uniform1f(gl.getUniformLocation(p, 'diss'), +$('diss').value);
  const [pr, pg, pb] = hexToRGB(s.bg);
  gl.uniform3f(gl.getUniformLocation(p, 'paper'), pr, pg, pb);
  gl.uniform1i(gl.getUniformLocation(p, 'isDye'), 1);
  blit(); sim.dye.swap();

  // splat when dragging
  if (pointer.down) {
    const col = s.palette[activeColorIdx];
    const [r, g, b] = hexToRGB(col);
    // dye splat
    setF(sim.dye.write);
    p = P.splat; gl.useProgram(p);
    bind(0, sim.dye.read.tex, 'T', p);
    gl.uniform2f(gl.getUniformLocation(p, 'point'), pointer.x, pointer.y);
    gl.uniform1f(gl.getUniformLocation(p, 'radius'), +$('rad').value);
    gl.uniform3f(gl.getUniformLocation(p, 'color'), r, g, b);
    gl.uniform2f(gl.getUniformLocation(p, 'force'), 0, 0);
    gl.uniform1i(gl.getUniformLocation(p, 'mode'), 0);
    gl.uniform1f(gl.getUniformLocation(p, 'maxVel'), 800);
    gl.uniform1f(gl.getUniformLocation(p, 'inkGain'), +$('ink').value);
    gl.uniform1i(gl.getUniformLocation(p, 'inkMode'), s.p.blend);
    blit(); sim.dye.swap();

    // velocity splat
    const dead = 0.0005;
    const px = (Math.abs(pointer.dx) < dead && Math.abs(pointer.dy) < dead) ? 0 : pointer.dx * sim.W;
    const py = (Math.abs(pointer.dx) < dead && Math.abs(pointer.dy) < dead) ? 0 : pointer.dy * sim.H;
    const mag = +$('force').value * 0.08;
    setF(sim.vel.write);
    p = P.splat; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'T', p);
    gl.uniform2f(gl.getUniformLocation(p, 'point'), pointer.x, pointer.y);
    gl.uniform1f(gl.getUniformLocation(p, 'radius'), +$('rad').value * 0.7);
    gl.uniform3f(gl.getUniformLocation(p, 'color'), 0, 0, 0);
    gl.uniform2f(gl.getUniformLocation(p, 'force'), px * mag, py * mag);
    gl.uniform1i(gl.getUniformLocation(p, 'mode'), 1);
    gl.uniform1f(gl.getUniformLocation(p, 'maxVel'), 800);
    gl.uniform1f(gl.getUniformLocation(p, 'inkGain'), 1.0);
    gl.uniform1i(gl.getUniformLocation(p, 'inkMode'), 0);
    blit(); sim.vel.swap();
  }

  // ── Bloom (two-pass) ──
  setF(sim.gA.write);
  p = P.bright; gl.useProgram(p);
  bind(0, sim.dye.read.tex, 'T', p);
  gl.uniform1f(gl.getUniformLocation(p, 'th'), 0.55);
  gl.uniform1f(gl.getUniformLocation(p, 'sc'), 1.4);
  gl.uniform1i(gl.getUniformLocation(p, 'dark'), s.dark ? 1 : 0);
  gl.uniform3f(gl.getUniformLocation(p, 'paper'), pr, pg, pb);
  blit(); sim.gA.swap();

  const spread = 1.6;
  setF(sim.gB.write);
  p = P.blur; gl.useProgram(p);
  bind(0, sim.gA.read.tex, 'T', p);
  gl.uniform2f(gl.getUniformLocation(p, 'dir'), spread, 0);
  blit(); sim.gB.swap();

  setF(sim.gA.write);
  p = P.blur; gl.useProgram(p);
  bind(0, sim.gB.read.tex, 'T', p);
  gl.uniform2f(gl.getUniformLocation(p, 'dir'), 0, spread);
  blit(); sim.gA.swap();

  // ── Display ──
  setF(null);
  p = P.display; gl.useProgram(p);
  bind(0, sim.dye.read.tex, 'Dye', p);
  bind(1, sim.gA.read.tex, 'Glow', p);
  gl.uniform1f(gl.getUniformLocation(p, 'satBoost'), +$('sat').value);
  gl.uniform1f(gl.getUniformLocation(p, 'bloomK'), +$('bloom').value);
  gl.uniform1i(gl.getUniformLocation(p, 'darkMode'), s.dark ? 1 : 0);
  gl.uniform3f(gl.getUniformLocation(p, 'paper'), pr, pg, pb);
  blit();

  requestAnimationFrame(frame);
}

// ════════════════════════════════════════════════
// Boot
// ════════════════════════════════════════════════
function init() {
  // Force initial size
  canvas.style.width = '100%';
  canvas.style.height = '100%';
  const r = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.floor(canvas.clientWidth * r);
  canvas.height = Math.floor(canvas.clientHeight * r);
  resize();
  renderStudies();
  renderPalette();
  applyParams();
  setStudy(0, true);  // skip overlay on first load — the hint is the intro
  updateBrushSize();
  requestAnimationFrame(frame);
}
init();

})();
</script>
