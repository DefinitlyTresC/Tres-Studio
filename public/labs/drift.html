<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>drift — tres carter</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23080808'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23ff5a1f'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Umami analytics — data-domains scopes tracking to the real site so
       previews/branch URLs don't pollute stats. Clarity below is guarded
       to the production host for the same reason. -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="96e73988-106a-415e-bf80-5e10ffaec0dc" data-domains="tres.studio"></script>
  <script type="text/javascript">
    if (location.hostname === 'tres.studio') {
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xang6oq7f9");
    }
  </script>

  <style>
    /* ───────────────────────────────────────────────────────────
       DRIFT — a wind study at dusk.
       Lab family chrome (see birds.html): Space Mono, one yellow
       accent, the scene is the page. The sim is Navier-Stokes on
       the GPU; smoke breathes through the frame on its own.
       ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:     #FFFFFF;
      --black:     #07080B;
      --yellow:    #F5CB5C;
      --ink-faint: rgba(255, 255, 255, 0.38);
      --ink-soft:  rgba(255, 255, 255, 0.6);

      --mono: 'Space Mono', ui-monospace, monospace;
      --pad: clamp(1.5rem, 4vw, 3rem);
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: var(--mono);
      font-size: 15px;
      height: 100%;
      width: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }

    a { color: inherit; text-decoration: none; }
    button {
      font: inherit; color: inherit; background: none; border: none;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    a:focus-visible, button:focus-visible {
      outline: 1px solid var(--yellow);
      outline-offset: 3px;
    }

    canvas#sky {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      touch-action: none;
      display: block;
      cursor: crosshair;
    }

    /* ─── Chrome (identical bones to birds.html) ─── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: calc(1.2rem + env(safe-area-inset-top, 0px)) var(--pad) 1.2rem;
      pointer-events: none;
    }
    .nav > * { pointer-events: auto; }
    .nav .mark {
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      transition: opacity 0.25s var(--ease);
    }
    .nav .mark .y { color: var(--yellow); }
    .nav .back {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: var(--ink-soft);
      padding: 0.5rem 0;
      transition: color 0.25s var(--ease);
    }

    .mark-bottom {
      position: fixed;
      bottom: calc(1.6rem + env(safe-area-inset-bottom, 0px));
      left: var(--pad);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      z-index: 5;
      pointer-events: none;
    }
    .mark-bottom .y { color: var(--yellow); }

    .hint {
      position: fixed;
      bottom: calc(1.7rem + env(safe-area-inset-bottom, 0px));
      right: var(--pad);
      font-size: 0.56rem;
      letter-spacing: 0.16em;
      color: var(--ink-faint);
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.8s var(--ease);
    }
    .hint.fade { opacity: 0; }

    .modes {
      position: fixed;
      top: 50%;
      right: var(--pad);
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
      z-index: 10;
    }
    .mode-btn {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--ink-faint);
      padding: 0.55rem 0.2rem;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      transition: color 0.3s var(--ease);
    }
    .mode-btn.active { color: var(--yellow); }

    @media (hover: hover) {
      .nav .mark:hover { opacity: 0.65; }
      .nav .back:hover { color: var(--white); }
      .mode-btn:hover { color: var(--white); }
      .mode-btn.active:hover { color: var(--yellow); }
    }

    @media (max-width: 700px) {
      .modes {
        top: auto;
        bottom: calc(3.6rem + env(safe-area-inset-bottom, 0px));
        right: 0;
        left: 0;
        transform: none;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 0.2rem;
      }
      .mode-btn {
        padding: 0.55rem 0.55rem;
        font-size: 0.56rem;
      }
      .mark-bottom { font-size: 0.75rem; }
      .hint { max-width: 40vw; text-align: right; }
    }

    @media (prefers-reduced-motion: reduce) {
      .nav .mark, .nav .back, .mode-btn, .hint { transition: none; }
    }

    .fallback {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 50;
      padding: 2rem;
      text-align: center;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--ink-soft);
    }

    .sr {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }
  </style>
</head>
<body>

<canvas id="sky" aria-hidden="true"></canvas>

<p class="sr">Smoke drifting through a dark frame, simulated as fluid. Move the
pointer to stir the air, drag to draw ink into it, tap to puff it apart, and
switch between smoke, ember, and gale weathers.</p>
<noscript><p class="fallback">drift needs JavaScript.</p></noscript>

<nav class="nav">
  <a class="mark" href="/">tres carter<span class="y">.</span></a>
  <a class="back" href="/lab">[ &larr; lab ]</a>
</nav>

<div class="modes" id="modes" role="group" aria-label="weathers">
  <button class="mode-btn active" data-mode="smoke" aria-pressed="true">[ smoke ]</button>
  <button class="mode-btn" data-mode="ember" aria-pressed="false">[ ember ]</button>
  <button class="mode-btn" data-mode="gale" aria-pressed="false">[ gale ]</button>
  <button class="mode-btn" id="saveBtn">[ save ]</button>
</div>

<div class="mark-bottom">drift<span class="y">.</span></div>
<div class="hint" id="hint">drag to draw &middot; tap to puff</div>

<script>
(function () {
  'use strict';

  const canvas = document.getElementById('sky');
  const PRM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const isCoarse = window.matchMedia('(pointer: coarse)').matches;
  const isMobile = isCoarse || window.innerWidth < 700;
  const CALM = PRM ? 0.45 : 1;

  let dead = false;
  function fail(msg) {
    dead = true;
    const d = document.createElement('p');
    d.className = 'fallback';
    d.textContent = msg;
    document.body.appendChild(d);
  }

  const gl = canvas.getContext('webgl2', {
    antialias: false, depth: false, stencil: false, preserveDrawingBuffer: true,
  });
  if (!gl) { fail('drift needs WebGL2 — this browser doesn’t have it.'); return; }
  gl.getExtension('EXT_color_buffer_float');
  gl.getExtension('EXT_color_buffer_half_float');

  canvas.addEventListener('webglcontextlost', (e) => {
    e.preventDefault();
    fail('graphics context lost — reload to restart the wind.');
  });

  // ══════════════════════════════════════════════════════════
  // WEATHERS — one ink each; the mode IS the palette
  // ══════════════════════════════════════════════════════════
  const MODES = {
    smoke: {
      ink: [0.87, 0.91, 0.96],
      vort: 3.0,  buoy: 0.42, dyeDiss: 0.996, velDiss: 0.992,
      bloom: 0.3, force: 60,  emitUp: 4,  side: 0,
    },
    ember: {
      ink: [0.96, 0.80, 0.36],
      vort: 2.8,  buoy: 0.55, dyeDiss: 0.994, velDiss: 0.991,
      bloom: 1.5, force: 80,  emitUp: 6,  side: 0,
    },
    gale: {
      ink: [0.72, 0.82, 0.94],
      vort: 3.2,  buoy: 0.06, dyeDiss: 0.995, velDiss: 0.9975,
      bloom: 0.7, force: 110, emitUp: 8, side: 6,
    },
  };
  let P = MODES.smoke;
  let modeName = 'smoke';

  function setMode(name) {
    if (!MODES[name]) return;
    P = MODES[name];
    modeName = name;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => {
      const on = b.dataset.mode === name;
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', String(on));
    });
  }
  document.querySelectorAll('.mode-btn[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  // ══════════════════════════════════════════════════════════
  // SHADERS — stable-fluids kit (advect / project / vorticity),
  // plus buoyancy so smoke actually rises, and a radial puff.
  // ══════════════════════════════════════════════════════════
  const VS = `#version 300 es
  precision highp float;
  const vec2 v[3] = vec2[3](vec2(-1,-1), vec2(3,-1), vec2(-1,3));
  out vec2 uv;
  void main() { vec2 p = v[gl_VertexID]; uv = 0.5*(p+1.0); gl_Position = vec4(p, 0, 1); }`;

  let shaderFail = false;
  function compile(fs) {
    const vs = gl.createShader(gl.VERTEX_SHADER);
    gl.shaderSource(vs, VS); gl.compileShader(vs);
    if (!gl.getShaderParameter(vs, gl.COMPILE_STATUS)) { shaderFail = true; console.error('VS:', gl.getShaderInfoLog(vs)); }
    const f = gl.createShader(gl.FRAGMENT_SHADER);
    gl.shaderSource(f, fs); gl.compileShader(f);
    if (!gl.getShaderParameter(f, gl.COMPILE_STATUS)) { shaderFail = true; console.error('FS:', gl.getShaderInfoLog(f)); }
    const p = gl.createProgram();
    gl.attachShader(p, vs); gl.attachShader(p, f);
    gl.linkProgram(p);
    if (!gl.getProgramParameter(p, gl.LINK_STATUS)) { shaderFail = true; console.error('LINK:', gl.getProgramInfoLog(p)); }
    return p;
  }

  const ADVECT = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D Vel, Src; uniform vec2 texel; uniform float dt; uniform float diss;
  uniform float edgeFade;
  void main() {
    vec2 v = texture(Vel, uv).xy;
    o = texture(Src, uv - dt * v * texel) * diss;
    // dye leaves the frame at the ceiling (and downwind edge) instead
    // of pooling against the clamped border
    float ef = max(smoothstep(0.86, 1.0, uv.y), smoothstep(0.9, 1.0, uv.x));
    o *= 1.0 - edgeFade * ef;
  }`;

  const DIVG = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D Vel; uniform vec2 texel;
  void main() {
    float L = texture(Vel, uv - vec2(texel.x, 0)).x;
    float R = texture(Vel, uv + vec2(texel.x, 0)).x;
    float B = texture(Vel, uv - vec2(0, texel.y)).y;
    float T = texture(Vel, uv + vec2(0, texel.y)).y;
    o = vec4(0.5 * ((R-L) + (T-B)), 0, 0, 1);
  }`;

  const CLEARK = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D T; uniform float k;
  void main() { o = texture(T, uv) * k; }`;

  const JAC = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D Pr, Div; uniform vec2 texel;
  void main() {
    float L = texture(Pr, uv - vec2(texel.x, 0)).x;
    float R = texture(Pr, uv + vec2(texel.x, 0)).x;
    float B = texture(Pr, uv - vec2(0, texel.y)).x;
    float T = texture(Pr, uv + vec2(0, texel.y)).x;
    float d = texture(Div, uv).x;
    o = vec4((L + R + B + T - d) * 0.25, 0, 0, 1);
  }`;

  const GRAD = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D Vel, Pr; uniform vec2 texel;
  void main() {
    float L = texture(Pr, uv - vec2(texel.x, 0)).x;
    float R = texture(Pr, uv + vec2(texel.x, 0)).x;
    float B = texture(Pr, uv - vec2(0, texel.y)).x;
    float T = texture(Pr, uv + vec2(0, texel.y)).x;
    o = vec4(texture(Vel, uv).xy - 0.5 * vec2(R - L, T - B), 0, 1);
  }`;

  const CURL = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D Vel; uniform vec2 texel;
  void main() {
    float L = texture(Vel, uv - vec2(texel.x, 0)).y;
    float R = texture(Vel, uv + vec2(texel.x, 0)).y;
    float B = texture(Vel, uv - vec2(0, texel.y)).x;
    float T = texture(Vel, uv + vec2(0, texel.y)).x;
    o = vec4((R - L) - (T - B), 0, 0, 1);
  }`;

  const VORT = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D Vel, Curl; uniform vec2 texel;
  uniform float dt, vort;
  void main() {
    float L = texture(Curl, uv - vec2(texel.x, 0)).x;
    float R = texture(Curl, uv + vec2(texel.x, 0)).x;
    float B = texture(Curl, uv - vec2(0, texel.y)).x;
    float T = texture(Curl, uv + vec2(0, texel.y)).x;
    vec2 g = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L)) + 1e-5;
    float c = texture(Curl, uv).x;
    vec2 f = vort * vec2(g.y, -g.x) * c;
    float m = length(f);
    if (m > 200.0) f *= 200.0 / (m + 1e-6);
    o = vec4(texture(Vel, uv).xy + dt * f, 0, 1);
  }`;

  // smoke rises: lift velocity by how much dye sits in the cell
  const BUOY = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D Vel, Dye; uniform float k; uniform float dtN; uniform float wx;
  void main() {
    vec2 v = texture(Vel, uv).xy;
    vec3 d = texture(Dye, uv).rgb;
    float lum = dot(d, vec3(0.299, 0.587, 0.114));
    v.y += k * min(lum, 1.2) * dtN;
    v.x += wx * dtN;                 // the gale's steady crosswind
    o = vec4(v, 0, 1);
  }`;

  const SPLAT = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D T;
  uniform vec2 point; uniform float radius; uniform float aspect;
  uniform vec3 color; uniform vec2 force; uniform int mode; uniform float inkGain;
  void main() {
    vec4 base = texture(T, uv);
    vec2 d = uv - point; d.x *= aspect;
    float fall = exp(-dot(d, d) / max(radius * radius, 1e-6));
    if (mode == 0) {
      // additive saturating ink — dark paper, dye is the light
      float a = 1.0 - exp(-fall * inkGain);
      vec3 b = clamp(base.rgb, 0.0, 1.2);
      o = vec4(b + color * a * (1.05 - b), base.a);
    } else {
      vec2 v = base.xy + force * fall;
      float m = length(v);
      if (m > 900.0) v *= 900.0 / (m + 1e-6);
      o = vec4(v, 0, 1);
    }
  }`;

  const PUFF = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D T;
  uniform vec2 point; uniform float radius; uniform float aspect; uniform float power;
  void main() {
    vec2 base = texture(T, uv).xy;
    vec2 d = uv - point; d.x *= aspect;
    float dist = length(d) + 1e-5;
    float fall = exp(-dist * dist / max(radius * radius, 1e-6));
    vec2 v = base + (d / dist) * fall * power;
    float m = length(v);
    if (m > 900.0) v *= 900.0 / (m + 1e-6);
    o = vec4(v, 0, 1);
  }`;

  const BRIGHT = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D T;
  void main() {
    // only dense cores glow — ambient haze must never bloom
    vec3 c = texture(T, uv).rgb;
    o = vec4(max(c - vec3(0.5), 0.0) * 1.4, 1.0);
  }`;

  const BLUR = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D T; uniform vec2 dir;
  void main() {
    vec2 tx = 1.0 / vec2(textureSize(T, 0));
    float w[5] = float[5](0.227027, 0.316216, 0.070270, 0.010381, 0.004);
    vec3 s = w[0] * texture(T, uv).rgb;
    for (int i = 1; i < 5; i++) {
      s += w[i] * texture(T, uv + dir * float(i) * tx).rgb;
      s += w[i] * texture(T, uv - dir * float(i) * tx).rgb;
    }
    o = vec4(s, 1.0);
  }`;

  const DISP = `#version 300 es
  precision highp float; in vec2 uv; out vec4 o;
  uniform sampler2D Dye, Glow; uniform float bloomK;
  float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
  void main() {
    // dusk paper — the same family gradient as the birds sky.
    // Paper is a DISPLAY color (added as-is, never gamma-lifted);
    // only the ink gets tone-mapped, so the empty frame stays black.
    vec3 paper = mix(vec3(0.0235, 0.0275, 0.039), vec3(0.051, 0.063, 0.086), 1.0 - uv.y);
    vec3 ink = clamp(texture(Dye, uv).rgb + texture(Glow, uv).rgb * bloomK, 0.0, 1.35);
    ink = max(ink - 0.03, 0.0);              // crush residue — blacks stay black
    ink = ink / (ink + 0.35) * 1.35;         // soft shoulder
    vec3 c = paper + ink;
    vec2 p = uv * 2.0 - 1.0;
    c *= 1.0 - 0.10 * dot(p, p);
    c += (hash(uv) - 0.5) * 0.016 * (0.25 + c.g);   // grain rides the light, static
    o = vec4(clamp(c, 0.0, 1.0), 1.0);
  }`;

  const PROG = {
    advect: compile(ADVECT), div: compile(DIVG), cleark: compile(CLEARK),
    jac: compile(JAC), grad: compile(GRAD), curl: compile(CURL),
    vort: compile(VORT), buoy: compile(BUOY), splat: compile(SPLAT),
    puff: compile(PUFF), bright: compile(BRIGHT), blur: compile(BLUR),
    disp: compile(DISP),
  };
  if (shaderFail) { fail('drift couldn’t compile its shaders on this GPU.'); return; }

  // ══════════════════════════════════════════════════════════
  // FRAMEBUFFERS
  // ══════════════════════════════════════════════════════════
  function fbo(w, h) {
    const t = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
    const fb = gl.createFramebuffer();
    gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    return { tex: t, fb, w, h };
  }
  function pair(w, h) {
    return { read: fbo(w, h), write: fbo(w, h),
      swap() { const t = this.read; this.read = this.write; this.write = t; } };
  }
  function setF(b) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, b ? b.fb : null);
    gl.viewport(0, 0, b ? b.w : gl.drawingBufferWidth, b ? b.h : gl.drawingBufferHeight);
  }
  function bind(unit, tex, name, pr) {
    gl.activeTexture(gl.TEXTURE0 + unit);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.uniform1i(gl.getUniformLocation(pr, name), unit);
  }
  function blit() { gl.drawArrays(gl.TRIANGLES, 0, 3); }
  function u1f(p, n, v) { gl.uniform1f(gl.getUniformLocation(p, n), v); }
  function u2f(p, n, a, b) { gl.uniform2f(gl.getUniformLocation(p, n), a, b); }
  function u3f(p, n, a, b, c) { gl.uniform3f(gl.getUniformLocation(p, n), a, b, c); }
  function u1i(p, n, v) { gl.uniform1i(gl.getUniformLocation(p, n), v); }

  // some GL stacks report WebGL2 but can't render to float textures —
  // probe once so those users get words instead of a dead black canvas
  {
    const probe = fbo(4, 4);
    gl.bindFramebuffer(gl.FRAMEBUFFER, probe.fb);
    const ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    gl.deleteFramebuffer(probe.fb); gl.deleteTexture(probe.tex);
    if (!ok) { fail('drift needs floating-point render targets — this browser/GPU combination doesn’t offer them.'); return; }
  }

  let sim = null, needsResize = true, aspect = 1;
  // velocity solves on a coarse smooth grid; dye rides it at high res —
  // that split is where the crisp filaments come from
  const SIM_RES = isMobile ? 192 : 256;
  const DYE_RES = isMobile ? 720 : 1024;

  function createSim() {
    const w = Math.max(32, canvas.clientWidth);
    const h = Math.max(32, canvas.clientHeight);
    aspect = w / h;
    const sScale = Math.min(1, SIM_RES / Math.max(w, h));
    const dScale = Math.min(1, DYE_RES / Math.max(w, h));
    const W = Math.max(16, Math.floor(w * sScale));
    const H = Math.max(16, Math.floor(h * sScale));
    const DW = Math.max(16, Math.floor(w * dScale));
    const DH = Math.max(16, Math.floor(h * dScale));
    const s = {
      W, H, DW, DH,
      vel: pair(W, H), dye: pair(DW, DH), press: pair(W, H),
      div: fbo(W, H), curl: fbo(W, H), gA: pair(W, H), gB: pair(W, H),
    };
    [s.vel.read, s.vel.write, s.dye.read, s.dye.write, s.press.read,
     s.press.write, s.div, s.curl, s.gA.read, s.gA.write, s.gB.read, s.gB.write]
      .forEach(t => { setF(t); gl.clearColor(0, 0, 0, 1); gl.clear(gl.COLOR_BUFFER_BIT); });
    return s;
  }

  // only touches layout when a resize event actually queued one —
  // no per-frame clientWidth reads
  function resize() {
    const r = Math.min(2, window.devicePixelRatio || 1);
    canvas.width = Math.floor(canvas.clientWidth * r);
    canvas.height = Math.floor(canvas.clientHeight * r);
    sim = createSim();
    needsResize = false;
  }
  window.addEventListener('resize', () => { needsResize = true; }, { passive: true });
  window.addEventListener('orientationchange', () => setTimeout(() => { needsResize = true; }, 200), { passive: true });

  // ══════════════════════════════════════════════════════════
  // SPLAT HELPERS (uv coords, y up)
  // ══════════════════════════════════════════════════════════
  function splatDye(x, y, rad, rgb, gain) {
    setF(sim.dye.write);
    const p = PROG.splat; gl.useProgram(p);
    bind(0, sim.dye.read.tex, 'T', p);
    u2f(p, 'point', x, y);
    u1f(p, 'radius', rad);
    u1f(p, 'aspect', aspect);
    u3f(p, 'color', rgb[0], rgb[1], rgb[2]);
    u2f(p, 'force', 0, 0);
    u1i(p, 'mode', 0);
    u1f(p, 'inkGain', gain);
    blit(); sim.dye.swap();
  }
  function splatVel(x, y, rad, fx, fy) {
    setF(sim.vel.write);
    const p = PROG.splat; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'T', p);
    u2f(p, 'point', x, y);
    u1f(p, 'radius', rad);
    u1f(p, 'aspect', aspect);
    u3f(p, 'color', 0, 0, 0);
    u2f(p, 'force', fx, fy);
    u1i(p, 'mode', 1);
    u1f(p, 'inkGain', 1);
    blit(); sim.vel.swap();
  }
  function puff(x, y) {
    setF(sim.vel.write);
    const p = PROG.puff; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'T', p);
    u2f(p, 'point', x, y);
    u1f(p, 'radius', 0.22);
    u1f(p, 'aspect', aspect);
    u1f(p, 'power', 14 * CALM);
    blit(); sim.vel.swap();
    // the burst carries a breath of ink with it
    splatDye(x, y, 0.06, P.ink, 0.2 * CALM);
  }

  // ══════════════════════════════════════════════════════════
  // BREATHS — discrete events, not steady sources. One compact
  // blob of ink over one hard upward impulse: the projection
  // step rolls it into a mushroom vortex on its own, it rises,
  // curls, and dissolves. Every few seconds, somewhere new.
  // ══════════════════════════════════════════════════════════
  let nextBreathAt = 0, breathsFired = 0;

  function rand(a, b) { return a + Math.random() * (b - a); }

  function breath(now) {
    if (now < nextBreathAt) return;
    // the first two come quickly so the scene is alive on arrival;
    // reduced motion breathes at half tempo
    const tempo = PRM ? 2 : 1;
    nextBreathAt = breathsFired < 2
      ? now + 700
      : now + rand(1200, 2600) * tempo * (modeName === 'gale' ? 0.4 : 1);
    breathsFired++;

    if (modeName === 'gale') {
      const y = rand(0.2, 0.8);
      splatDye(0.04, y, 0.028, P.ink, 0.55 * CALM);
      splatDye(0.04, Math.min(0.9, y + rand(0.06, 0.14)), 0.02, P.ink, 0.4 * CALM);
      splatVel(0.02, y, 0.07, P.side * 0.9 * CALM, rand(-0.8, 0.8));
    } else {
      const x = rand(0.15, 0.85);
      const kick = P.emitUp * CALM;
      splatDye(x, 0.055, 0.042, P.ink, 0.5 * CALM);
      splatVel(x, 0.02, 0.05, rand(-1, 1), kick);
    }
  }

  // ══════════════════════════════════════════════════════════
  // INPUT — move stirs the air, drag draws ink, tap puffs
  // ══════════════════════════════════════════════════════════
  const pointer = {
    x: 0.5, y: 0.5, dx: 0, dy: 0, down: false, id: -1,
    downAt: 0, downX: 0, downY: 0, had: false, fresh: false,
  };
  const hintEl = document.getElementById('hint');
  let puffAt = null;   // uv of a pending tap-puff, consumed in the frame

  function isUI(t) { return t && t.closest && t.closest('a, button'); }
  function toUV(e) {
    return [e.clientX / Math.max(1, window.innerWidth),
            1 - e.clientY / Math.max(1, window.innerHeight)];
  }

  window.addEventListener('pointerdown', (e) => {
    if (isUI(e.target)) return;
    const [u, v] = toUV(e);
    pointer.x = u; pointer.y = v;
    pointer.dx = 0; pointer.dy = 0;
    pointer.down = true;
    pointer.id = e.pointerId;
    pointer.downAt = performance.now();
    pointer.downX = e.clientX; pointer.downY = e.clientY;
    if (!pointer.had) { pointer.had = true; if (hintEl) hintEl.classList.add('fade'); }
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('pointermove', (e) => {
    if (pointer.down && e.pointerId !== pointer.id) return;
    const [u, v] = toUV(e);
    // deltas ACCUMULATE between frames — a fast flick fires many move
    // events per frame, and only the sum carries the real stroke force
    pointer.dx = Math.max(-0.2, Math.min(0.2, pointer.dx + (u - pointer.x)));
    pointer.dy = Math.max(-0.2, Math.min(0.2, pointer.dy + (v - pointer.y)));
    pointer.x = u; pointer.y = v;
    pointer.fresh = true;
  }, { passive: true });

  function pointerEnd(e) {
    if (!pointer.down || e.pointerId !== pointer.id) return;
    pointer.down = false;
    const dtMs = performance.now() - pointer.downAt;
    const moved = Math.hypot(e.clientX - pointer.downX, e.clientY - pointer.downY);
    if (dtMs < 220 && moved < 10) puffAt = toUV(e);
  }
  window.addEventListener('pointerup', pointerEnd, { passive: true });
  window.addEventListener('pointercancel', () => { pointer.down = false; }, { passive: true });

  window.addEventListener('keydown', (e) => {
    if (e.target && e.target.closest && e.target.closest('a, button')) return;
    const k = e.key.toLowerCase();
    if (k === '1') setMode('smoke');
    else if (k === '2') setMode('ember');
    else if (k === '3') setMode('gale');
    else if (k === 's') saveImg();
    else if (k === ' ') { e.preventDefault(); puffAt = [pointer.x, pointer.y]; }
  });

  // ══════════════════════════════════════════════════════════
  // SAVE
  // ══════════════════════════════════════════════════════════
  function saveImg() {
    const a = document.createElement('a');
    a.download = 'drift-' + modeName + '-' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
  document.getElementById('saveBtn').addEventListener('click', saveImg);

  // ══════════════════════════════════════════════════════════
  // FRAME
  // ══════════════════════════════════════════════════════════
  let last = performance.now();

  function frame(t) {
    if (dead) return;
    requestAnimationFrame(frame);
    if (needsResize) resize();
    const dt = Math.min(0.033, (t - last) / 1000);
    last = t;
    const dtN = dt * 60;
    const tx = 1 / sim.W, ty = 1 / sim.H;
    let p;

    // advect velocity
    setF(sim.vel.write);
    p = PROG.advect; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'Vel', p);
    bind(1, sim.vel.read.tex, 'Src', p);
    u2f(p, 'texel', tx, ty);
    u1f(p, 'dt', dtN);
    u1f(p, 'diss', P.velDiss);
    u1f(p, 'edgeFade', 0);
    blit(); sim.vel.swap();

    // vorticity confinement
    setF(sim.curl);
    p = PROG.curl; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'Vel', p);
    u2f(p, 'texel', tx, ty);
    blit();
    setF(sim.vel.write);
    p = PROG.vort; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'Vel', p);
    bind(1, sim.curl.tex, 'Curl', p);
    u2f(p, 'texel', tx, ty);
    u1f(p, 'dt', dt);
    u1f(p, 'vort', P.vort * CALM);
    blit(); sim.vel.swap();

    // buoyancy — smoke rises through the frame
    setF(sim.vel.write);
    p = PROG.buoy; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'Vel', p);
    bind(1, sim.dye.read.tex, 'Dye', p);
    u1f(p, 'k', P.buoy * CALM);
    u1f(p, 'dtN', dtN);
    u1f(p, 'wx', (modeName === 'gale' ? 0.004 : 0) * CALM);
    blit(); sim.vel.swap();

    // sources: ambient breaths + the hand
    breath(t);
    if (pointer.fresh) {
      pointer.fresh = false;
      const fx = pointer.dx * sim.W * (P.force * 0.05);
      const fy = pointer.dy * sim.H * (P.force * 0.05);
      pointer.dx = 0; pointer.dy = 0;
      // moving the pointer always stirs the air
      splatVel(pointer.x, pointer.y, 0.055, fx * CALM, fy * CALM);
      // holding it down draws ink into the stream
      if (pointer.down) splatDye(pointer.x, pointer.y, 0.032, P.ink, 0.35 * CALM);
    }
    if (puffAt) { puff(puffAt[0], puffAt[1]); puffAt = null; }

    // project (incompressibility)
    setF(sim.div);
    p = PROG.div; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'Vel', p);
    u2f(p, 'texel', tx, ty);
    blit();

    setF(sim.press.write);
    p = PROG.cleark; gl.useProgram(p);
    bind(0, sim.press.read.tex, 'T', p);
    u1f(p, 'k', 0.97);
    blit(); sim.press.swap();

    for (let i = 0; i < 26; i++) {
      setF(sim.press.write);
      p = PROG.jac; gl.useProgram(p);
      bind(0, sim.press.read.tex, 'Pr', p);
      bind(1, sim.div.tex, 'Div', p);
      u2f(p, 'texel', tx, ty);
      blit(); sim.press.swap();
    }

    setF(sim.vel.write);
    p = PROG.grad; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'Vel', p);
    bind(1, sim.press.read.tex, 'Pr', p);
    u2f(p, 'texel', tx, ty);
    blit(); sim.vel.swap();

    // advect dye
    setF(sim.dye.write);
    p = PROG.advect; gl.useProgram(p);
    bind(0, sim.vel.read.tex, 'Vel', p);
    bind(1, sim.dye.read.tex, 'Src', p);
    // velocity is in SIM px/frame — the uv conversion uses the SIM texel
    // no matter which resolution the target rides at
    u2f(p, 'texel', tx, ty);
    u1f(p, 'dt', dtN);
    u1f(p, 'diss', P.dyeDiss);
    u1f(p, 'edgeFade', 0.025);
    blit(); sim.dye.swap();

    // bloom
    setF(sim.gA.write);
    p = PROG.bright; gl.useProgram(p);
    bind(0, sim.dye.read.tex, 'T', p);
    blit(); sim.gA.swap();

    setF(sim.gB.write);
    p = PROG.blur; gl.useProgram(p);
    bind(0, sim.gA.read.tex, 'T', p);
    u2f(p, 'dir', 1.6, 0);
    blit(); sim.gB.swap();

    setF(sim.gA.write);
    p = PROG.blur; gl.useProgram(p);
    bind(0, sim.gB.read.tex, 'T', p);
    u2f(p, 'dir', 0, 1.6);
    blit(); sim.gA.swap();

    // display
    setF(null);
    p = PROG.disp; gl.useProgram(p);
    bind(0, sim.dye.read.tex, 'Dye', p);
    bind(1, sim.gA.read.tex, 'Glow', p);
    u1f(p, 'bloomK', P.bloom);
    blit();
  }

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) last = performance.now();
  });

  resize();
  requestAnimationFrame(frame);
})();
</script>

</body>
</html>
