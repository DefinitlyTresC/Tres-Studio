}

/* ════════════════════════════════════════════════════════════
   V2 — SATISFACTORY .SAV IMPORT (reverse-engineered, save v60 / game 1.2)
   Scan-based region parser: finds actor/component header tables by class-path
   signature, pairs data entries by end-alignment, walks the belt graph.
   ════════════════════════════════════════════════════════════ */
const SAV = (() => {
  const MAGIC = 0x9E2A83C1;
  async function inflateChunks(buf) {
    const dv = new DataView(buf);
    let bs = 0;
    for (let i = 300; i < 4000; i++) if (dv.getUint32(i, true) === MAGIC) { bs = i; break; }
    if (!bs) throw new Error("not a Satisfactory save (no chunk magic)");
    const jobs = [];
    let o = bs;
    while (o < buf.byteLength - 48) {
      o += 17;
      const cs = Number(dv.getBigInt64(o, true)); o += 32;
      jobs.push(buf.slice(o, o + cs)); o += cs;
    }
    const parts = await Promise.all(jobs.map(sl =>
      new Response(new Blob([sl]).stream().pipeThrough(new DecompressionStream("deflate"))).arrayBuffer()));
    let total = 0; for (const p of parts) total += p.byteLength;
    const body = new Uint8Array(total);
    let off = 0; for (const p of parts) { body.set(new Uint8Array(p), off); off += p.byteLength; }
    return body;
  }
  function parseHeaderInfo(buf) {
    const dv = new DataView(buf);
    let p = 0;
    const i32 = () => { const v = dv.getInt32(p, true); p += 4; return v; };
    const str = () => { const len = i32(); if (!len) return "";
      if (len > 0) { let s = ""; for (let i = 0; i < len - 1; i++) s += String.fromCharCode(dv.getUint8(p + i)); p += len; return s; }
      const n = -len; let s = ""; for (let i = 0; i < n - 1; i++) s += String.fromCharCode(dv.getUint16(p + 2 * i, true)); p += 2 * n; return s; };
    const h = {};
    h.headerVersion = i32(); h.saveVersion = i32(); h.buildVersion = i32();
    if (h.headerVersion >= 14) h.saveName = str();
    h.mapName = str(); h.mapOptions = str(); h.sessionName = str();
    h.playedSeconds = i32(); p += 8; p += 1;
    if (h.headerVersion >= 7) i32();
    if (h.headerVersion >= 8) { str(); i32(); }
    if (h.headerVersion >= 10) str();
    if (h.headerVersion >= 11) i32();
    if (h.headerVersion >= 12) p += 20;
    if (h.headerVersion >= 13) { h.creativeFlagOffset = p; h.isCreativeModeEnabled = i32(); }
    return h;
  }
  function extract(body) {
    const B = body, DV = new DataView(B.buffer, B.byteOffset, B.byteLength);
    const bodyStr = new TextDecoder("latin1").decode(B);
    let P = 0;
    const rstr = () => { const len = DV.getInt32(P, true); P += 4; if (!len) return "";
      if (len > 1e5 || len < -1e5) throw new Error("strlen");
      if (len > 0) { if (P + len > B.length) throw new Error("oob"); const s = bodyStr.slice(P, P + len - 1); P += len; return s; }
      const n = -len; if (P + 2 * n > B.length) throw new Error("oob");
      let s = ""; for (let i = 0; i < n - 1; i++) s += String.fromCharCode(DV.getUint16(P + 2 * i, true)); P += 2 * n; return s; };
    const validStrAt = (pos, min, max) => { if (pos + 4 > B.length) return 0;
      const len = DV.getInt32(pos, true);
      if (len < min || len > max || pos + 4 + len > B.length) return 0;
      for (let i = 0; i < len - 1; i++) { const c = B[pos + 4 + i]; if (c < 32 || c > 126) return 0; }
      return B[pos + 4 + len - 1] === 0 ? len : 0; };
    const validHeaderAt = pos => { if (pos < 0 || pos + 16 > B.length) return false;
      const t = DV.getInt32(pos, true);
      if (t !== 0 && t !== 1) return false;
      const tpLen = validStrAt(pos + 4, 8, 250);
      if (!tpLen || B[pos + 8] !== 47) return false;
      const rootLen = validStrAt(pos + 8 + tpLen, 2, 64);
      if (!rootLen) return false;
      return validStrAt(pos + 8 + tpLen + 4 + rootLen, 4, 300) > 0; };
    // candidates
    const needles = ["/Game/FactoryGame/Buildable/", "/Script/FactoryGame.FGFactoryConnectionComponent"];
    const hits = new Set();
    for (const n of needles) { let i = -1;
      while ((i = bodyStr.indexOf(n, i + 1)) !== -1) { if (validHeaderAt(i - 8)) hits.add(i - 8); } }
    const cands = [...hits].sort((a, b) => a - b);
    // props
    function parseProps(end) {
      const out = {}; let guard = 0;
      while (P < end && guard++ < 6000) {
        let tries = 0;
        while (tries < 8 && P < end - 4) {
          const len = DV.getInt32(P, true);
          if (len > 1 && len < 200 && P + 4 + len <= end) {
            let ok = true;
            for (let i = 0; i < len - 1; i++) { const c = B[P + 4 + i]; if (c < 32 || c > 126) { ok = false; break; } }
            if (ok && B[P + 4 + len - 1] === 0) break;
          }
          P++; tries++;
        }
        if (tries >= 8 || P >= end - 4) return out;
        const name = rstr();
        if (name === "None") return out;
        let type; try { type = rstr(); } catch (_) { return out; }
        if (!type.endsWith("Property")) continue;
        const size = DV.getUint32(P, true); P += 8;
        if (type === "BoolProperty") { out[name] = B[P] !== 0; P += 2; continue; }
        if (type === "StructProperty") { try { rstr(); } catch (_) { return out; } P += 17 + size; continue; }
        if (type === "ByteProperty") { try { rstr(); } catch (_) { return out; } P += 1; if (size === 1) out[name] = B[P]; P += size; continue; }
        const g = B[P]; P += 1; if (g) P += 16;
        const pStart = P;
        try {
          if (type === "IntProperty") out[name] = DV.getInt32(P, true);
          else if (type === "FloatProperty") out[name] = DV.getFloat32(P, true);
          else if (type === "ObjectProperty") { rstr(); out[name] = rstr(); }
        } catch (_) {}
        P = pStart + size;
      }
      return out;
    }
    const IS_BELT = /Build_(ConveyorBeltMk\d|ConveyorLiftMk\d)/;
    const IS_MACHINE = /Build_(SmelterMk1|FoundryMk\d|ConstructorMk1|AssemblerMk1|ManufacturerMk1|OilRefinery|MinerMk\d|WaterPump|OilPump|ConveyorAttachmentSplitter\w*|ConveyorAttachmentMerger|StorageContainerMk\d|TruckStation|TrainStation|ResourceSink)_C$/;
    const machines = [], beltActors = new Map(), comps = new Map();
    let ci = 0;
    while (ci < cands.length) {
      const regionStart = cands[ci];
      const headers = [];
      let p = regionStart;
      while (validHeaderAt(p)) {
        P = p;
        const type = DV.getInt32(P, true); P += 4;
        let tp, root, inst;
        try { tp = rstr(); root = rstr(); inst = rstr(); } catch (_) { break; }
        if (type === 1) {
          P += 8;
          const t0 = P, e32 = t0 + 44, e64 = t0 + 84;
          const v32 = validHeaderAt(e32), v64 = validHeaderAt(e64);
          let use64 = v64 && !v32;
          if (!v32 && !v64) use64 = DV.getUint32(t0 + 60, true) === 0x3ff00000;
          let x, y, z;
          if (use64) { x = DV.getFloat64(t0 + 32, true); y = DV.getFloat64(t0 + 40, true); z = DV.getFloat64(t0 + 48, true); P = e64; }
          else { x = DV.getFloat32(t0 + 16, true); y = DV.getFloat32(t0 + 20, true); z = DV.getFloat32(t0 + 24, true); P = e32; }
          headers.push({ a: 1, tp, inst, x, y, z });
        } else { P += 4; try { rstr(); } catch (_) { break; } headers.push({ a: 0, tp, inst }); }
        p = P;
        if (headers.length > 500000) break;
      }
      const ciBefore = ci;
      while (ci < cands.length && cands[ci] < p) ci++;
      if (ci === ciBefore) ci++;
      // pair data entries
      P = p;
      try {
        const cc = DV.getUint32(P, true); P += 4;
        if (cc > 20000) throw 0;
        for (let c = 0; c < cc; c++) { rstr(); rstr(); }
        const sizeB = Number(DV.getBigInt64(P, true)); P += 8;
        if (sizeB < 4 || sizeB > B.length) throw 0;
        const dataEnd = P + sizeB;
        const nObj = DV.getUint32(P, true); P += 4;
        if (nObj < headers.length || nObj > 2e6) throw 0;
        for (let i = 0, skipN = nObj - headers.length; i < skipN; i++) {
          const sz = DV.getUint32(P + 8, true); P += 16 + sz;
          if (P > dataEnd) throw 0;
        }
        for (let i = 0; i < headers.length; i++) {
          const ver = DV.getInt32(P, true);
          if (ver < 30 || ver > 90) throw 0;
          P += 8; const sz = DV.getUint32(P, true); P += 4;
          const eStart = P, eEnd = P + sz;
          if (eEnd + 4 > dataEnd + 8) throw 0;
          const H = headers[i];
          if (H.a === 1 && IS_BELT.test(H.tp)) beltActors.set(H.inst, H.tp.match(/Mk(\d)/) ? +H.tp.match(/Mk(\d)/)[1] : 1);
          else if (H.a === 1 && IS_MACHINE.test(H.tp)) {
            let props = {};
            try {
              rstr(); rstr();
              const n = DV.getInt32(P, true); P += 4;
              if (n >= 0 && n < 500) for (let c = 0; c < n; c++) { rstr(); rstr(); }
              props = parseProps(eEnd);
            } catch (_) {}
            machines.push({ cls: H.tp.match(/Build_(\w+)_C$/)[1], inst: H.inst, x: H.x, y: H.y, z: H.z, props });
          } else if (H.a === 0 && H.tp.includes("FGFactoryConnectionComponent")) {
            let conn = null;
            try { conn = parseProps(eEnd).mConnectedComponent || null; } catch (_) {}
            comps.set(H.inst, conn);
          }
          P = eEnd + 4;
        }
      } catch (_) {
        for (const H of headers) {
          if (H.a === 1 && IS_MACHINE.test(H.tp))
            machines.push({ cls: H.tp.match(/Build_(\w+)_C$/)[1], inst: H.inst, x: H.x, y: H.y, z: H.z, props: {} });
          else if (H.a === 1 && IS_BELT.test(H.tp)) beltActors.set(H.inst, H.tp.match(/Mk(\d)/) ? +H.tp.match(/Mk(\d)/)[1] : 1);
        }
      }
    }
    // belt graph
    const ownerOf = i => i.slice(0, i.lastIndexOf("."));
    const machSet = new Set(machines.map(m => m.inst));
    const compsByOwner = new Map();
    for (const k of comps.keys()) { const ow = ownerOf(k);
      if (!compsByOwner.has(ow)) compsByOwner.set(ow, []); compsByOwner.get(ow).push(k); }
    const edges = [];
    for (const [ck, conn] of comps) {
      const owner = ownerOf(ck);
      if (!machSet.has(owner) || !/Output/i.test(ck.slice(ck.lastIndexOf(".")))) continue;
      let cur = conn, guard = 0, tierMin = 99;
      while (cur && guard++ < 600) {
        const co = ownerOf(cur);
        if (machSet.has(co)) { edges.push({ from: owner, to: co, tier: tierMin === 99 ? 1 : tierMin }); break; }
        const bt = beltActors.get(co);
        if (bt == null) break;
        tierMin = Math.min(tierMin, bt);
        const others = (compsByOwner.get(co) || []).filter(k => k !== cur);
        if (others.length !== 1) break;
        cur = comps.get(others[0]);
      }
    }
    return { machines, edges, beltCount: beltActors.size };
  }
  return { inflateChunks, parseHeaderInfo, extract };
})();

/* .sav → tool state */
function savToState(ex) {
  const RM = { Recipe_IngotIron_C:"iron_ingot", Recipe_IngotCopper_C:"copper_ingot", Recipe_IngotCaterium_C:"caterium_ingot",
    Recipe_IngotSteel_C:"steel_ingot", Recipe_Concrete_C:"concrete", Recipe_IronRod_C:"iron_rod", Recipe_Wire_C:"wire",
    Recipe_CopperSheet_C:"copper_sheet", Recipe_Cable_C:"cable", Recipe_Screw_C:"screw", Recipe_IronPlate_C:"iron_plate",
    Recipe_Rotor_C:"rotor", Recipe_IronPlateReinforced_C:"reinforced_iron_plate", Recipe_SpaceElevatorPart_1_C:"smart_plating",
    Recipe_SpaceElevatorPart_2_C:"versatile_framework", Recipe_SpaceElevatorPart_3_C:"automated_wiring",
    Recipe_ModularFrame_C:"modular_frame", Recipe_QuartzCrystal_C:"quartz_crystal", Recipe_Silica_C:"silica",
    Recipe_Stator_C:"stator", Recipe_Motor_C:"motor", Recipe_SteelBeam_C:"steel_beam", Recipe_SteelPipe_C:"steel_pipe",
    Recipe_Quickwire_C:"quickwire", Recipe_Biomass_Wood_C:"cr_biomass_wood", Recipe_Biomass_Leaves_C:"cr_biomass_leaves",
    Recipe_Biofuel_C:"cr_solid_biofuel" };
  const CR = [
    { id:"cr_biomass_wood", name:"Biomass (Wood)", b:"constructor", in:{wood:60}, out:{biomass:300} },
    { id:"cr_biomass_leaves", name:"Biomass (Leaves)", b:"constructor", in:{leaves:120}, out:{biomass:60} },
    { id:"cr_solid_biofuel", name:"Solid Biofuel", b:"constructor", in:{biomass:120}, out:{solid_biofuel:60} }];
  const CM = { SmelterMk1:"smelter", FoundryMk1:"foundry", ConstructorMk1:"constructor", AssemblerMk1:"assembler",
    ManufacturerMk1:"manufacturer", OilRefinery:"refinery" };
  const ORE = { iron_ingot:"iron_ore", copper_ingot:"copper_ore", caterium_ingot:"caterium_ore", steel_ingot:"iron_ore",
    concrete:"limestone", quartz_crystal:"raw_quartz", silica:"raw_quartz" };
  const seq = {}, idFor = new Map(), nodes = [], edges = [], unmapped = new Map();
  const mkId = pfx => { seq[pfx] = (seq[pfx] || 0) + 1; return pfx + "-" + seq[pfx]; };
  let x1 = 1e12, y1 = 1e12, z1 = 1e12;
  for (const m of ex.machines) { x1 = Math.min(x1, m.x); y1 = Math.min(y1, m.y); z1 = Math.min(z1, m.z ?? 0); }
  const S = 0.42;
  const px = m => Math.round(((m.x - x1) * S + ((m.z ?? z1) - z1) * 0.35 * S) / 12) * 12 + 40;
  const py = m => Math.round(((m.y - y1) * S + ((m.z ?? z1) - z1) * 0.35 * S) / 12) * 12 + 40;
  for (const m of ex.machines) {
    const cls = m.cls; let node = null;
    if (cls.startsWith("MinerMk"))
      node = { id: mkId("EXT"), type: "res", x: px(m), y: py(m), label: "CHECK PURITY", resource: "iron_ore",
        extractor: "mk" + cls.slice(-1), purity: "normal", count: 1, clock: m.props.mCurrentPotential ?? 1, override: null };
    else if (cls === "WaterPump")
      node = { id: mkId("EXT"), type: "res", x: px(m), y: py(m), label: "WATER", resource: "water",
        extractor: "water", purity: "normal", count: 1, clock: 1, override: null };
    else if (CM[cls]) {
      const rc = (m.props.mCurrentRecipe || "").split(".").pop();
      let recipe = RM[rc] || null, label = null;
      if (!recipe) {
        if (rc) { unmapped.set(rc, (unmapped.get(rc) || 0) + 1); label = "WAS: " + rc.replace(/^Recipe_|_C$/g, ""); }
        recipe = { smelter:"iron_ingot", foundry:"steel_ingot", constructor:"iron_plate", assembler:"reinforced_iron_plate",
          manufacturer:"heavy_modular_frame", refinery:"plastic" }[CM[cls]];
      }
      node = { id: mkId({smelter:"SML",foundry:"FND",constructor:"CON",assembler:"ASM",manufacturer:"MFR",refinery:"RFN"}[CM[cls]]),
        type: "m", x: px(m), y: py(m), label, mtype: CM[cls], recipe, count: 1, clock: m.props.mCurrentPotential ?? 1, override: null };
    }
    else if (cls.startsWith("ConveyorAttachmentSplitter")) node = { id: mkId("SPL"), type: "split", x: px(m), y: py(m), label: null };
    else if (cls === "ConveyorAttachmentMerger") node = { id: mkId("MRG"), type: "merge", x: px(m), y: py(m), label: null };
    else if (cls.startsWith("StorageContainer")) node = { id: mkId("STO"), type: "store", x: px(m), y: py(m), label: null, buffer: true };
    else if (cls === "TruckStation") node = { id: mkId("TRK"), type: "truck", x: px(m), y: py(m), label: null, buffer: true };
    else if (cls.includes("TrainStation")) node = { id: mkId("TRN"), type: "train", x: px(m), y: py(m), label: null, buffer: true };
    else if (cls === "ResourceSink") node = { id: mkId("OUT"), type: "sink", x: px(m), y: py(m), label: "AWESOME SINK" };
    if (node) { nodes.push(node); idFor.set(m.inst, node.id); }
  }
  const seenE = new Map(); let eseq = 0;
  for (const e of ex.edges) {
    const a = idFor.get(e.from), b = idFor.get(e.to);
    if (!a || !b || a === b) continue;
    const k = a + ">" + b;
    if (seenE.has(k)) { seenE.get(k).link = "b" + Math.min(+seenE.get(k).link.slice(1), Math.max(1, Math.min(e.tier, 6))); continue; }
    const edge = { id: "E" + (++eseq), from: a, to: b, link: "b" + Math.max(1, Math.min(e.tier, 6)) };
    seenE.set(k, edge); edges.push(edge);
  }
  // infer miner ore from downstream recipes
  const outAdj = new Map();
  for (const e of edges) { if (!outAdj.has(e.from)) outAdj.set(e.from, []); outAdj.get(e.from).push(e.to); }
  const byId = new Map(nodes.map(n => [n.id, n]));
  for (const n of nodes) {
    if (n.type !== "res" || n.extractor === "water") continue;
    let q = [n.id]; const vis = new Set(); let found = null;
    for (let d = 0; d < 8 && q.length && !found; d++) {
      const next = [];
      for (const id of q) for (const t of outAdj.get(id) || []) {
        if (vis.has(t)) continue; vis.add(t);
        const tn = byId.get(t);
        if (tn && tn.type === "m" && ORE[tn.recipe]) { found = ORE[tn.recipe]; break; }
        next.push(t);
      }
      q = next;
    }
    if (found) { n.resource = found; n.label = itemName(found).toUpperCase() + " — CHECK PURITY"; }
    else n.label = "SET RESOURCE + PURITY";
  }
  const annos = [
    { id: "A1", kind: "text", x: 40, y: -220, color: null, text: "IMPORTED FROM SAVE", size: 3 },
    { id: "A2", kind: "text", x: 40, y: -140, color: "orange", text: "POSITIONS = YOUR REAL MAP (SCALED) · FLOORS FAN OUT DIAGONALLY", size: 1 },
    { id: "A3", kind: "text", x: 40, y: -100, color: "gray", text: "MINERS: SET PURITY — THE SAVE DOESN'T STORE NODE TYPE (DEFAULTED TO NORMAL)", size: 1 }];
  return { state: { nodes, edges, annos, customRecipes: CR,
      colors: { ...AUTO_COLORS }, seq, eseq, aseq: 3, defaultLink: "b2" },
    report: { unmapped: [...unmapped.entries()], counts: { nodes: nodes.length, edges: edges.length } } };
}

  `);
}
/* MD5 (compact, public-domain construction) — save header integrity hash */
function md5Bytes(u8){
  const K=new Int32Array(64),S=[7,12,17,22,5,9,14,20,4,11,16,23,6,10,15,21];
  for(let i=0;i<64;i++)K[i]=Math.floor(Math.abs(Math.sin(i+1))*4294967296);
  const n=u8.length,m=new Uint8Array(((n+8>>6)+1)<<6);m.set(u8);m[n]=0x80;
  new DataView(m.buffer).setUint32(m.length-8,n<<3,true);
  new DataView(m.buffer).setUint32(m.length-4,Math.floor(n/536870912),true);
  let a0=0x67452301,b0=0xefcdab89,c0=0x98badcfe,d0=0x10325476;
  const dv=new DataView(m.buffer);
  for(let i=0;i<m.length;i+=64){
    let a=a0,b=b0,c=c0,d=d0;
    for(let j=0;j<64;j++){
      let f,g;
      if(j<16){f=(b&c)|(~b&d);g=j;}
      else if(j<32){f=(d&b)|(~d&c);g=(5*j+1)%16;}
      else if(j<48){f=b^c^d;g=(3*j+5)%16;}
      else{f=c^(b|~d);g=(7*j)%16;}
      const t=d;d=c;c=b;
      const x=(a+f+K[j]+dv.getUint32(i+g*4,true))|0,s=S[(j>>4)*4+(j%4)];
      b=(b+((x<<s)|(x>>>32-s)))|0;a=t;
    }
    a0=(a0+a)|0;b0=(b0+b)|0;c0=(c0+c)|0;d0=(d0+d)|0;
  }
  const out=new Uint8Array(16),ov=new DataView(out.buffer);
  ov.setInt32(0,a0,true);ov.setInt32(4,b0,true);ov.setInt32(8,c0,true);ov.setInt32(12,d0,true);
  return out;
}
function findBytes(hay, needle, from){
  outer: for(let i=from||0;i<=hay.length-needle.length;i++){
    for(let j=0;j<needle.length;j++) if(hay[i+j]!==needle[j]) continue outer;
    return i;
  }
  return -1;
}
const latin = s => Uint8Array.from(s, c => c.charCodeAt(0) & 0xff);
/* full body patch: zero mIsCreativeModeEnabled, rechunk, refresh hash + header flag */
async function patchAchvBuffer(buf, hdr){
  const dv=new DataView(buf);
  let bs=0; for(let i=300;i<4000;i++) if(dv.getUint32(i,true)===0x9E2A83C1){bs=i;break;}
  if(!bs) throw new Error("no chunk table");
  const body=await SAV.inflateChunks(buf);
  let flipped=0;
  const nm=findBytes(body, latin("\x17\x00\x00\x00mIsCreativeModeEnabled\x00"));
  if(nm>=0){
    const tp=findBytes(body, latin("\x0d\x00\x00\x00BoolProperty\x00"), nm);
    if(tp>=0){
      const tail=tp+17;
      const noneAt=findBytes(body, latin("\x05\x00\x00\x00None\x00"), tail);
      if(noneAt>tail && noneAt-tail<24)
        for(let k=tail;k<noneAt;k++) if(body[k]){ body[k]=0; flipped++; }
    }
  }
  const CH=131072, parts=[];
  for(let p=0;p<body.length;p+=CH){
    const raw=body.subarray(p,Math.min(p+CH,body.length));
    const comp=new Uint8Array(await new Response(new Blob([raw]).stream().pipeThrough(new CompressionStream("deflate"))).arrayBuffer());
    const h=new Uint8Array(49), hd=new DataView(h.buffer);
    hd.setUint32(0,0x9E2A83C1,true); hd.setUint32(4,0x22222222,true);
    hd.setBigInt64(8,BigInt(CH),true); h[16]=3;
    hd.setBigInt64(17,BigInt(comp.length),true); hd.setBigInt64(25,BigInt(raw.length),true);
    hd.setBigInt64(33,BigInt(comp.length),true); hd.setBigInt64(41,BigInt(raw.length),true);
    parts.push(h,comp);
  }
  let tot=0; for(const p of parts) tot+=p.length;
  const nb=new Uint8Array(tot); let off=0; for(const p of parts){ nb.set(p,off); off+=p.length; }
  const header=new Uint8Array(buf.slice(0,bs));
  const hv=new DataView(header.buffer);
  if(hdr.creativeFlagOffset){
    hv.setInt32(hdr.creativeFlagOffset,0,true);
    header.set(md5Bytes(nb), hdr.creativeFlagOffset-16); // hash = md5 of compressed body
  }
  const out=new Uint8Array(header.length+nb.length);
  out.set(header,0); out.set(nb,header.length);
  return { bytes: out, flipped };
}
async function downloadAchvCopy() {
  const d = window.__lastSavBuf; if (!d) return;

    const pf=makeNode("m",{mtype:"constructor",recipe:"iron_plate",override:30}); // forced 30 plates
    const sf=makeNode("m",{mtype:"constructor",recipe:"screw",override:30});      // forced 30 screws
    const rip=makeNode("m",{mtype:"assembler",recipe:"reinforced_iron_plate"});   // wants 30+60
    makeEdge(pf.id,rip.id,"b2"); makeEdge(sf.id,rip.id,"b2");
    C=solve(state);
    T("forced: RIP eff 50%",near(C.nodeCalc[rip.id].eff,.5),C.nodeCalc[rip.id].eff);
    T("forced: RIP out 2.5",near(C.nodeCalc[rip.id].out.reinforced_iron_plate,2.5),C.nodeCalc[rip.id].out.reinforced_iron_plate);
    T("forced: plate backlog flagged",C.warns.some(w=>w.msg.includes("over-fed")&&w.nodeId===rip.id));
    T("forced: plate over-feed = 15",near((C.nodeCalc[rip.id].recv.iron_plate||0)-(C.nodeCalc[rip.id].consumed.iron_plate||0),15));

    /* T5: buffer absorbs */
    state=blankState();
    const src5=makeNode("res",{resource:"copper_ore",purity:"normal",extractor:"mk1"});
    const st5=makeNode("store",{buffer:true});
    makeEdge(src5.id,st5.id,"b1");
    C=solve(state);
    T("buffer: stores 60/min",near(C.totals.sunk.copper_ore,60),C.totals.sunk.copper_ore);

    /* T6: refinery byproduct surplus */
    state=blankState();
    const oil=makeNode("res",{resource:"crude_oil",extractor:"oil",purity:"normal"}); // 120
    const rf=makeNode("m",{mtype:"refinery",recipe:"plastic",count:4});               // eats 120, makes 80 plastic + 40 HOR
    const sk=makeNode("sink",{});
    makeEdge(oil.id,rf.id,"p1"); makeEdge(rf.id,sk.id,"b2");
    C=solve(state);
    T("refinery: 100%",near(C.nodeCalc[rf.id].eff,1),C.nodeCalc[rf.id].eff);
    T("refinery: plastic 80 to sink",near(C.nodeCalc[sk.id].absorbed.plastic||0,80),C.nodeCalc[sk.id].absorbed.plastic);
    T("refinery: HOR 40 sunk too",near(C.nodeCalc[sk.id].absorbed.heavy_oil_residue||0,40),C.nodeCalc[sk.id].absorbed.heavy_oil_residue);

    /* T7: overclock power: constructor @250% = 4×2.5^1.3219 ≈ 13.43 */
    state=blankState();
    const oc=makeNode("m",{mtype:"constructor",recipe:"iron_rod",clock:2.5});
    C=solve(state);
    T("power: 250% constructor ≈13.43 MW",near(C.nodeCalc[oc.id].power,13.43,0.02),C.nodeCalc[oc.id].power);

    /* T8: uneven mergers rebalance (30 + 90 through storage to 120 demand) */
    state=blankState();
    const a8=makeNode("res",{resource:"iron_ore",purity:"impure",extractor:"mk1"});          // 30
    const b8=makeNode("res",{resource:"iron_ore",purity:"normal",extractor:"mk2"});          // 120 avail, demand-limited
    const st8=makeNode("store",{});
    const sm8=makeNode("m",{mtype:"smelter",recipe:"iron_ingot",count:4});                   // wants 120
    makeEdge(a8.id,st8.id,"b2"); makeEdge(b8.id,st8.id,"b2"); makeEdge(st8.id,sm8.id,"b2");
    C=solve(state);
    T("rebalance: smelters 100%",near(C.nodeCalc[sm8.id].eff,1),C.nodeCalc[sm8.id].eff);
    T("rebalance: 30 untapped at B", near(C.totals.untapped.iron_ore,30),C.totals.untapped.iron_ore);

    /* T9: wrong-item wiring flagged */
    state=blankState();
    const cu=makeNode("res",{resource:"copper_ore",purity:"normal",extractor:"mk1"});
    const ip=makeNode("m",{mtype:"constructor",recipe:"iron_plate"});
    makeEdge(cu.id,ip.id,"b1");
    C=solve(state);
    T("wiring: no copper into plate maker",!(C.nodeCalc[ip.id].recv.copper_ore>EPS));
    T("wiring: plate maker starved 0%",near(C.nodeCalc[ip.id].eff,0),C.nodeCalc[ip.id].eff);

    /* T10: smart plating chain exact (2×RIP + 2×rotor → smart plating ×5 like the calculator screenshot) */
    state=blankState();
    const fRIP=makeNode("m",{mtype:"assembler",recipe:"reinforced_iron_plate",count:2,override:10});
    const fROT=makeNode("m",{mtype:"assembler",recipe:"rotor",count:3,override:10});
    const sp=makeNode("m",{mtype:"assembler",recipe:"smart_plating",count:5});
    const out10=makeNode("sink",{});
    makeEdge(fRIP.id,sp.id,"b1"); makeEdge(fROT.id,sp.id,"b1"); makeEdge(sp.id,out10.id,"b1");
    C=solve(state);
    T("smart plating: 10/min out",near(C.nodeCalc[out10.id].absorbed.smart_plating||0,10),C.nodeCalc[out10.id].absorbed.smart_plating);

    /* T11: two items share one belt through a storage into a sink */
    state=blankState();
    const oil11=makeNode("res",{resource:"crude_oil",extractor:"oil",purity:"normal"}); // 120
    const rf11=makeNode("m",{mtype:"refinery",recipe:"rubber",count:4});                // 80 rubber + 80 HOR
    const st11=makeNode("store",{});
    const sk11=makeNode("sink",{});
    makeEdge(oil11.id,rf11.id,"p1"); makeEdge(rf11.id,st11.id,"b3"); makeEdge(st11.id,sk11.id,"b3");
    C=solve(state);
    T("mixed thru: rubber 80 sunk",near(C.nodeCalc[sk11.id].absorbed.rubber||0,80),C.nodeCalc[sk11.id].absorbed.rubber);
    T("mixed thru: HOR 80 sunk",near(C.nodeCalc[sk11.id].absorbed.heavy_oil_residue||0,80),C.nodeCalc[sk11.id].absorbed.heavy_oil_residue);
    T("mixed thru: belt 160/270",near(C.edgeCalc[state.edges[2].id].total,160),C.edgeCalc[state.edges[2].id].total);

    /* T12: overflow priority — LOADING storage must not steal from machines */
    state=blankState();
    const src12=makeNode("res",{resource:"iron_ore",purity:"normal",extractor:"mk1"});      // 60
    const sm12=makeNode("m",{mtype:"smelter",recipe:"iron_ingot",count:2});                 // wants all 60
    const st12=makeNode("store",{buffer:true});
    makeEdge(src12.id,sm12.id,"b2"); makeEdge(src12.id,st12.id,"b2");
    C=solve(state);
    T("overflow: machines fed first (100%)",near(C.nodeCalc[sm12.id].eff,1),C.nodeCalc[sm12.id].eff);
    T("overflow: storage gets nothing when machines want it all",!(C.totals.sunk.iron_ore>EPS),C.totals.sunk.iron_ore);
    sm12.count=1;                                                                            // now wants only 30
    C=solve(state);
    T("overflow: storage siphons the true surplus",near(C.totals.sunk.iron_ore,30),C.totals.sunk.iron_ore);
    T("overflow: machine still 100%",near(C.nodeCalc[sm12.id].eff,1),C.nodeCalc[sm12.id].eff);
  }catch(err){ fail++; out.push("EXCEPTION  "+err.message+"\n"+err.stack); }
  state=keep.state; sel=keep.sel; refresh();
  const summary=`${pass} passed, ${fail} failed`;
  console.log("__TESTS: "+summary+"\n"+out.join("\n"));
  return {pass,fail,summary,detail:out};
};

/* ════════════════════════════════════════════════════════════
   BOOT
   ════════════════════════════════════════════════════════════ */
(function boot(){
  let th=null;
  try{ th=localStorage.getItem(THEME_KEY); }catch(_){}
  if(th!=="light"&&th!=="dark")
    th=(window.matchMedia&&matchMedia("(prefers-color-scheme: light)").matches)?"light":"dark";
  applyTheme(th);
  loadBPs(); renderBPs();
  let loaded=null;
  try{ loaded=JSON.parse(localStorage.getItem(LS_KEY)); }catch(_){}
  if(loaded&&loaded.state&&Array.isArray(loaded.state.nodes)&&loaded.state.nodes.length){
    state=normalizeState(loaded.state); if(loaded.view) view=loaded.view;
    refresh(); applyView();
  }else{
    buildDemo(); refresh(); applyView();
    setTimeout(fitView,50);
  }
})();
window.addEventListener("resize",applyView);
</script>
