<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SATISFACTORY — TRES.</title>
<!-- tracking: one bootstrap for the whole site (Umami + Clarity + visitor id + self-exclusion) - public/ts.js -->
<script defer src="/ts.js"></script>
<script type="module">import { autoReveal } from '/mv/curtain.js'; autoReveal();</script>
<style>
/* ============================================================
   TRES FACTORY — monochrome industrial schematic
   ============================================================ */
:root{
  --bg:#050607; --panel:#0a0b0d; --panel2:#0d0f11; --card:#0c0e10;
  --line:#26292e; --line2:#3a3e45; --dim:#6b7078; --mid:#9aa0a8;
  --fg:#e8eaed; --hot:#ffffff;
  --gridline:rgba(232,234,237,.025); --gridline2:rgba(232,234,237,.055);
  --vig:rgba(0,0,0,.55); --selglow:rgba(255,255,255,.13);
  --mono:"Cascadia Mono","JetBrains Mono",Consolas,"Courier New",ui-monospace,monospace;
}
html[data-theme="light"]{
  --bg:#eceef0; --panel:#f6f7f8; --panel2:#eef0f2; --card:#fbfcfc;
  --line:#d7dade; --line2:#bfc4ca; --dim:#7d838c; --mid:#4c525a;
  --fg:#1c1e22; --hot:#000000;
  --gridline:rgba(28,30,34,.045); --gridline2:rgba(28,30,34,.085);
  --vig:rgba(0,0,0,.07); --selglow:rgba(0,0,0,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--fg); font-family:var(--mono);
  font-size:12px; overflow:hidden; -webkit-font-smoothing:antialiased;
}
::selection{background:var(--fg);color:var(--bg)}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--line2);border:2px solid var(--panel)}
::-webkit-scrollbar-track{background:transparent}

#app{display:grid;grid-template-rows:auto 1fr 30px;height:100vh;min-width:0}
#mid{display:grid;grid-template-columns:236px minmax(0,1fr) 292px;min-height:0;min-width:0}

/* ---------- header ---------- */
#hdr{display:flex;align-items:center;flex-wrap:wrap;gap:8px 14px;padding:8px 14px;border-bottom:1px solid var(--line);background:var(--panel);min-height:46px}
#logo{display:flex;align-items:baseline;gap:10px;white-space:nowrap}
#logo .glyph{font-size:15px;color:var(--hot)}
#logo b{font-size:15px;letter-spacing:.22em;color:var(--hot);font-weight:700}
#logo span{font-size:9px;letter-spacing:.18em;color:var(--dim)}
#hdr .sep{flex:1}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);padding:3px 9px;font-size:10px;letter-spacing:.1em;color:var(--mid);white-space:nowrap}
.chip b{color:var(--hot);font-weight:700}
.chip.alert b{color:var(--hot)}
.chip.alert.on{border-color:var(--fg);background:var(--fg)}
.chip.alert.on *{color:var(--bg)}
.hbtn{border:1px solid var(--line2);background:none;color:var(--mid);font:inherit;font-size:10px;letter-spacing:.14em;padding:5px 10px;cursor:pointer}
.hbtn:hover{border-color:var(--fg);color:var(--hot)}
.hbtn.pri{border-color:var(--fg);color:var(--hot)}

/* ---------- panels ---------- */
.panel{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;overflow:hidden}
#rpanel{border-right:none;border-left:1px solid var(--line)}
.psec{border-bottom:1px solid var(--line)}
.ptitle{font-size:9px;letter-spacing:.24em;color:var(--dim);padding:9px 12px 7px;display:flex;justify-content:space-between;align-items:center}
.ptitle .n{color:var(--mid)}
.pscroll{overflow-y:auto;flex:1;min-height:0}
#palscroll{flex:0 1 auto;min-height:0;overflow-y:auto} /* tool list scrolls on short screens */
#palResize{flex:0 0 8px;cursor:ns-resize;background:var(--panel2);border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:grid;place-items:center;user-select:none}
#palResize::before{content:"···";color:var(--dim);font-size:10px;letter-spacing:.35em;line-height:0;transform:translateY(-1px)}
#palResize:hover,#palResize.on{background:var(--line2)}

/* palette */
.tool{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;border-top:1px solid transparent;
  color:var(--mid);font:inherit;font-size:11px;letter-spacing:.08em;padding:6px 12px;cursor:pointer;text-align:left}
.tool:hover{color:var(--hot);background:var(--panel2)}
.tool .g{width:18px;height:18px;flex:none;border:1px solid var(--line2);display:grid;place-items:center;font-size:9px;color:var(--fg)}
.tool:hover .g{border-color:var(--fg)}

/* warnings list */
.witem{width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);
  color:var(--mid);font:inherit;font-size:10px;line-height:1.5;padding:7px 12px;cursor:pointer;display:flex;gap:8px}
.witem:hover{background:var(--panel2);color:var(--fg)}
.witem .wg{flex:none;width:14px;height:14px;border:1px solid var(--fg);color:var(--fg);display:grid;place-items:center;font-size:9px;margin-top:1px}
.witem.cap .wg{border-color:var(--dim);color:var(--dim)}
.wempty{padding:12px;font-size:10px;color:var(--dim);letter-spacing:.1em}

/* ---------- canvas ---------- */
#viewport{position:relative;overflow:hidden;background:var(--bg);cursor:crosshair;min-width:0}
#viewport::after{content:"";position:absolute;inset:0;pointer-events:none;
  box-shadow:inset 0 0 90px var(--vig)}
#grid{position:absolute;inset:0;pointer-events:none}
#marq{position:absolute;border:1px dashed var(--hot);background:var(--selglow);display:none;pointer-events:none;z-index:5}
#world{position:absolute;left:0;top:0;transform-origin:0 0}
#edgesvg{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
#edgesvg .epath{fill:none;stroke:var(--dim);stroke-width:var(--esw,1.4px);pointer-events:stroke;cursor:pointer}
#edgesvg .epath.live{stroke:var(--fg)}
#edgesvg .epath.sel{stroke:var(--hot);stroke-width:calc(var(--esw,1.4px)*1.6)}
#edgesvg .epath.idle{stroke-dasharray:5 4}
#edgesvg .ehalo{fill:none;stroke:transparent;stroke-width:var(--ehw,14px);pointer-events:stroke;cursor:pointer}
#edgesvg .temp{fill:none;stroke:var(--hot);stroke-width:1.4;stroke-dasharray:6 4}
#world.lod #elabels{display:none}
.elabel{position:absolute;transform:translate(-50%,-50%);background:var(--bg);border:1px solid var(--line2);
  padding:2px 6px;font-size:9px;letter-spacing:.06em;color:var(--mid);white-space:nowrap;cursor:pointer;line-height:1.45}
.elabel b{color:var(--fg);font-weight:400}
.elabel.sel{border-color:var(--hot);color:var(--fg)}
.elabel.sat{border-style:double;border-width:3px;padding:0 5px}
.elabel .cap{color:var(--dim)}

/* ---------- node card ---------- */
.node{position:absolute;width:196px;background:var(--card);border:1px solid var(--nc,var(--line2));cursor:grab;user-select:none}
.node:active{cursor:grabbing}
.node.sel{border-color:var(--hot);box-shadow:0 0 0 1px var(--hot),0 0 24px var(--selglow)}
.node.warn{border-style:dashed}
.node.msel,.anno.msel{outline:2px dashed var(--hot);outline-offset:4px}
/* bank unit squares — one tick per machine, full-detail view only */
.ucount{position:absolute;top:calc(100% + 8px);left:0;display:flex;flex-wrap:wrap;gap:4px;max-width:196px;pointer-events:none}
.usq{width:11px;height:11px;background:var(--nc,var(--dim));opacity:.85;box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
html[data-theme="light"] .usq{box-shadow:inset 0 0 0 1px rgba(255,255,255,.5)}
.umore{font-size:9px;color:var(--dim);letter-spacing:.08em;line-height:11px;align-self:center}
/* LOD blocks — semantic zoom: node becomes a filled slab of its type color */
.node.lod{border:none;opacity:.92}
.node.lod .tick{display:none}
.node.lod.warn{outline:2px dashed var(--hot);outline-offset:2px}
.node.lod.sel{box-shadow:0 0 0 3px var(--hot)}
.node .tick{position:absolute;width:7px;height:7px;border:1px solid var(--nc,var(--line2));pointer-events:none}
.node.sel .tick{border-color:var(--hot)}
.node .tick.tl{left:-4px;top:-4px;border-right:none;border-bottom:none}
.node .tick.tr{right:-4px;top:-4px;border-left:none;border-bottom:none}
.node .tick.bl{left:-4px;bottom:-4px;border-right:none;border-top:none}
.node .tick.br{right:-4px;bottom:-4px;border-left:none;border-top:none}
.nhead{display:flex;align-items:center;gap:7px;padding:6px 8px;border-bottom:1px solid var(--line)}
.nhead .nid{font-size:9px;letter-spacing:.1em;color:var(--dim);flex:none}
.nhead .nname{font-size:10px;letter-spacing:.12em;color:var(--nc,var(--hot));font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nhead .nwarn{margin-left:auto;flex:none;width:14px;height:14px;border:1px solid var(--fg);display:grid;place-items:center;font-size:9px}
.nbody{padding:6px 8px;display:flex;flex-direction:column;gap:3px}
.nrow{display:flex;justify-content:space-between;gap:8px;font-size:10px;color:var(--mid);line-height:1.5}
.nrow .k{color:var(--dim);letter-spacing:.06em;flex:none}
.nrow .v{text-align:right;color:var(--fg)}
.nrow .v.dim{color:var(--dim)}
.nrow .v.hot{color:var(--hot);font-weight:700}
.effwrap{display:flex;align-items:center;gap:7px;margin:2px 0}
.effbar{flex:1;height:5px;border:1px solid var(--line2);position:relative}
.effbar i{position:absolute;left:0;top:0;bottom:0;background:var(--nc,var(--fg))}
.effpct{font-size:9px;color:var(--fg);width:38px;text-align:right}
.port{position:absolute;width:9px;height:9px;background:var(--bg);border:1px solid var(--nc,var(--fg));transform:rotate(45deg);cursor:pointer;z-index:3}
.port::after{content:"";position:absolute;inset:-8px} /* fat hit target */
.port:hover{background:var(--nc,var(--fg))}

/* ---------- annotations: movable text + divider lines ---------- */
#annos{position:absolute;left:0;top:0}
.anno{position:absolute;cursor:grab;user-select:none}
.anno:active{cursor:grabbing}
.anno.sel{outline:1px dashed var(--hot);outline-offset:8px}
.atext{color:var(--ac,var(--dim));font-weight:700;letter-spacing:.32em;white-space:pre;line-height:1.35}
.atext.s1{font-size:11px}.atext.s2{font-size:17px}.atext.s3{font-size:28px}.atext.s4{font-size:46px}
.aline::before{content:"";position:absolute;inset:-8px} /* grab band */
.aline.h{border-top:1px dashed var(--ac,var(--line2));height:0}
.aline.v{border-left:1px dashed var(--ac,var(--line2));width:0}
.port.in{left:-5px;top:50%;margin-top:-5px}
.port.out{right:-5px;top:50%;margin-top:-5px}
.badge{display:inline-block;border:1px solid var(--fg);color:var(--fg);font-size:8px;letter-spacing:.12em;padding:0 4px;margin-left:5px}
.badge.inv{background:var(--fg);color:var(--bg)}

/* ---------- inspector ---------- */
#insp{padding:0;overflow-y:auto;flex:1}
.ihead{padding:10px 12px;border-bottom:1px solid var(--line)}
.ihead .t1{font-size:9px;letter-spacing:.22em;color:var(--dim)}
.ihead .t2{font-size:13px;letter-spacing:.14em;color:var(--hot);font-weight:700;margin-top:3px}
.igroup{padding:10px 12px;border-bottom:1px solid var(--line)}
.ilabel{font-size:9px;letter-spacing:.2em;color:var(--dim);margin-bottom:5px}
.irow{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.irow:last-child{margin-bottom:0}
select,input[type=text],input[type=number]{
  width:100%;background:var(--bg);border:1px solid var(--line2);color:var(--fg);
  font:inherit;font-size:11px;padding:5px 7px;outline:none}
select:focus,input:focus{border-color:var(--fg)}
select option{background:var(--bg)}
input[type=range]{width:100%;accent-color:#e8eaed;background:transparent}
.stepper{display:flex;border:1px solid var(--line2)}
.stepper button{background:none;border:none;color:var(--fg);font:inherit;width:26px;padding:4px 0;cursor:pointer}
.stepper button:hover{background:var(--fg);color:var(--bg)}
.stepper input{border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);text-align:center;width:60px}
.ibtn{width:100%;background:none;border:1px solid var(--line2);color:var(--mid);font:inherit;font-size:10px;
  letter-spacing:.16em;padding:6px;cursor:pointer;margin-bottom:6px}
.ibtn:hover{border-color:var(--fg);color:var(--hot)}
.ibtn.danger:hover{background:var(--fg);color:var(--bg)}
.ibtn:last-child{margin-bottom:0}
.kv{display:flex;justify-content:space-between;font-size:10px;color:var(--mid);line-height:1.7}
.kv b{color:var(--fg);font-weight:400}
.linkgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.linkbtn{border:1px solid var(--line2);background:none;color:var(--mid);font:inherit;font-size:9px;
  letter-spacing:.08em;padding:5px 4px;cursor:pointer;text-align:center;line-height:1.5}
.linkbtn:hover{border-color:var(--fg);color:var(--fg)}
.linkbtn.on{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.itip{font-size:9px;color:var(--dim);line-height:1.7;letter-spacing:.04em}
.buildsheet{font-size:10px;color:var(--mid);line-height:1.75;letter-spacing:.03em}
.buildsheet b{color:var(--fg);font-weight:400}
.buildsheet .step{margin-bottom:8px}
.buildsheet .step:last-child{margin-bottom:0}
.checkrow{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--mid);cursor:pointer;letter-spacing:.08em}
.checkrow input{width:auto;accent-color:#e8eaed}

/* ---------- footer ---------- */
#ftr{display:flex;align-items:center;gap:18px;padding:0 14px;border-top:1px solid var(--line);
  background:var(--panel);font-size:10px;color:var(--dim);letter-spacing:.1em;overflow:hidden;white-space:nowrap}
#ftr b{color:var(--fg);font-weight:400}
#ftr .lead{color:var(--dim)}

/* ---------- modal ---------- */
#modal{position:fixed;inset:0;background:rgba(5,6,7,.82);display:none;place-items:center;z-index:50}
#modal.open{display:grid}
#mbox{width:min(680px,92vw);max-height:86vh;overflow-y:auto;background:var(--panel);border:1px solid var(--line2);
  box-shadow:0 0 60px rgba(0,0,0,.8)}
#mbox .mh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
#mbox .mh b{letter-spacing:.2em;font-size:12px;color:var(--hot)}
#mbox .mh button{background:none;border:1px solid var(--line2);color:var(--fg);font:inherit;padding:2px 9px;cursor:pointer}
#mbox .mc{padding:16px}
#mbox h4{font-size:10px;letter-spacing:.22em;color:var(--dim);margin:16px 0 7px;font-weight:400}
#mbox h4:first-child{margin-top:0}
#mbox p,#mbox li{font-size:11px;color:var(--mid);line-height:1.8}
#mbox ul{list-style:none}
#mbox li::before{content:"— ";color:var(--dim)}
#mbox table{width:100%;border-collapse:collapse;margin:6px 0}
#mbox th,#mbox td{border:1px solid var(--line);padding:4px 8px;font-size:10px;text-align:left;color:var(--mid)}
#mbox th{color:var(--dim);letter-spacing:.14em;font-weight:400}
#mbox td b{color:var(--fg);font-weight:400}
kbd{border:1px solid var(--line2);padding:0 5px;font-size:10px;color:var(--fg)}

/* items drawer table */
#itemsTable td.num{text-align:right}

.crrow{display:grid;grid-template-columns:1fr 90px;gap:6px;margin-bottom:6px}

/* blueprints */
.bprow{display:flex;border-bottom:1px solid var(--line)}
.bpstamp{flex:1;display:flex;justify-content:space-between;align-items:center;gap:8px;background:none;border:none;
  color:var(--mid);font:inherit;font-size:10px;letter-spacing:.1em;padding:8px 10px;cursor:pointer;text-align:left;min-width:0}
.bpstamp b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:400;color:var(--fg)}
.bpstamp span{flex:none;color:var(--dim);font-size:9px}
.bpstamp:hover{background:var(--panel2)}
.bpstamp:hover b{color:var(--hot)}
.bpdel{flex:none;background:none;border:none;border-left:1px solid var(--line);color:var(--dim);font:inherit;
  font-size:10px;padding:0 10px;cursor:pointer}
.bpdel:hover{background:var(--fg);color:var(--bg)}
#toast{position:fixed;left:50%;bottom:44px;transform:translateX(-50%);background:var(--fg);color:var(--bg);
  padding:6px 14px;font-size:10px;letter-spacing:.14em;display:none;z-index:60}
</style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <a href="/lab" class="hbtn" style="text-decoration:none">← LAB</a>
    <div id="logo"><span class="glyph">▣</span><b>TRES&nbsp;FACTORY</b><span>THE FACTORY, VISUALIZED</span></div>
    <div class="sep"></div>
    <button class="hbtn pri" id="btnSave">⭳ SAVE FILE</button>
    <button class="hbtn" id="btnBulk">BULK</button>
    <button class="hbtn" id="btnTheme">◑ LIGHT</button>
    <span class="chip">POWER <b id="stPower">0 MW</b></span>
    <span class="chip">MACHINES <b id="stMach">0</b></span>
    <span class="chip alert" id="stAlertChip">ALERTS <b id="stAlerts">0</b></span>
    <button class="hbtn" id="btnItems">ITEMS</button>
    <button class="hbtn" id="btnColors">COLORS</button>
    <button class="hbtn" id="btnSelect">⬚ SELECT</button>
    <button class="hbtn" id="btnFit">FIT</button>
    <button class="hbtn" id="btnExport">EXPORT</button>
    <button class="hbtn" id="btnImport">IMPORT</button>
    <button class="hbtn" id="btnDemo">DEMO</button>
    <button class="hbtn" id="btnNew">NEW</button>
    <button class="hbtn pri" id="btnHelp">HELP</button>
  </header>

  <div id="mid">
    <aside class="panel" id="lpanel">
      <div id="palscroll">
      <div class="psec">
        <div class="ptitle">EXTRACTION</div>
        <button class="tool" data-add="res:miner"><span class="g">◆</span>ORE NODE + MINER</button>
        <button class="tool" data-add="res:oil"><span class="g">●</span>OIL EXTRACTOR</button>
        <button class="tool" data-add="res:water"><span class="g">~</span>WATER EXTRACTOR</button>
      </div>
      <div class="psec">
        <div class="ptitle">PRODUCTION</div>
        <button class="tool" data-add="m:smelter"><span class="g">▲</span>SMELTER</button>
        <button class="tool" data-add="m:foundry"><span class="g">▲▲</span>FOUNDRY</button>
        <button class="tool" data-add="m:constructor"><span class="g">□</span>CONSTRUCTOR</button>
        <button class="tool" data-add="m:assembler"><span class="g">◫</span>ASSEMBLER</button>
        <button class="tool" data-add="m:manufacturer"><span class="g">▦</span>MANUFACTURER</button>
        <button class="tool" data-add="m:refinery"><span class="g">◎</span>REFINERY</button>
      </div>
      <div class="psec">
        <div class="ptitle">LOGISTICS</div>
        <button class="tool" data-add="split"><span class="g">⋔</span>SPLITTER</button>
        <button class="tool" data-add="merge"><span class="g">⋎</span>MERGER</button>
        <button class="tool" data-add="store"><span class="g">▢</span>STORAGE</button>
        <button class="tool" data-add="truck"><span class="g">▣</span>TRUCK STATION</button>
        <button class="tool" data-add="train"><span class="g">═</span>TRAIN STATION</button>
        <button class="tool" data-add="sink"><span class="g">◉</span>SINK / OUTPUT</button>
      </div>
      <div class="psec">
        <div class="ptitle">ANNOTATE</div>
        <button class="tool" data-add="anno:text"><span class="g">T</span>TEXT LABEL</button>
        <button class="tool" data-add="anno:line"><span class="g">┊</span>DIVIDER LINE</button>
      </div>
      <div class="psec">
        <button class="tool" id="btnCustom"><span class="g">+</span>CUSTOM RECIPE</button>
      </div>
      </div>
      <div id="palResize" title="drag to resize · double-click to reset"></div>
      <div class="psec" style="flex:1;display:flex;flex-direction:column;min-height:110px;border-bottom:none">
        <div class="ptitle">DIAGNOSTICS <span class="n" id="wcount"></span></div>
        <div class="pscroll" id="wlist"></div>
      </div>
    </aside>

    <div id="viewport">
      <div id="grid"></div>
      <div id="marq"></div>
      <div id="world">
        <svg id="edgesvg" width="10" height="10"></svg>
        <div id="nodes"></div>
        <div id="elabels"></div>
        <div id="annos"></div>
      </div>
    </div>

    <aside class="panel" id="rpanel">
      <div id="insp"></div>
      <div class="psec" style="border-top:1px solid var(--line);border-bottom:none">
        <div class="ptitle">BLUEPRINTS <span class="n" id="bpcount"></span></div>
        <div id="bplist" style="max-height:190px;overflow-y:auto"></div>
      </div>
    </aside>
  </div>

  <footer id="ftr"><span class="lead">NET&nbsp;//</span><span id="ticker">—</span></footer>
</div>

<div id="modal"><div id="mbox">
  <div class="mh"><b id="mtitle">—</b><button id="mclose">ESC</button></div>
  <div class="mc" id="mbody"></div>
</div></div>
<div id="toast"></div>
<input type="file" id="fileInput" accept=".json" style="display:none">
<input type="file" id="savInput" accept=".sav" style="display:none">

<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   GAME DATA — Satisfactory 1.0, standard recipes.
   All rates are items (or m³) PER MINUTE at 100% clock.

function nid(type, mtype){
  const pfx = type==="m" ? (M_PREFIX[mtype]||"MCH") : TYPE_META[type].prefix;
  do{ state.seq[pfx] = (state.seq[pfx]||0)+1; }
  while(state.nodes.some(n=>n.id===pfx+"-"+state.seq[pfx])); // survive hand-edited saves
  return pfx+"-"+state.seq[pfx];
}
function nextEdgeId(){
  do{ state.eseq++; } while(state.edges.some(e=>e.id==="E"+state.eseq));
  return "E"+state.eseq;
}
function nextAnnoId(){
  do{ state.aseq++; } while((state.annos||[]).some(a=>a.id==="A"+state.aseq));
  return "A"+state.aseq;
}
function makeNode(type, opts={}){
  const n = {id:nid(type,opts.mtype), type, x:opts.x||0, y:opts.y||0, label:opts.label||null};
  if(type==="res"){
    n.resource = opts.resource||"iron_ore";
    n.extractor = opts.extractor||"mk1";
    n.purity = opts.purity||"normal";
    n.count = opts.count||1; n.clock = opts.clock||1; n.override = opts.override??null;
  }else if(type==="m"){
    n.mtype = opts.mtype||"smelter";
    n.recipe = opts.recipe || allRecipes().find(r=>r.b===n.mtype).id;
    n.count = opts.count||1; n.clock = opts.clock||1; n.override = opts.override??null;
  }else if(CAN_BUFFER.has(type)){
    n.buffer = opts.buffer??false;
  }
  state.nodes.push(n);
  return n;
}
function makeEdge(from,to,link){
  if(from===to) return null;
  if(state.edges.some(e=>e.from===from&&e.to===to)) return null;
  const src = getNode(from);
  let lk = link || state.defaultLink;
  if(!link && src){ // auto-pick pipe when the source emits fluids
    const em = staticEmits(src);
    if([...em].some(i=>FLUIDS.has(i))) lk = "p1";
  }
  const e = {id:nextEdgeId(), from, to, link:lk};
  state.edges.push(e);
  return e;
}
function makeAnno(kind,opts={}){
  const a={id:nextAnnoId(),kind,x:opts.x||0,y:opts.y||0,color:opts.color||null};
  if(kind==="text"){ a.text=opts.text||"SECTION"; a.size=opts.size||2; }
  else{ a.orient=opts.orient||"v"; a.len=opts.len||480; }
  state.annos.push(a);

}
function getAnno(id){ return (state.annos||[]).find(a=>a.id===id); }
function getNode(id){ return state.nodes.find(n=>n.id===id); }
function getEdge(id){ return state.edges.find(e=>e.id===id); }
function delNode(id){
  state.edges = state.edges.filter(e=>e.from!==id&&e.to!==id);
  state.nodes = state.nodes.filter(n=>n.id!==id);

function staticEmits(n){
  if(n.type==="res") return new Set([n.resource]);
  if(n.type==="m"){ const r=getRecipe(n.recipe); return new Set(r?Object.keys(r.out):[]); }
  return new Set(); // passthrough resolved in solve
}

/* ════════════════════════════════════════════════════════════
   SOLVER — demand-driven steady-state flow.
   Round = reverse demand sweep + forward supply sweep.
   Machines always demand full input need; over-feed relative to
   actual consumption is reported as backlog (belts back up in game).
   ════════════════════════════════════════════════════════════ */
function waterfill(amount, edges, capOf){
  const alloc = new Map(edges.map(e=>[e.id,0]));
  if(!(amount>EPS) || !edges.length) return alloc;
  let remaining = amount;
  let active = edges.filter(e=>capOf(e)>EPS);
  let guard=0;
  while(remaining>EPS && active.length && guard++<400){
    const share = remaining===Infinity ? Infinity : remaining/active.length;
    let given=0;
    for(const e of active){
      const room = capOf(e)-alloc.get(e.id);
      const g = Math.min(share,room);
      if(g>EPS){ alloc.set(e.id,alloc.get(e.id)+g); given+=g; }
    }
    if(remaining!==Infinity) remaining-=given;
    active = active.filter(e=>capOf(e)-alloc.get(e.id)>EPS);
    if(given<EPS) break;
  }
  return alloc;
}
function sumVals(o){ let s=0; for(const k in o) s+=o[k]; return s; }

function resourceRate(n){
  const ex = EXTRACTORS[n.extractor];
  const base = ex.rates[n.purity] ?? ex.rates.normal;
  return (n.override!=null && n.override>=0) ? n.override : base*n.count*n.clock;
}
/* machine spec: needs + potential outputs (before input limits) */
function machineSpec(n){
  const r = getRecipe(n.recipe);
  if(!r) return {needs:{},outs:{},forced:false};
  const primary = Object.keys(r.out)[0];
  let f = n.count*n.clock, forced=false;
  if(n.override!=null && n.override>=0){ f = n.override/r.out[primary]; forced=true; }
  const needs={},outs={};
  for(const k in r.in) needs[k]=r.in[k]*f;
  for(const k in r.out) outs[k]=r.out[k]*f;
  return {needs,outs,forced,recipe:r};
}
function nodePower(n){
  if(n.type==="res") return EXTRACTORS[n.extractor].power * n.count * Math.pow(n.clock,PWR_EXP);
  if(n.type==="m")   return BUILDINGS[n.mtype].power * n.count * Math.pow(n.clock,PWR_EXP);
  return 0;
}

function solve(st){
  const nodes = st.nodes, edges = st.edges;
  const inE={},outE={};
  for(const n of nodes){ inE[n.id]=[]; outE[n.id]=[]; }
  for(const e of edges){
    if(!inE[e.to]||!outE[e.from]) continue;
    inE[e.to].push(e); outE[e.from].push(e);
  }
  const cap = e => LINK_BY_ID[e.link].cap;

  /* --- static: which items can each node emit (fixpoint thru passthrough) --- */
  const emits={};
  for(const n of nodes) emits[n.id] = PASSTHRU.has(n.type)||n.type==="sink" ? new Set() : staticEmits(n);
  let grew=true, gguard=0;
  while(grew && gguard++<nodes.length+2){
    grew=false;
    for(const n of nodes){
      if(!PASSTHRU.has(n.type)) continue;
      for(const e of inE[n.id]) for(const it of emits[e.from])
        if(!emits[n.id].has(it)){ emits[n.id].add(it); grew=true; }
    }
  }
  const ePossible={}; for(const e of edges) ePossible[e.id]=emits[e.from];

  /* --- topological order (Kahn) --- */
  const indeg={}; for(const n of nodes) indeg[n.id]=0;
  for(const e of edges) if(indeg[e.to]!=null) indeg[e.to]++;
  const order=[]; const q=nodes.filter(n=>indeg[n.id]===0).map(n=>n.id);
  const indg={...indeg};
  while(q.length){ const id=q.shift(); order.push(id);
    for(const e of outE[id]) if(--indg[e.to]===0) q.push(e.to); }
  const cyclic = order.length<nodes.length;
  if(cyclic) for(const n of nodes) if(!order.includes(n.id)) order.push(n.id);
  const rev=[...order].reverse();
  let depth=0; { const d={}; for(const id of order){ d[id]=0;
    for(const e of inE[id]) if(d[e.from]!=null) d[id]=Math.max(d[id],d[e.from]+1); depth=Math.max(depth,d[id]); } }
  const rounds = cyclic ? 200 : Math.max(60, depth+8); // geometric convergence → run to FP floor

  /* --- iterate --- */
  const flow={}, dem={}, surplus={};
  for(const e of edges) flow[e.id]={};
  for(const n of nodes) surplus[n.id]={};
  const nodeById={}; for(const n of nodes) nodeById[n.id]=n;
  const recvMap={}, outMap={}, effMap={};

  const demandOf = (id)=>{ // what node id wants to pull, or 'ALL'
    const n=nodeById[id];
    if(n.type==="m"){ const s=machineSpec(n); return {mode:"items",items:s.needs}; }
    if(n.type==="sink") return {mode:"all"};
    if(PASSTHRU.has(n.type)){
      if(CAN_BUFFER.has(n.type)&&n.buffer) return {mode:"all"};
      const items={};
      for(const e of outE[id]) for(const it in dem[e.id]||{}) items[it]=(items[it]||0)+dem[e.id][it];
      return {mode:"items",items};
    }
    return null;
  };

  for(let r=0;r<rounds;r++){
    const prevFlow={}; for(const e of edges) prevFlow[e.id]={...flow[e.id]};
    /* reverse: assign per-edge demand */
    for(const id of rev){
      const ins=inE[id]; if(!ins.length) continue;
      for(const e of ins) dem[e.id]={};
      const spec=demandOf(id); if(!spec) continue;
      let items;
      if(spec.mode==="all"){ items=new Set(); for(const e of ins) for(const it of ePossible[e.id]) items.add(it); }
      else items=new Set(Object.keys(spec.items));
      /* Demand is a per-item upper bound capped at each link's tier; actual
         belt sharing across items is enforced in the forward pass. */
      for(const it of [...items].sort()){
        const target = spec.mode==="all" ? Infinity : spec.items[it];
        if(!(target>EPS)) continue;
        const elig = ins.filter(e=>ePossible[e.id].has(it));
        if(!elig.length) continue;
        // tier 1: prefer routes with demonstrated supply (prev round flow + source leftover)
        const avail = e => (flow[e.id][it]||0) + (surplus[e.from][it]||0);
        const a1 = waterfill(target, elig, e=>Math.min(cap(e), avail(e)));
        let got=0; for(const e of elig){ dem[e.id][it]=a1.get(e.id)||0; got+=dem[e.id][it]; }
        let rem = target===Infinity?Infinity:target-got;
        if(rem>EPS){
          const a2 = waterfill(rem, elig, e=>cap(e)-(dem[e.id][it]||0));
          for(const e of elig) dem[e.id][it]+=a2.get(e.id)||0;
        }
      }
    }
    /* forward: produce + distribute */
    for(const id of order){
      const n=nodeById[id];
      const recv={};
      for(const e of inE[id]) for(const it in flow[e.id]) recv[it]=(recv[it]||0)+flow[e.id][it];
      recvMap[id]=recv;
      let out={};
      if(n.type==="res"){ out={[n.resource]:resourceRate(n)}; effMap[id]=1; }
      else if(n.type==="m"){
        const s=machineSpec(n);
        let eff=1;
        for(const it in s.needs) if(s.needs[it]>EPS) eff=Math.min(eff,(recv[it]||0)/s.needs[it]);
        if(Object.keys(s.needs).length===0) eff=1;
        eff=Math.max(0,Math.min(1,eff));
        effMap[id]=eff;
        const scale = s.forced ? 1 : eff;
        for(const it in s.outs) out[it]=s.outs[it]*scale;
      }
      else if(PASSTHRU.has(n.type)){ out={...recv}; effMap[id]=1; }
      else { out={}; effMap[id]=1; } // sink
      outMap[id]=out;
      surplus[id]={};
      const capLeft=new Map(outE[id].map(e=>[e.id,cap(e)]));
      for(const e of outE[id]) flow[e.id]={};
      for(const it of Object.keys(out).sort()){
        const elig = outE[id].filter(e=>(dem[e.id]&&dem[e.id][it]>EPS));
        /* consumers first; sinks + LOADING storages are overflow and take the rest */
        const prim = elig.filter(e=>!isOverflowNode(nodeById[e.to]));
        const ovf  = elig.filter(e=> isOverflowNode(nodeById[e.to]));
        let shipped=0;
        const give=(edges,amount)=>{
          const alloc=waterfill(amount, edges, e=>Math.min(capLeft.get(e.id), dem[e.id][it]));
          for(const e of edges){ const a=alloc.get(e.id)||0;
            if(a>EPS) flow[e.id][it]=(flow[e.id][it]||0)+a;
            shipped+=a; capLeft.set(e.id,Math.max(0,capLeft.get(e.id)-a)); }
        };
        give(prim, out[it]);
        if(out[it]-shipped>EPS) give(ovf, out[it]-shipped);
        const left=out[it]-shipped;
        if(left>EPS) surplus[id][it]=left;
      }
    }
    /* converged? */
    let delta=0;
    for(const e of edges){
      const a=prevFlow[e.id],b=flow[e.id];
      for(const it in b) delta=Math.max(delta,Math.abs((b[it]||0)-(a[it]||0)));
      for(const it in a) if(!(it in b)) delta=Math.max(delta,a[it]);
    }
    if(delta<1e-9 && r>=2) break;
  }

  /* --- metrics + diagnostics --- */
  const nodeCalc={}, edgeCalc={};
  const warns=[]; // {cls:'alert'|'cap', nodeId?|edgeId?, msg}
  const totals={power:0,machines:0,supply:{},used:{},sunk:{},untapped:{}};
  const add=(o,k,v)=>{ if(v>EPS) o[k]=(o[k]||0)+v; };

  if(cyclic) warns.push({cls:"alert",msg:"LOOP DETECTED — flows are an iterative approximation"});

  for(const e of edges){
    const f=flow[e.id]||{}; const tot=sumVals(f);
    const util = tot/cap(e);
    edgeCalc[e.id]={items:f,total:tot,cap:cap(e),util};
  }
  for(const n of nodes){
    const recv=recvMap[n.id]||{}, out=outMap[n.id]||{}, sur=surplus[n.id]||{};
    const shippedOf = it => (out[it]||0)-(sur[it]||0);
    const c={recv,out,surplus:sur,eff:effMap[n.id]??1,power:nodePower(n),warn:false,cap:false};
    const W=(cls,msg)=>{ warns.push({cls,nodeId:n.id,msg}); if(cls==="alert")c.warn=true; else c.cap=true; };

    if(n.type==="res"){
      totals.power+=c.power; totals.machines+=n.count;
      const pot=resourceRate(n), shipped=shippedOf(n.resource);
      c.potential=pot; c.shipped=shipped;
      add(totals.supply,n.resource,shipped);
      add(totals.untapped,n.resource,pot-shipped);
      if(pot-shipped>TOL) W("cap",`${n.id} · +${fmt(pot-shipped)}/min ${itemName(n.resource)} untapped`);
    }
    else if(n.type==="m"){
      totals.power+=c.power; totals.machines+=n.count;
      const s=machineSpec(n); c.spec=s;
      const consumed={}; for(const it in s.needs){ consumed[it]=Math.min(recv[it]||0, s.needs[it]*(s.forced?1:c.eff)); }
      c.consumed=consumed;
      for(const it in consumed) add(totals.used,it,consumed[it]);
      for(const it in out) add(totals.supply,it,out[it]);
      const hasIn = inE[n.id].length>0;
      if(c.eff<1-1e-4 && !s.forced){
        const shorts=[];
        for(const it in s.needs){ const short=s.needs[it]-(recv[it]||0);
          if(short>TOL && Math.abs((recv[it]||0)/s.needs[it]-c.eff)<1e-4) shorts.push(`${fmt(short)}/min ${itemName(it)}`); }
        W("alert",`${n.id} · ${Math.round(c.eff*100)}% — short ${shorts.join(", ")||"input"}${hasIn?"":" (nothing connected)"}`);
      }
      if(s.forced){
        c.forcedShort = Object.keys(s.needs).some(it=>s.needs[it]-(recv[it]||0)>TOL);
        if(c.forcedShort) W("alert",`${n.id} · FORCED rate exceeds supplied inputs`);
      }
      for(const it in recv){
        const over=recv[it]-(consumed[it]||0);
        if(over>TOL && s.needs[it]) W("alert",`${n.id} · +${fmt(over)}/min ${itemName(it)} over-fed (belt will back up)`);
        else if(over>TOL && !s.needs[it]) W("alert",`${n.id} · receiving ${itemName(it)} — not used by this recipe`);
      }
      for(const it in sur) if(sur[it]>TOL) W("cap",`${n.id} · ${fmt(sur[it])}/min ${itemName(it)} unconsumed at output`);
    }
    else if(PASSTHRU.has(n.type)){
      const fwd={}; for(const e of outE[n.id]) for(const it in flow[e.id]) fwd[it]=(fwd[it]||0)+flow[e.id][it];
      c.thru=recv; c.fwd=fwd;
      const held={}; for(const it in recv){ const h=recv[it]-(fwd[it]||0); if(h>EPS) held[it]=h; }
      c.held=held;
      if(CAN_BUFFER.has(n.type)&&n.buffer){ for(const it in held) add(totals.sunk,it,held[it]); }
      else for(const it in held) if(held[it]>TOL) W("cap",`${n.id} · ${fmt(held[it])}/min ${itemName(it)} blocked (no downstream demand)`);
      if(n.type==="split"&&outE[n.id].length>3) W("alert",`${n.id} · ${outE[n.id].length} outputs — game splitter has 3`);
      if(n.type==="merge"&&inE[n.id].length>3) W("alert",`${n.id} · ${inE[n.id].length} inputs — game merger has 3`);
      if(n.type==="split"&&inE[n.id].length>1) W("alert",`${n.id} · splitter takes 1 input`);
      if(n.type==="merge"&&outE[n.id].length>1) W("alert",`${n.id} · merger has 1 output`);
    }
    else if(n.type==="sink"){
      c.absorbed=recv;
      for(const it in recv) add(totals.sunk,it,recv[it]);
    }
    nodeCalc[n.id]=c;
  }
  /* belt saturation that actually binds */
  for(const e of edges){
    const ec=edgeCalc[e.id];
    if(ec.util>=0.999){
      const srcSur=surplus[e.from]||{};
      const binds=Object.keys(ec.items).some(it=>srcSur[it]>EPS) ||
        (nodeById[e.to].type==="m" && (nodeCalc[e.to].eff<1-EPS));
      ec.sat=true;
      if(binds){ ec.binding=true;
        warns.push({cls:"alert",edgeId:e.id,msg:`${e.id} · ${LINK_BY_ID[e.link].label} saturated at ${ec.cap}/min — upgrade link`});
        }
    }
    if(Object.keys(ec.items).length>1) ec.mixed=true;
  }
  const free={};
  for(const it in totals.supply){
    const f=totals.supply[it]-(totals.used[it]||0)-(totals.sunk[it]||0);
    if(f>TOL) free[it]=f;
  }
  totals.free=free;
  return {nodeCalc,edgeCalc,warns,totals,cyclic};
}

/* ════════════════════════════════════════════════════════════
   FORMATTING
   ════════════════════════════════════════════════════════════ */
function fmt(v){
  if(v==null||isNaN(v)) return "0";
  const r=Math.round(v*100)/100;
  return (Math.abs(r-Math.round(r))<1e-9? Math.round(r) : r).toString();
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ════════════════════════════════════════════════════════════
   PERSISTENCE / HISTORY
   ════════════════════════════════════════════════════════════ */
const LS_KEY="tres-factory-v1";
let saveTimer=null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ try{ localStorage.setItem(LS_KEY, JSON.stringify({state,view})); }catch(_){}} ,250);
}
function snapshot(){ undoStack.push(JSON.stringify(state)); if(undoStack.length>60) undoStack.shift(); }
function undo(){
  if(!undoStack.length) return;
  state=normalizeState(JSON.parse(undoStack.pop()));
  if(sel&&sel.kind==="node"&&!getNode(sel.id)) sel=null;
  if(sel&&sel.kind==="edge"&&!getEdge(sel.id)) sel=null;
  if(sel&&sel.kind==="anno"&&!getAnno(sel.id)) sel=null;
  refresh(); toast("UNDO");
}
function commit(){ refresh(); persist(); }

   RENDER
   ════════════════════════════════════════════════════════════ */
const $=id=>document.getElementById(id);
const worldEl=$("world"), nodesEl=$("nodes"), svg=$("edgesvg"), labelsEl=$("elabels"), vp=$("viewport");

function applyView(){
  worldEl.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.s})`;
  const g=$("grid"), sz=24*view.s, SZ=120*view.s;
  const minor = sz>=7; // drop the fine grid when cells collapse to noise
  const gl=(c)=>`linear-gradient(var(${c}) 1px,transparent 1px),linear-gradient(90deg,var(${c}) 1px,transparent 1px)`;
  g.style.backgroundImage=(minor?gl("--gridline")+",":"")+gl("--gridline2");
  g.style.backgroundSize=(minor?`${sz}px ${sz}px,${sz}px ${sz}px,`:"")+`${SZ}px ${SZ}px,${SZ}px ${SZ}px`;
  g.style.backgroundPosition=`${view.x}px ${view.y}px`;
  updateLOD();
}
/* semantic zoom with hysteresis: enter simplified view below 0.26, leave above 0.32 */
function updateLOD(){
  const was=lod;
  if(lod){ if(view.s>0.32) lod=false; }
  else if(view.s<0.26) lod=true;
  // keep belts readable when far out: aim for ~2.2px on screen
  svg.style.setProperty("--esw", lod?(2.2/view.s).toFixed(2)+"px":"1.4px");
  svg.style.setProperty("--ehw", lod?Math.min(200,10/view.s).toFixed(2)+"px":"14px");
  if(was!==lod){
    worldEl.classList.toggle("lod",lod);
    renderNodes(); renderEdges(); renderAnnos();
  }
}
function nodeSize(id){
  if(sizeCache[id]) return sizeCache[id];
  const el=nodesEl.querySelector(`[data-id="${id}"]`);
  return el?{w:el.offsetWidth,h:el.offsetHeight}:{w:196,h:90};
}
function portPos(n,side){
  const s=nodeSize(n.id);
  return side==="out" ? {x:n.x+s.w, y:n.y+s.h/2} : {x:n.x, y:n.y+s.h/2};
}
function edgePath(e){
  const a=getNode(e.from),b=getNode(e.to); if(!a||!b) return "";
  const p1=portPos(a,"out"),p2=portPos(b,"in");
  const dx=Math.max(40,Math.abs(p2.x-p1.x)*0.45);
  return `M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`;
}
function edgeMid(e){
  const a=getNode(e.from),b=getNode(e.to);
  const p1=portPos(a,"out"),p2=portPos(b,"in");
  return {x:(p1.x+p2.x)/2,y:(p1.y+p2.y)/2};
}

function nodeHTML(n){
  const c=CALC?CALC.nodeCalc[n.id]:null;
  const warn=c&&(c.warn||c.forcedShort);
  let head, rows="";
  const name=n.label?esc(n.label):null;
  const row=(k,v,cls="")=>`<div class="nrow"><span class="k">${k}</span><span class="v ${cls}">${v}</span></div>`;
  if(n.type==="res"){
    const ex=EXTRACTORS[n.extractor];
    head=`<span class="nid">${n.id}</span><span class="nname">${name||itemName(n.resource).toUpperCase()}</span>`;
    const meta=[ex.name.toUpperCase()];
    if(n.extractor!=="water") meta.push(n.purity.toUpperCase());
    if(n.count>1) meta.push("×"+n.count);
    if(Math.abs(n.clock-1)>EPS) meta.push(fmt(n.clock*100)+"%");
    rows+=row("RIG",meta.join(" · "),"dim");
    rows+=row("EXTRACT",fmt(c?c.potential:resourceRate(n))+"/min","hot");
    if(c){ const un=c.potential-c.shipped;
      rows+=row("SHIPPED",fmt(c.shipped)+"/min");
      if(un>EPS) rows+=row("UNTAPPED",fmt(un)+"/min","dim");
    }
    if(n.override!=null) rows+=row("MODE",`<span class="badge inv">FORCED</span>`);
  }
  else if(n.type==="m"){
    const r=getRecipe(n.recipe), b=BUILDINGS[n.mtype];
    head=`<span class="nid">${n.id}</span><span class="nname">${name||(r?itemName(Object.keys(r.out)[0]).toUpperCase():"?")}</span>`;
    const meta=[b.name.toUpperCase()]; if(n.count>1)meta.push("×"+n.count);
    if(Math.abs(n.clock-1)>EPS) meta.push(fmt(n.clock*100)+"%");
    rows+=row("UNIT",meta.join(" · "),"dim");
    const eff=c?c.eff:1;
    rows+=`<div class="effwrap"><div class="effbar"><i style="width:${Math.round(eff*100)}%"></i></div><span class="effpct">${Math.round(eff*100)}%</span></div>`;
    if(r&&c&&c.spec){
      for(const it in c.spec.needs){
        const need=c.spec.needs[it], got=c.recv[it]||0;
        const ok=got>=need-1e-4;
        rows+=row("◂ "+itemName(it).toUpperCase(), `${fmt(got)}<span class="${ok?'':'hot'}">/${fmt(need)}</span>`, ok?"":"hot");
      }
      for(const it in c.spec.outs){
        const made=c.out[it]||0, sur=(c.surplus&&c.surplus[it])||0;
        rows+=row("▸ "+itemName(it).toUpperCase(), fmt(made)+"/min"+(sur>EPS?` <span class="badge">+${fmt(sur)} FREE</span>`:""),"hot");
      }
    }
    if(n.override!=null) rows+=row("MODE",`<span class="badge inv">FORCED ${fmt(n.override)}/min</span>`);
  }
  else if(PASSTHRU.has(n.type)){
    head=`<span class="nid">${n.id}</span><span class="nname">${name||TYPE_META[n.type].title}</span>`;
    if(c){
      const items=Object.keys(c.thru);
      if(!items.length) rows+=row("THRU","0/min","dim");
      for(const it of items) rows+=row(itemName(it).toUpperCase(),fmt(c.thru[it])+"/min");
      if(CAN_BUFFER.has(n.type)&&n.buffer){
        const h=sumVals(c.held||{});
        rows+=row("MODE","LOADING","dim");
        if(h>EPS) rows+=row("STORING","+"+fmt(h)+"/min","hot");
      }
    }
  }
  else{ // sink
    head=`<span class="nid">${n.id}</span><span class="nname">${name||"SINK / OUTPUT"}</span>`;
    if(c){
      const items=Object.keys(c.absorbed||{});
      if(!items.length) rows+=row("INTAKE","0/min","dim");
      for(const it of items) rows+=row(itemName(it).toUpperCase(),fmt(c.absorbed[it])+"/min","hot");
    }
  }
  const ports =
    (n.type==="res"?"":`<span class="port in" data-port="in" data-node="${n.id}"></span>`)+
    (n.type==="sink"?"":`<span class="port out" data-port="out" data-node="${n.id}"></span>`);
  let ucount="";
  if((n.type==="res"||n.type==="m")&&n.count>1){
    const shown=Math.min(n.count,20);
    ucount=`<div class="ucount">${'<i class="usq"></i>'.repeat(shown)}${n.count>shown?`<span class="umore">+${n.count-shown}</span>`:""}</div>`;
  }
  const col=nodeColor(n);
  return `<div class="node${sel&&sel.kind==="node"&&sel.id===n.id?" sel":""}${msel.nodes.has(n.id)?" msel":""}${warn?" warn":""}" data-id="${n.id}" style="left:${n.x}px;top:${n.y}px${col?`;--nc:${col}`:""}">
    <i class="tick tl"></i><i class="tick tr"></i><i class="tick bl"></i><i class="tick br"></i>
    <div class="nhead">${head}${warn?'<span class="nwarn">!</span>':""}</div>
    <div class="nbody">${rows}</div>${ports}${ucount}</div>`;
}

function renderEdges(){

    const cls=`epath${live?" live":" idle"}${seld?" sel":""}`;

    const d=edgePath(e);

    const col=ec&&ec.total>EPS&&!seld&&src?nodeColor(src):null;
    const sat=ec&&ec.binding?" sat":"";
    labels+=`<div class="elabel${seld?" sel":""}${sat}" data-eid="${e.id}" style="left:${m.x}px;top:${m.y}px${col?`;border-color:${col}`:""}">${txt}</div>`;

/* ---------- inspector ---------- */
/* concrete in-game build steps for a bank: machines, clocks, manifolds, belt tiers */
function buildSheetHTML(n,c){
  const tierFor=(rate,fluid)=>{
    const opts=LINKS.filter(x=>fluid?x.id.startsWith("p"):x.id.startsWith("b"));
    const l=opts.find(x=>x.cap>=rate-EPS);
    return l?l.label:`${opts[opts.length-1].label} ×${Math.ceil(rate/opts[opts.length-1].cap)} (split the load)`;
  };
  const steps=[];
  if(n.type==="res"){
    if(Math.abs(n.clock-1)>EPS)
      steps.push(`□ set the miner's clock to <b>${fmt(n.clock*100)}%</b> — type the exact number in its clock box (decimals are fine, no power shard needed under 100%)`);
    if(c&&c.shipped>EPS)
      steps.push(`□ carry <b>${fmt(c.shipped)}/min</b> out on a <b>${tierFor(c.shipped,FLUIDS.has(n.resource))}</b> or better`);
    return steps.length?`<div class="buildsheet">${steps.map(s=>`<div class="step">${s}</div>`).join("")}</div>`:"";
  }
  if(n.type!=="m"||!c||!c.spec) return "";
  const r=getRecipe(n.recipe);
  steps.push(`□ place <b>${n.count} × ${BUILDINGS[n.mtype].name.toUpperCase()}</b>${n.count>1?" in a row":""}${r?` — recipe <b>${esc((r.name||itemName(Object.keys(r.out)[0])).toUpperCase())}</b>`:""}`);
  if(Math.abs(n.clock-1)>EPS)
    steps.push(`□ set <b>every machine's clock to ${fmt(n.clock*100)}%</b> — type the exact number (decimals are fine; shards only needed above 100%)`);
  for(const it in c.spec.needs){
    const tot=c.spec.needs[it], perM=tot/n.count, fluid=FLUIDS.has(it);
    steps.push(n.count>1
      ? `□ feed <b>${itemName(it).toUpperCase()} ${fmt(tot)}/min</b> in on one <b>${tierFor(tot,fluid)}</b> trunk — ${fluid?"pipe junctions":"splitter manifold"} down the row, each machine pulls ${fmt(perM)}/min by itself`
      : `□ feed <b>${itemName(it).toUpperCase()} ${fmt(tot)}/min</b> in — <b>${tierFor(tot,fluid)}</b> or better`);
  }
  let mixedOvf=false;
  for(const it in c.spec.outs){
    const tot=c.out[it]||0; if(!(tot>EPS)) continue;
    const outs=state.edges.filter(e=>e.from===n.id&&CALC.edgeCalc[e.id]&&CALC.edgeCalc[e.id].items[it]>EPS);
    if(outs.some(e=>isOverflowNode(getNode(e.to)))&&outs.some(e=>!isOverflowNode(getNode(e.to)))) mixedOvf=true;
    const split=outs.length>1?` — keep <b>${outs.length} separate output belts</b> as drawn (${outs.map(e=>fmt(CALC.edgeCalc[e.id].items[it])).join(" + ")})`
      :` on a <b>${tierFor(tot,FLUIDS.has(it))}</b>`;
    steps.push(`□ collect <b>${itemName(it).toUpperCase()} ${fmt(tot)}/min</b>${n.count>1?" with mergers down the row":""}${split}`);
  }
  if(mixedOvf)
    steps.push(`▸ this output feeds machines <b>and</b> a storage/sink: use a <b>SMART SPLITTER</b> (Caterium MAM research) with the storage branch set to <b>OVERFLOW</b> so machines stay fed while it fills. A plain splitter works too, but shorts your machines until the container is full.`);
  if(n.count>=3)
    steps.push(`▸ manifolds fill <b>front-to-back</b> — the last machines idle until the belts saturate (long rows take a few minutes). That's normal: feed it, wait, THEN judge efficiency by the last machine in the row.`);
  return `<div class="buildsheet">${steps.map(s=>`<div class="step">${s}</div>`).join("")}</div>`;
}

    <div class="igroup"><div class="ilabel">LINK TIER</div>
      <div class="linkgrid">${LINKS.map(l=>`<button class="linkbtn${e.link===l.id?" on":""}" data-setlink="${l.id}">${l.label}<br>${l.cap}/min</button>`).join("")}</div></div>

    const colorSel=`<select id="fAColor"><option value="">MONO</option>${COLORSET.map(cc=>`<option value="${cc.id}"${a.color===cc.id?" selected":""}>${cc.name}</option>`).join("")}</select>`;

    const r=getRecipe(n.recipe);
    if(r){
      const per=Object.entries(r.in).map(([it,q])=>`<div class="kv"><span>◂ ${itemName(it).toUpperCase()}</span><b>${fmt(q)}/min</b></div>`).join("")+

      body+=grp("PER MACHINE @100%",per);
    }
  }
  if(n.type==="res"||n.type==="m"){
    body+=grp("UNITS",`<div class="stepper"><button data-act="cntDn">−</button><input type="number" id="fCount" min="1" max="999" step="1" value="${n.count}"><button data-act="cntUp">+</button></div>`);
    body+=grp("CLOCK SPEED — <span id='clockVal'>"+fmt(n.clock*100)+"%</span>",
      `<input type="range" id="fClock" min="1" max="250" step="1" value="${Math.round(n.clock*100)}">

       <div class="itip">decimals allowed (92.5 etc) for exact ratios — power scales with clock^1.32</div>`);
    body+=grp("MASTER OVERRIDE",
      `<label class="checkrow"><input type="checkbox" id="fOvrOn"${n.override!=null?" checked":""}> FORCE OUTPUT RATE</label>
       <div class="irow" style="margin-top:6px"><input type="number" id="fOvr" min="0" step="any" value="${n.override!=null?n.override:""}" placeholder="items/min" ${n.override==null?"disabled":""}></div>
       <div class="itip">forces this node's total output (${n.type==="m"?"first product":"resource"}) to an exact rate — use it to correct me, or as a stand-in source for part of your factory you haven't drawn.</div>`);
  }
  if(CAN_BUFFER.has(n.type)){
    body+=grp("MODE",`<label class="checkrow"><input type="checkbox" id="fBuf"${n.buffer?" checked":""}> LOADING MODE (absorb surplus)</label>
      <div class="itip">ON = overflow target: takes only what machines don't need and stores it — like a Smart Splitter set to Overflow. OFF = pure pass-through at steady state.</div>`);
  }
  if(c){
    let live="";
    live+=`<div class="kv"><span>POWER DRAW</span><b>${fmt(c.power)} MW</b></div>`;
    if(n.type==="m") live+=`<div class="kv"><span>EFFICIENCY</span><b>${Math.round(c.eff*100)}%</b></div>`;
    if(n.type==="res") live+=`<div class="kv"><span>UNTAPPED</span><b>${fmt((c.potential||0)-(c.shipped||0))}/min</b></div>`;
    body+=grp("LIVE",live);
    const bs=buildSheetHTML(n,c);
    if(bs) body+=grp("HOW TO BUILD IT — IN GAME",bs);
  }
  body+=grp("ACTIONS",
    `<button class="ibtn" data-act="dup">⧉ DUPLICATE (CTRL+D)</button>
     <button class="ibtn danger" data-act="delNode">✕ DELETE NODE (DEL)</button>`);
  const title = n.type==="m" ? BUILDINGS[n.mtype].name.toUpperCase() : TYPE_META[n.type].title;
  return `<div class="ihead"><div class="t1">${title}</div><div class="t2">${esc(n.label||n.id)}</div></div>`+body;
}

/* ════════════════════════════════════════════════════════════
   INTERACTION
   ════════════════════════════════════════════════════════════ */
function toWorld(cx,cy){
  const r=vp.getBoundingClientRect();
  return {x:(cx-r.left-view.x)/view.s, y:(cy-r.top-view.y)/view.s};
}
let drag=null; // {mode:'node'|'pan'|'wire', ...}

vp.addEventListener("pointerdown",ev=>{
  const portEl=ev.target.closest(".port");
  const nodeEl=ev.target.closest(".node");
  const labelEl=ev.target.closest(".elabel");
  const annoEl=ev.target.closest(".anno");
  const pathEl=ev.target.closest("[data-eid]");
  try{ vp.setPointerCapture(ev.pointerId); }catch(_){}
  if(ev.button===1){ // middle mouse: pan from anywhere, any mode
    drag={mode:"pan",sx:ev.clientX,sy:ev.clientY,vx:view.x,vy:view.y,moved:true};
    ev.preventDefault(); return;
  }
  if(portEl){
    drag={mode:"wire",node:portEl.dataset.node,dir:portEl.dataset.port,moved:false};
    ev.preventDefault(); return;
  }
  if(annoEl){
    const a=getAnno(annoEl.dataset.aid);
    if(ev.shiftKey){
      sel=null;
      msel.annos.has(a.id)?msel.annos.delete(a.id):msel.annos.add(a.id);
      select(null); ev.preventDefault(); return;
    }
    const w=toWorld(ev.clientX,ev.clientY);
    if(mselSize()&&msel.annos.has(a.id)){
      drag={mode:"group",sx:w.x,sy:w.y,start:groupPositions(),moved:false,snap:JSON.stringify(state)};
    }else{
      clearMsel();
      drag={mode:"anno",id:a.id,dx:w.x-a.x,dy:w.y-a.y,moved:false,snap:JSON.stringify(state)};
      select({kind:"anno",id:a.id});
    }
    ev.preventDefault(); return;
  }
  if(nodeEl){
    const n=getNode(nodeEl.dataset.id);
    if(ev.shiftKey){
      sel=null;
      msel.nodes.has(n.id)?msel.nodes.delete(n.id):msel.nodes.add(n.id);
      select(null); ev.preventDefault(); return;
    }
    const w=toWorld(ev.clientX,ev.clientY);
    if(mselSize()&&msel.nodes.has(n.id)){
      drag={mode:"group",sx:w.x,sy:w.y,start:groupPositions(),moved:false,snap:JSON.stringify(state)};
    }else{
      clearMsel();
      drag={mode:"node",id:n.id,dx:w.x-n.x,dy:w.y-n.y,moved:false,snap:JSON.stringify(state)};
      select({kind:"node",id:n.id});
    }
    ev.preventDefault(); return;
  }
  if(ev.shiftKey || (selectMode && !labelEl && !pathEl)){ // box select
    if(selectMode && !ev.shiftKey) clearMsel(); // fresh box replaces selection; shift adds
    drag={mode:"marq",sx:ev.clientX,sy:ev.clientY,moved:false};
    ev.preventDefault(); return;
  }
  if(labelEl||pathEl){
    const eid=(labelEl||pathEl).dataset.eid;
    clearMsel();
    select({kind:"edge",id:eid});
    drag=null; return;
  }
  drag={mode:"pan",sx:ev.clientX,sy:ev.clientY,vx:view.x,vy:view.y,moved:false};
});
function groupPositions(){
  const g={nodes:{},annos:{}};
  for(const id of msel.nodes){ const n=getNode(id); if(n) g.nodes[id]={x:n.x,y:n.y}; }
  for(const id of msel.annos){ const a=getAnno(id); if(a) g.annos[id]={x:a.x,y:a.y}; }
  return g;
}
vp.addEventListener("pointermove",ev=>{
  if(!drag) return;
  if(drag.mode==="pan"){
    const dx=ev.clientX-drag.sx, dy=ev.clientY-drag.sy;
    if(Math.abs(dx)+Math.abs(dy)>3) drag.moved=true;
    view.x=drag.vx+dx; view.y=drag.vy+dy; applyView(); return;
  }
  if(drag.mode==="node"){
    const w=toWorld(ev.clientX,ev.clientY);
    const n=getNode(drag.id); if(!n) return;
    n.x=Math.round((w.x-drag.dx)/12)*12; n.y=Math.round((w.y-drag.dy)/12)*12;
    drag.moved=true;
    const el=nodesEl.querySelector(`[data-id="${n.id}"]`);
    if(el){el.style.left=n.x+"px";el.style.top=n.y+"px";}
    renderEdges(); return;
  }
  if(drag.mode==="anno"){
    const w=toWorld(ev.clientX,ev.clientY);
    const a=getAnno(drag.id); if(!a) return;
    a.x=Math.round((w.x-drag.dx)/12)*12; a.y=Math.round((w.y-drag.dy)/12)*12;
    drag.moved=true;
    const el=$("annos").querySelector(`[data-aid="${a.id}"]`);
    if(el){el.style.left=a.x+"px";el.style.top=a.y+"px";}
    return;
  }
  if(drag.mode==="group"){
    const w=toWorld(ev.clientX,ev.clientY);
    const dx=Math.round((w.x-drag.sx)/12)*12, dy=Math.round((w.y-drag.sy)/12)*12;
    if(dx||dy) drag.moved=true;
    for(const id in drag.start.nodes){
      const n=getNode(id); if(!n) continue;
      n.x=drag.start.nodes[id].x+dx; n.y=drag.start.nodes[id].y+dy;
      const el=nodesEl.querySelector(`[data-id="${id}"]`);
      if(el){el.style.left=n.x+"px";el.style.top=n.y+"px";}
    }
    for(const id in drag.start.annos){
      const a=getAnno(id); if(!a) continue;
      a.x=drag.start.annos[id].x+dx; a.y=drag.start.annos[id].y+dy;
      const el=$("annos").querySelector(`[data-aid="${id}"]`);
      if(el){el.style.left=a.x+"px";el.style.top=a.y+"px";}
    }
    renderEdges(); return;
  }
  if(drag.mode==="marq"){
    drag.moved=true;
    const r=vp.getBoundingClientRect();
    const x1=Math.min(drag.sx,ev.clientX)-r.left, y1=Math.min(drag.sy,ev.clientY)-r.top;
    const x2=Math.max(drag.sx,ev.clientX)-r.left, y2=Math.max(drag.sy,ev.clientY)-r.top;
    const m=$("marq");
    m.style.display="block";
    m.style.left=x1+"px"; m.style.top=y1+"px"; m.style.width=(x2-x1)+"px"; m.style.height=(y2-y1)+"px";
    return;
  }
  if(drag.mode==="wire"){
    drag.moved=true;
    const w=toWorld(ev.clientX,ev.clientY);
    const src=getNode(drag.node);
    const p=portPos(src,drag.dir);
    const sgn=drag.dir==="out"?1:-1;
    const dx=Math.max(40,Math.abs(w.x-p.x)*0.45);
    const tp=svg.querySelector("#temppath");
    if(tp) tp.setAttribute("d",`M${p.x},${p.y} C${p.x+sgn*dx},${p.y} ${w.x-sgn*dx},${w.y} ${w.x},${w.y}`);
  }
});
vp.addEventListener("pointerup",ev=>{
  if(!drag) return;
  const d=drag; drag=null;
  if(d.mode==="pan"){ if(!d.moved){ clearMsel(); select(null); } persist(); return; }
  if(d.mode==="node"||d.mode==="anno"||d.mode==="group"){ if(d.moved){ undoStack.push(d.snap); if(undoStack.length>60)undoStack.shift(); refresh(); persist(); } return; }
  if(d.mode==="marq"){
    $("marq").style.display="none";
    if(!d.moved) return;
    const x1=Math.min(d.sx,ev.clientX), y1=Math.min(d.sy,ev.clientY);
    const x2=Math.max(d.sx,ev.clientX), y2=Math.max(d.sy,ev.clientY);
    const hit=(r)=>r.left<x2&&r.right>x1&&r.top<y2&&r.bottom>y1;
    for(const el of nodesEl.querySelectorAll(".node"))
      if(hit(el.getBoundingClientRect())) msel.nodes.add(el.dataset.id);
    for(const el of $("annos").querySelectorAll(".anno"))
      if(hit(el.getBoundingClientRect())) msel.annos.add(el.dataset.aid);
    sel=null;
    select(null);
    return;
  }
  if(d.mode==="wire"){
    const tp=svg.querySelector("#temppath"); if(tp) tp.setAttribute("d","");
    const el=document.elementFromPoint(ev.clientX,ev.clientY);
    const tgt=el && el.closest(".node,.port");
    if(tgt){
      const dropId = tgt.classList&&tgt.classList.contains("port") ? tgt.dataset.node : tgt.dataset.id;
      if(dropId && dropId!==d.node){
        const fromId = d.dir==="out" ? d.node : dropId;
        const toId   = d.dir==="out" ? dropId : d.node;
        const fromN=getNode(fromId), toN=getNode(toId);
        if(fromN && toN && fromN.type!=="sink" && toN.type!=="res"){
          snapshot();
          const e=makeEdge(fromId,toId);
          if(e){ select({kind:"edge",id:e.id}); commit(); return; }
        } else toast("CAN'T CONNECT THAT WAY");
      }
    }
    renderEdges();
  }
});
vp.addEventListener("wheel",ev=>{
  ev.preventDefault();
  const r=vp.getBoundingClientRect();
  const mx=ev.clientX-r.left,my=ev.clientY-r.top;
  const f=ev.deltaY<0?1.12:1/1.12;
  const ns=Math.min(2.2,Math.max(0.05,view.s*f));
  view.x=mx-(mx-view.x)*(ns/view.s);
  view.y=my-(my-view.y)*(ns/view.s);
  view.s=ns; applyView(); persist();
},{passive:false});

function select(s){
  sel=s;
  renderNodes(); renderEdges(); renderAnnos();
  $("insp").innerHTML=inspHTML(); // selection change always rebuilds
}
function centerOn(nodeId){
  const n=getNode(nodeId); if(!n) return;
  const r=vp.getBoundingClientRect();
  const sz=nodeSize(n.id);
  view.x=r.width/2-(n.x+sz.w/2)*view.s;
  view.y=r.height/2-(n.y+sz.h/2)*view.s;
  applyView();
}
function fitView(){
  if(!state.nodes.length&&!(state.annos||[]).length) return;
  const r=vp.getBoundingClientRect();
  let x1=1e9,y1=1e9,x2=-1e9,y2=-1e9;
  for(const n of state.nodes){
    const s=nodeSize(n.id);
    x1=Math.min(x1,n.x);y1=Math.min(y1,n.y);
    x2=Math.max(x2,n.x+s.w);y2=Math.max(y2,n.y+s.h);
  }
  for(const a of state.annos||[]){
    x1=Math.min(x1,a.x); y1=Math.min(y1,a.y);
    x2=Math.max(x2,a.x+(a.kind==="line"&&a.orient==="h"?a.len:180));
    y2=Math.max(y2,a.y+(a.kind==="line"&&a.orient==="v"?a.len:48));
  }
  const pad=60;
  const s=Math.min(2,Math.max(0.05,Math.min((r.width-pad*2)/(x2-x1),(r.height-pad*2)/(y2-y1))));
  view.s=s; view.x=(r.width-(x2-x1)*s)/2-x1*s; view.y=(r.height-(y2-y1)*s)/2-y1*s;
  applyView(); persist();
}

    let n;

      if(sub==="oil") n=makeNode("res",{resource:"crude_oil",extractor:"oil",purity:"normal",x:c.x+jitter(),y:c.y+jitter()});
      else if(sub==="water") n=makeNode("res",{resource:"water",extractor:"water",purity:"normal",x:c.x+jitter(),y:c.y+jitter()});
      else n=makeNode("res",{x:c.x+jitter(),y:c.y+jitter()});
    }
    else if(kind==="m") n=makeNode("m",{mtype:sub,x:c.x+jitter(),y:c.y+jitter()});
    else n=makeNode(kind,{x:c.x+jitter(),y:c.y+jitter()});
    select({kind:"node",id:n.id});
    commit();
  });
});

/* inspector delegation */
$("insp").addEventListener("click",ev=>{
  const b=ev.target.closest("[data-act],[data-setlink]");
  if(!b) return;
  if(b.dataset.setlink && sel&&sel.kind==="edge"){
    snapshot(); getEdge(sel.id).link=b.dataset.setlink; commit();
    $("insp").innerHTML=inspHTML(); return;
  }
  const act=b.dataset.act;
  if(act==="saveBP"){ const inp=$("fBPName"); saveBlueprint((inp&&inp.value.trim())||""); return; }
  if(act==="dupGroup"){ duplicateGroup(); return; }
  if(act==="delGroup"&&mselSize()){
    snapshot();
    for(const id of [...msel.nodes]) delNode(id);
    state.annos=state.annos.filter(a=>!msel.annos.has(a.id));
    clearMsel(); sel=null; commit(); $("insp").innerHTML=inspHTML(); return;
  }
  if(act==="delEdge"&&sel&&sel.kind==="edge"){ snapshot(); state.edges=state.edges.filter(e=>e.id!==sel.id); sel=null; commit(); $("insp").innerHTML=inspHTML(); }
  if(act==="reverse"&&sel&&sel.kind==="edge"){ const e=getEdge(sel.id); snapshot();
    const to=getNode(e.from), from=getNode(e.to);
    if(from.type!=="sink"&&to.type!=="res"){ [e.from,e.to]=[e.to,e.from]; commit(); $("insp").innerHTML=inspHTML(); } else toast("CAN'T REVERSE INTO THAT"); }
  if(act==="delNode"&&sel&&sel.kind==="node"){ snapshot(); delNode(sel.id); sel=null; commit(); $("insp").innerHTML=inspHTML(); }
  if(act==="delAnno"&&sel&&sel.kind==="anno"){ snapshot(); state.annos=state.annos.filter(a=>a.id!==sel.id); sel=null; commit(); $("insp").innerHTML=inspHTML(); }
  if(act==="dup"&&sel&&(sel.kind==="node"||sel.kind==="anno")) dupSelected();
  if(act==="cntUp"||act==="cntDn"){
    const n=getNode(sel.id); if(!n)return; snapshot();
    n.count=Math.max(1,Math.min(999,n.count+(act==="cntUp"?1:-1))); commit();
    $("insp").innerHTML=inspHTML();
  }
});
$("insp").addEventListener("change",ev=>{
  if(!sel) return;
  if(sel.kind==="anno"){
    const a=getAnno(sel.id); if(!a) return;
    const id=ev.target.id;
    snapshot();
    if(id==="fAText") a.text=ev.target.value;
    if(id==="fASize") a.size=+ev.target.value;
    if(id==="fAOrient") a.orient=ev.target.value;
    if(id==="fALen") a.len=Math.max(24,Math.round(+ev.target.value||480));
    if(id==="fAColor") a.color=ev.target.value||null;
    ev.target.blur();
    commit();
    $("insp").innerHTML=inspHTML();
    return;
  }
  if(sel.kind!=="node") return;
  const n=getNode(sel.id); if(!n) return;
  const id=ev.target.id;
  snapshot();
  if(id==="fLabel") n.label=ev.target.value.trim()||null;
  if(id==="fRes") n.resource=ev.target.value;
  if(id==="fExt"){ n.extractor=ev.target.value; }
  if(id==="fPur") n.purity=ev.target.value;
  if(id==="fRecipe") n.recipe=ev.target.value;
  if(id==="fCount") n.count=Math.max(1,Math.min(999,Math.round(+ev.target.value||1)));
  if(id==="fClock") n.clock=Math.max(0.01,Math.min(2.5,(+ev.target.value||100)/100));
  if(id==="fClockN") n.clock=Math.max(0.01,Math.min(2.5,(+ev.target.value||100)/100));
  if(id==="fOvrOn"){
    if(ev.target.checked){
      const def = n.type==="res" ? resourceRate({...n,override:null}) : machineSpec({...n,override:null}).outs[Object.keys(machineSpec({...n,override:null}).outs)[0]];
      n.override = Math.round(def*100)/100;
    } else n.override=null;
  }
  if(id==="fOvr") n.override=Math.max(0,+ev.target.value||0);
  if(id==="fBuf") n.buffer=ev.target.checked;
  ev.target.blur();
  commit();
  $("insp").innerHTML=inspHTML();
});

function dupSelected(){
  if(!sel) return;
  if(sel.kind==="anno"){
    const a=getAnno(sel.id); if(!a)return;
    snapshot();
    const copy=JSON.parse(JSON.stringify(a));
    copy.id=nextAnnoId(); copy.x+=36; copy.y+=36;
    state.annos.push(copy);
    select({kind:"anno",id:copy.id});
    commit(); return;
  }
  if(sel.kind!=="node") return;
  const n=getNode(sel.id); if(!n)return;
  snapshot();
  const copy=JSON.parse(JSON.stringify(n));
  copy.id=nid(n.type,n.mtype); copy.x+=36; copy.y+=36;
  state.nodes.push(copy);
  select({kind:"node",id:copy.id});
  commit();
}

/* ---------- blueprints ---------- */
const BP_KEY="tres-blueprints-v1";
function loadBPs(){ try{ blueprints=JSON.parse(localStorage.getItem(BP_KEY))||[]; }catch(_){ blueprints=[]; }
  if(!Array.isArray(blueprints)) blueprints=[]; }
function saveBPs(){ try{ localStorage.setItem(BP_KEY,JSON.stringify(blueprints)); }catch(_){}}
function renderBPs(){
  $("bpcount").textContent=blueprints.length||"";
  $("bplist").innerHTML = blueprints.length
    ? blueprints.map(b=>`<div class="bprow">
        <button class="bpstamp" data-bp="${b.id}" title="place a copy at view center"><b>${esc(b.name)}</b><span>${b.nodes.length}N ${b.edges.length}E</span></button>
        <button class="bpdel" data-bp="${b.id}" title="delete blueprint">✕</button></div>`).join("")
    : `<div class="wempty">SHIFT-SELECT GEAR, THEN<br>"SAVE TO BLUEPRINTS"</div>`;
}
function selectionAsGroup(){
  const nodes=state.nodes.filter(n=>msel.nodes.has(n.id));
  const annos=(state.annos||[]).filter(a=>msel.annos.has(a.id));
  if(!nodes.length&&!annos.length) return null;
  const edges=state.edges.filter(e=>msel.nodes.has(e.from)&&msel.nodes.has(e.to));
  let mx=Infinity,my=Infinity;
  for(const o of [...nodes,...annos]){ mx=Math.min(mx,o.x); my=Math.min(my,o.y); }
  return {
    nodes:nodes.map(n=>({...JSON.parse(JSON.stringify(n)),x:n.x-mx,y:n.y-my})),
    edges:JSON.parse(JSON.stringify(edges)),
    annos:annos.map(a=>({...JSON.parse(JSON.stringify(a)),x:a.x-mx,y:a.y-my})),
    origin:{x:mx,y:my},
  };
}
/* place a group copy; fresh ids, edges remapped; the copy becomes the selection */
function stampGroup(g,ox,oy){
  const idMap={};
  clearMsel(); sel=null;
  for(const src of g.nodes){
    const n=JSON.parse(JSON.stringify(src));
    n.id=nid(src.type,src.mtype); n.x=ox+src.x; n.y=oy+src.y;
    if(n.type==="m"&&!getRecipe(n.recipe)){ const fb=allRecipes().find(r=>r.b===n.mtype); n.recipe=fb?fb.id:n.recipe; }
    idMap[src.id]=n.id; state.nodes.push(n); msel.nodes.add(n.id);
  }
  for(const se of g.edges){
    if(idMap[se.from]&&idMap[se.to])
      state.edges.push({id:nextEdgeId(),from:idMap[se.from],to:idMap[se.to],link:LINK_BY_ID[se.link]?se.link:"b2"});
  }
  for(const sa of g.annos||[]){
    const a=JSON.parse(JSON.stringify(sa)); a.id=nextAnnoId();
    a.x=ox+sa.x; a.y=oy+sa.y; state.annos.push(a); msel.annos.add(a.id);
  }
}
function saveBlueprint(name){
  const g=selectionAsGroup();
  if(!g){ toast("NOTHING SELECTED"); return; }
  blueprints.push({id:"bp"+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    name:name||("BLUEPRINT "+(blueprints.length+1)),nodes:g.nodes,edges:g.edges,annos:g.annos});
  saveBPs(); renderBPs(); toast("BLUEPRINT SAVED");
}
function stampBlueprint(id){
  const bp=blueprints.find(b=>b.id===id); if(!bp) return;
  snapshot();
  const r=vp.getBoundingClientRect();
  const c=toWorld(r.left+r.width/2,r.top+r.height/2);
  stampGroup(bp,Math.round((c.x-120)/12)*12,Math.round((c.y-90)/12)*12);
  commit(); toast("PLACED — DRAG TO POSITION");
}
function duplicateGroup(){
  const g=selectionAsGroup(); if(!g) return;
  snapshot();
  stampGroup(g,g.origin.x+48,g.origin.y+48);
  commit(); toast("GROUP DUPLICATED");
}
$("bplist").addEventListener("click",ev=>{
  const del=ev.target.closest(".bpdel");
  if(del){ const bp=blueprints.find(b=>b.id===del.dataset.bp);
    if(bp&&confirm(`Delete blueprint "${bp.name}"?`)){ blueprints=blueprints.filter(b=>b.id!==del.dataset.bp); saveBPs(); renderBPs(); }
    return; }
  const st=ev.target.closest(".bpstamp");
  if(st) stampBlueprint(st.dataset.bp);
});

(()=>{
  const pr=$("palResize"), ps=$("palscroll"), lp=$("lpanel");

  try{ const s=+localStorage.getItem("tres-palh"); if(s>80){ ps.style.flex="0 0 auto"; ps.style.height=s+"px"; } }catch(_){}
  let startY=0,startH=0,on=false;
  pr.addEventListener("pointerdown",ev=>{
    on=true; pr.classList.add("on");
    startY=ev.clientY; startH=ps.getBoundingClientRect().height;
    try{ pr.setPointerCapture(ev.pointerId); }catch(_){}
    ev.preventDefault();
  });
  pr.addEventListener("pointermove",ev=>{

    const max=lp.getBoundingClientRect().height-150;
    const h=Math.max(80,Math.min(max,startH+(ev.clientY-startY)));
    ps.style.flex="0 0 auto"; ps.style.height=h+"px";

  const done=()=>{ if(!on) return; on=false; pr.classList.remove("on");
    try{ localStorage.setItem("tres-palh",Math.round(ps.getBoundingClientRect().height)); }catch(_){}};
  pr.addEventListener("pointerup",done);
  pr.addEventListener("pointercancel",done);
  pr.addEventListener("dblclick",()=>{ ps.style.flex=""; ps.style.height="";
    try{ localStorage.removeItem("tres-palh"); }catch(_){} });
})();

  rd.readAsText(f);
  ev.target.value="";
});

$("btnHelp").onclick=()=>openModal("MANUAL",`
  <h4>WHAT THIS IS</h4>
  <p>A live schematic of your factory. Every belt, machine and truck line recalculates as you edit.

  <h4>CONTROLS</h4>
  <ul>

  </ul>
  <h4>FROM DIAGRAM TO REAL FACTORY</h4>
  <ul>
    <li>A bank card like <b>×10 @ 92.5%</b> means: build <b>10 identical machines in a row</b> and set <b>each one's</b> clock to 92.5% — click the machine in game, type the exact decimal into the clock box. Below 100% needs no power shards.</li>
    <li>Select any machine card → the right panel shows <b>HOW TO BUILD IT</b>: machine count, clocks, belt tiers, and per-machine pull rates.</li>
    <li>Feed a row with a <b>manifold</b>: one trunk belt along the row, one splitter per machine, splitter chained to splitter. No math — it balances itself.</li>
    <li>The catch: manifolds fill <b>front-to-back</b>. The last machines idle until every belt buffer saturates — a long row can take ~5 minutes. Don't rewire, just wait. When the <b>last</b> machine hits 100%, the row is healthy.</li>
    <li>Collect outputs the same way with mergers down the row.</li>
    <li>Uneven splits (a node sending 30 one way, 22.5 another) settle on their own: belts back up, splitter overflow finds the ratio — as long as total supply = total demand, which is what this tool checks.</li>
    <li>Don't split inputs "exactly" per machine — that's the belts' job. Your job is only: right totals in, same clock on every machine.</li>
    <li><b>No clock panel in your machines yet?</b> Under/overclocking is locked until the MAM Power Slugs research "Overclock Production" (craft 1 Power Shard from a blue slug + 25 plates + 50 wire). Cheap — do it early.</li>

    <li>Storage/truck/train nodes have <b>LOADING MODE</b>: ON they're overflow targets — machines and production lines get fed <b>first</b>, the storage takes only the surplus (like a Smart Splitter set to Overflow). Sinks work the same way. OFF = pure pass-through.</li>

    <tr><td>1 rod + a bit: 20 rods + 100 screws</td><td><b>1 rotor assembler</b> (4/min)</td></tr>
    <tr><td>1 coal generator</td><td>75 MW, eats 15 coal/min + 45 water</td></tr>
  </table>
  <h4>HOW THE SOLVER WORKS (honesty section)</h4>
  <p>Each belt carries min(supply share, downstream demand, belt cap). Splitters share evenly with overflow
  redistribution, mergers pull fairly — same as the game. If a machine is over-fed on one input because another

document.addEventListener("keydown",ev=>{

    return;
  }
  if(ev.key==="Escape"){ if($("modal").classList.contains("open")) closeModal(); else { clearMsel(); select(null); } }
  if(ev.key==="Delete"||ev.key==="Backspace"){
    if(mselSize()){
      snapshot();
      for(const id of [...msel.nodes]) delNode(id);
      state.annos=state.annos.filter(a=>!msel.annos.has(a.id));
      clearMsel(); sel=null; commit();
    }
    else if(sel&&sel.kind==="node"){ snapshot(); delNode(sel.id); sel=null; commit(); }
    else if(sel&&sel.kind==="edge"){ snapshot(); state.edges=state.edges.filter(e=>e.id!==sel.id); sel=null; commit(); }
    else if(sel&&sel.kind==="anno"){ snapshot(); state.annos=state.annos.filter(a=>a.id!==sel.id); sel=null; commit(); }
  }
  if((ev.ctrlKey||ev.metaKey)&&ev.key.toLowerCase()==="d"){ ev.preventDefault(); mselSize()?duplicateGroup():dupSelected(); }
  if((ev.ctrlKey||ev.metaKey)&&ev.key.toLowerCase()==="z"){ ev.preventDefault(); undo(); }
  if(ev.key.toLowerCase()==="f") fitView();
  if(ev.key.toLowerCase()==="s") toggleSelectMode();
  if(ev.key.toLowerCase()==="h") $("btnHelp").click();
});
