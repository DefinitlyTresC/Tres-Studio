<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>echo — tres carter</title>
  <link rel="icon" href="../favicon/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

  <!-- Umami analytics — data-domains scopes tracking to the real site so
       previews/branch URLs don't pollute stats. Clarity below is guarded
       to the production host for the same reason. -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="96e73988-106a-415e-bf80-5e10ffaec0dc" data-domains="tres.studio"></script>
  <script type="text/javascript">
    if (location.hostname === 'tres.studio') {
      (function(c,l,a,r,i,t,y){
          c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
          t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
          y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window, document, "clarity", "script", "xang6oq7f9");
    }
  </script>

  <style>
    /* ───────────────────────────────────────────────────────────
       ECHO — rain on a still pool.
       Lab family: Space Mono chrome, one yellow accent,
       the scene is the page. The pond mirrors birds' sky.
       ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white:     #FFFFFF;
      --black:     #07080B;
      --yellow:    #F5CB5C;
      --ink-faint: rgba(255, 255, 255, 0.38);
      --ink-soft:  rgba(255, 255, 255, 0.6);
      --line:      rgba(255, 255, 255, 0.14);

      --mono: 'Space Mono', ui-monospace, monospace;
      --pad: clamp(1.5rem, 4vw, 3rem);
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    html, body {
      background: var(--black);
      color: var(--white);
      font-family: var(--mono);
      font-size: 15px;
      height: 100%;
      width: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-user-select: none;
      user-select: none;
    }

    a { color: inherit; text-decoration: none; }
    button {
      font: inherit; color: inherit; background: none; border: none;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    a:focus-visible, button:focus-visible {
      outline: 1px solid var(--yellow);
      outline-offset: 3px;
    }

    canvas#pond {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      touch-action: none;
      display: block;
    }

    .fallback {
      position: fixed; inset: 0;
      display: grid; place-items: center;
    }

    /* ─── Chrome ─── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: calc(1.2rem + env(safe-area-inset-top, 0px)) var(--pad) 1.2rem;
      pointer-events: none;
    }
    .nav > * { pointer-events: auto; }
    .nav .mark {
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      transition: opacity 0.25s var(--ease);
    }
    .nav .mark .y { color: var(--yellow); }
    .nav .back {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: var(--ink-soft);
      padding: 0.5rem 0;
      transition: color 0.25s var(--ease);
    }

    .mark-bottom {
      position: fixed;
      bottom: calc(1.6rem + env(safe-area-inset-bottom, 0px));
      left: var(--pad);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.14em;
      z-index: 5;
      pointer-events: none;
    }
    .mark-bottom .y { color: var(--yellow); }

    .hint {
      position: fixed;
      bottom: calc(1.7rem + env(safe-area-inset-bottom, 0px));
      right: var(--pad);
      font-size: 0.56rem;
      letter-spacing: 0.16em;
      color: var(--ink-faint);
      z-index: 5;
      pointer-events: none;
      transition: opacity 0.8s var(--ease);
    }
    .hint.fade { opacity: 0; }

    /* ─── Controls ─── */
    .modes {
      position: fixed;
      top: 50%;
      right: var(--pad);
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
      z-index: 10;
    }
    .mode-btn {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--ink-faint);
      padding: 0.55rem 0.2rem;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      transition: color 0.3s var(--ease);
    }
    .mode-btn.active { color: var(--yellow); }

    @media (hover: hover) {
      .nav .mark:hover { opacity: 0.65; }
      .nav .back:hover { color: var(--white); }
      .mode-btn:hover { color: var(--white); }
      .mode-btn.active:hover { color: var(--yellow); }
    }

    /* ─── Mobile ─── */
    @media (max-width: 700px) {
      .modes {
        top: auto;
        bottom: calc(3.6rem + env(safe-area-inset-bottom, 0px));
        right: 0;
        left: 0;
        transform: none;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 0.2rem;
      }
      .mode-btn {
        padding: 0.55rem 0.55rem;
        font-size: 0.56rem;
      }
      .mark-bottom { font-size: 0.75rem; }
      .hint { max-width: 40vw; text-align: right; }
    }

    /* ─── Reduced motion: chrome settles instantly; the water itself
           calms down in JS (no ambient rain, heavier damping). ─── */
    @media (prefers-reduced-motion: reduce) {
      .nav .mark, .nav .back, .mode-btn, .hint { transition: none; }
    }

    .sr {
      position: absolute;
      width: 1px; height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }
  </style>
</head>
<body>

<canvas id="pond" aria-hidden="true"></canvas>

<p class="sr">A still pool at dusk with the moon reflected on it. Drag the
pointer to wake the water, tap to drop a ring of rain, hold for a downpour,
and switch between still, drizzle, and deluge weathers. Rings cross and
interfere like real water.</p>
<noscript><p class="fallback">echo needs JavaScript.</p></noscript>

<nav class="nav">
  <a class="mark" href="/">tres carter<span class="y">.</span></a>
  <a class="back" href="/lab">[ &larr; lab ]</a>
</nav>

<div class="modes" id="modes" role="group" aria-label="weathers">
  <button class="mode-btn active" data-mode="still" aria-pressed="true">[ still ]</button>
  <button class="mode-btn" data-mode="drizzle" aria-pressed="false">[ drizzle ]</button>
  <button class="mode-btn" data-mode="deluge" aria-pressed="false">[ deluge ]</button>
</div>

<div class="mark-bottom">echo<span class="y">.</span></div>
<div class="hint" id="hint">drag to wake &middot; tap to drop</div>

<script>
(function () {
  'use strict';

  // ══════════════════════════════════════════════════════════
  // SETUP
  // ══════════════════════════════════════════════════════════
  const canvas = document.getElementById('pond');
  const ctx = canvas.getContext('2d', { alpha: false });
  if (!ctx) return;

  const PRM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W = window.innerWidth;
  let H = window.innerHeight;
  let DPR = Math.min(2, window.devicePixelRatio || 1);

  // ══════════════════════════════════════════════════════════
  // WEATHERS — ambient drip behaviour. Interaction is constant.
  //   rate  drips per second (poisson gaps)
  //   amp   drop depth (sim units)
  //   rad   drop radius (cells)
  //   leaf  whether the yellow leaf ever falls
  // ══════════════════════════════════════════════════════════
  const MODES = {
    still:   { rate: 0.07, amp: 26, rad: 1.6, leaf: true  },
    drizzle: { rate: 1.4,  amp: 16, rad: 1.3, leaf: true  },
    deluge:  { rate: 11,   amp: 11, rad: 1.1, leaf: false },
  };
  let P = MODES.still;

  function setMode(name) {
    if (!MODES[name]) return;
    P = MODES[name];
    document.querySelectorAll('.mode-btn[data-mode]').forEach(b => {
      const on = b.dataset.mode === name;
      b.classList.toggle('active', on);
      b.setAttribute('aria-pressed', String(on));
    });
    nextDrip = null;   // reschedule from the next frame's clock
  }

  // ══════════════════════════════════════════════════════════
  // THE WATER — Hugo Elias two-buffer wave field. Real waves:
  // rings expand, reflect off the banks, and interfere. Runs at
  // a coarse grid; the upscale blur IS the water's softness.
  // ══════════════════════════════════════════════════════════
  let CS = 4;              // css px per cell (set in resize)
  let GW = 0, GH = 0;      // grid dims
  let buf = null, prev = null;   // Float32 height fields (ping-pong)
  const DAMP = PRM ? 0.976 : 0.986;
  const EDGE = 4;          // soft-absorb band at the banks

  // render targets
  const water = document.createElement('canvas');   // grid-res pixels
  let wctx = null, img = null, px = null;
  const grain = document.createElement('canvas');   // full-res paper grain

  // baked light — dusk gradient (the birds sky, mirrored) + the moon
  let baseR = null, baseG = null, baseB = null;     // per-row water color
  let moon = null;                                  // per-cell reflection mask

  function bakeLight() {
    baseR = new Float32Array(GH);
    baseG = new Float32Array(GH);
    baseB = new Float32Array(GH);
    for (let y = 0; y < GH; y++) {
      // birds fades #06070A -> #0D1016 downward; the pond mirrors it
      const t = 1 - y / (GH - 1 || 1);
      baseR[y] = 6 + t * 7;
      baseG[y] = 7 + t * 9;
      baseB[y] = 10 + t * 12;
    }
    // The moon's reflection: a broad matte disc, low and off-center —
    // the same moon birds hangs at (0.64, 0.58), read in the water —
    // with a soft column of shimmer falling toward the viewer.
    moon = new Float32Array(GW * GH);
    const mx = GW * 0.64, my = GH * 0.44;
    const r0 = Math.min(GW, GH) * 0.30;
    const feather = r0 * 0.55;
    const colW = r0 * 0.62;
    for (let y = 0; y < GH; y++) {
      for (let x = 0; x < GW; x++) {
        const dx = x - mx, dy = y - my;
        const d = Math.sqrt(dx * dx + dy * dy);
        const disc = Math.max(0, Math.min(1, 1 - (d - r0) / feather));
        let col = 0;
        if (y > my) {
          const fall = Math.max(0, 1 - (y - my) / (GH - my || 1));
          col = Math.exp(-(dx * dx) / (colW * colW)) * fall * 0.55;
        }
        moon[y * GW + x] = Math.min(1, disc * disc * 0.9 + col);
      }
    }
  }

  function bakeGrain() {
    grain.width = Math.floor(W * DPR);
    grain.height = Math.floor(H * DPR);
    const g = grain.getContext('2d');
    g.setTransform(DPR, 0, 0, DPR, 0, 0);
    let seed = 4271;
    const rnd = () => (seed = (seed * 16807) % 2147483647) / 2147483647;
    const n = Math.floor((W * H) / 700);
    for (let i = 0; i < n; i++) {
      const x = rnd() * W, y = rnd() * H;
      g.fillStyle = rnd() > 0.5
        ? 'rgba(255,255,255,0.03)'
        : 'rgba(0,0,0,0.05)';
      g.fillRect(x, y, 1, 1);
    }
  }

  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = true;

    CS = W > 1800 ? 5 : 4;
    GW = Math.max(80, Math.ceil(W / CS));
    GH = Math.max(80, Math.ceil(H / CS));
    buf  = new Float32Array(GW * GH);
    prev = new Float32Array(GW * GH);
    water.width = GW;
    water.height = GH;
    wctx = water.getContext('2d');
    img = wctx.createImageData(GW, GH);
    px = img.data;
    for (let i = 3; i < px.length; i += 4) px[i] = 255;   // opaque, once
    bakeLight();
    bakeGrain();
    leaf = null;   // the old leaf's world is gone
  }
  window.addEventListener('resize', resize, { passive: true });
  window.addEventListener('orientationchange', () => setTimeout(resize, 200));

  // ── disturbances ──
  function drop(cx, cy, amp, rad) {
    const x0 = Math.max(1, Math.floor(cx - rad * 2));
    const x1 = Math.min(GW - 2, Math.ceil(cx + rad * 2));
    const y0 = Math.max(1, Math.floor(cy - rad * 2));
    const y1 = Math.min(GH - 2, Math.ceil(cy + rad * 2));
    const r2 = rad * rad;
    for (let y = y0; y <= y1; y++) {
      for (let x = x0; x <= x1; x++) {
        const dx = x - cx, dy = y - cy;
        const d2 = (dx * dx + dy * dy) / (r2 * 4);
        if (d2 < 1) buf[y * GW + x] -= amp * Math.exp(-d2 * 3.2);
      }
    }
  }

  function dropAtScreen(sx, sy, amp, rad) {
    drop(sx / CS, sy / CS, amp, rad);
  }

  function stepWater() {
    // u' = (n + s + e + w)/2 − u_prev, damped — Hugo Elias's scheme.
    for (let y = 1; y < GH - 1; y++) {
      const row = y * GW;
      for (let x = 1; x < GW - 1; x++) {
        const i = row + x;
        prev[i] = ((buf[i - 1] + buf[i + 1] + buf[i - GW] + buf[i + GW]) * 0.5
                   - prev[i]) * DAMP;
      }
    }
    // soft banks — bleed energy at the rim so reflections come back gentle
    for (let k = 0; k < EDGE; k++) {
      const f = 0.86 + 0.03 * k;
      for (let x = 0; x < GW; x++) {
        prev[k * GW + x] *= f;
        prev[(GH - 1 - k) * GW + x] *= f;
      }
      for (let y = 0; y < GH; y++) {
        prev[y * GW + k] *= f;
        prev[y * GW + GW - 1 - k] *= f;
      }
    }
    const t = buf; buf = prev; prev = t;
  }

  // ── render: height → shade, slope → moonlight refraction + glint ──
  const REFR = 4.2;       // cells of lookup shift per unit slope
  function renderWater() {
    let i4 = 0;
    for (let y = 0; y < GH; y++) {
      const yu = y > 0 ? y - 1 : 0;
      const yd = y < GH - 1 ? y + 1 : GH - 1;
      for (let x = 0; x < GW; x++) {
        const i = y * GW + x;
        const xl = x > 0 ? i - 1 : i;
        const xr = x < GW - 1 ? i + 1 : i;
        const gx = buf[xr] - buf[xl];
        const gy = buf[yd * GW + x] - buf[yu * GW + x];

        // refract the moon: slopes bend where the light is read from
        let sx = x + gx * REFR;
        let sy = y + gy * REFR;
        if (sx < 0) sx = 0; else if (sx > GW - 1) sx = GW - 1;
        if (sy < 0) sy = 0; else if (sy > GH - 1) sy = GH - 1;
        const m = moon[(sy | 0) * GW + (sx | 0)];

        // matte moonlight + crest shading + a mean glint on lit slopes
        const h = buf[i];
        const glint = (gy > 0 ? gy : 0) * m * 3.0;
        let r = baseR[y] + m * 14 + h * 0.85 + glint;
        let g = baseG[y] + m * 17 + h * 0.95 + glint;
        let b = baseB[y] + m * 24 + h * 1.2  + glint * 1.15;

        px[i4]     = r < 0 ? 0 : r > 255 ? 255 : r;
        px[i4 + 1] = g < 0 ? 0 : g > 255 ? 255 : g;
        px[i4 + 2] = b < 0 ? 0 : b > 255 ? 255 : b;
        i4 += 4;
      }
    }
    wctx.putImageData(img, 0, 0);
  }

  // ══════════════════════════════════════════════════════════
  // THE LEAF — one yellow willow leaf. It falls, lands with a
  // ring, rides the waves it makes, and slips away. The page's
  // single point of colour.
  // ══════════════════════════════════════════════════════════
  let leaf = null;
  let nextLeaf = null;   // scheduled off the frame clock

  function spawnLeaf() {
    leaf = {
      x: W * (0.2 + Math.random() * 0.6),
      y: -30,
      vx: (Math.random() - 0.5) * 14,
      vy: 26,
      rot: Math.random() * Math.PI,
      vrot: (Math.random() - 0.5) * 1.4,
      sway: Math.random() * Math.PI * 2,
      landY: H * (0.3 + Math.random() * 0.5),
      age: 0,
      life: 26 + Math.random() * 10,
      state: 'falling',
    };
  }

  function stepLeaf(dt, now) {
    if (!leaf) {
      if (nextLeaf === null) nextLeaf = now + 14000;
      if (!PRM && P.leaf && now >= nextLeaf) spawnLeaf();
      return;
    }
    const L = leaf;
    L.age += dt;
    if (L.state === 'falling') {
      L.sway += dt * 2.1;
      L.x += (L.vx + Math.sin(L.sway) * 30) * dt;
      L.y += L.vy * dt;
      L.rot += L.vrot * dt;
      if (L.y >= L.landY) {
        L.state = 'afloat';
        L.vx *= 0.3; L.vy = 0; L.vrot *= 0.4;
        L.age = 0;
        dropAtScreen(L.x, L.y, 30, 2.1);
      }
    } else {
      // ride the water: the local slope pushes the leaf downhill
      const cx = Math.max(1, Math.min(GW - 2, (L.x / CS) | 0));
      const cy = Math.max(1, Math.min(GH - 2, (L.y / CS) | 0));
      const i = cy * GW + cx;
      const gx = buf[i + 1] - buf[i - 1];
      const gy = buf[i + GW] - buf[i - GW];
      L.vx += (-gx * 14 + 2.4) * dt;       // slope + a whisper of current
      L.vx *= 0.985;
      L.x += L.vx * dt;
      L.y += -gy * 9 * dt;
      L.rot += (L.vrot * 0.2 + gx * 0.05) * dt;
      if (L.age > L.life || L.x > W + 40 || L.x < -40) {
        leaf = null;
        nextLeaf = now + 20000 + Math.random() * 22000;
      }
    }
  }

  function drawLeaf() {
    if (!leaf) return;
    const L = leaf;
    const fade = L.state === 'afloat'
      ? Math.min(1, Math.max(0, (L.life - L.age) / 3))
      : 1;
    ctx.save();
    ctx.translate(L.x, L.y);
    ctx.rotate(L.rot);
    ctx.globalAlpha = 0.92 * fade;
    ctx.fillStyle = '#F5CB5C';
    ctx.beginPath();
    ctx.moveTo(-7, 0);
    ctx.quadraticCurveTo(0, -3.6, 7, 0);
    ctx.quadraticCurveTo(0, 3.6, -7, 0);
    ctx.fill();
    ctx.restore();
  }

  // ══════════════════════════════════════════════════════════
  // INPUT — drag wakes, tap drops, hold rains where you hold.
  // ══════════════════════════════════════════════════════════
  const hint = document.getElementById('hint');
  let hintFaded = false;
  function fadeHint() {
    if (hintFaded) return;
    hintFaded = true;
    hint.classList.add('fade');
  }

  let pointer = null;   // one finger owns the pond

  canvas.addEventListener('pointerdown', (e) => {
    if (pointer) return;
    pointer = {
      id: e.pointerId,
      x: e.clientX, y: e.clientY,
      lx: e.clientX, ly: e.clientY,
      t0: last,           // frame clock — consistent with stepHold
      moved: false,
      holdT: 0,
    };
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener('pointermove', (e) => {
    if (!pointer || e.pointerId !== pointer.id) return;
    const dx = e.clientX - pointer.x;
    const dy = e.clientY - pointer.y;
    if (!pointer.moved && dx * dx + dy * dy > 64) pointer.moved = true;
    if (pointer.moved) {
      // wake: stitch small dents along the path, speed-weighted
      const sx = e.clientX - pointer.lx, sy = e.clientY - pointer.ly;
      const dist = Math.sqrt(sx * sx + sy * sy);
      const steps = Math.max(1, Math.min(8, Math.round(dist / CS)));
      const spd = Math.min(1, dist / 40);
      for (let s = 0; s < steps; s++) {
        const t = (s + 1) / steps;
        dropAtScreen(
          pointer.lx + sx * t,
          pointer.ly + sy * t,
          3.5 + spd * 7, 1.05
        );
      }
      fadeHint();
    }
    pointer.lx = e.clientX;
    pointer.ly = e.clientY;
  });

  function endPointer(e) {
    if (!pointer || e.pointerId !== pointer.id) return;
    const held = last - pointer.t0;
    if (!pointer.moved && held < 320) {
      dropAtScreen(pointer.lx, pointer.ly, 34, 1.9);   // the tap: one clean ring
      fadeHint();
    }
    pointer = null;
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);
  window.addEventListener('pointerup', endPointer);

  // held still: rain gathers under the hand
  function stepHold(dt, now) {
    if (!pointer || pointer.moved) return;
    if (now - pointer.t0 < 350) return;
    pointer.holdT += dt;
    if (pointer.holdT > 0.09) {
      pointer.holdT = 0;
      const a = Math.random() * Math.PI * 2;
      const r = Math.random() * 34;
      dropAtScreen(
        pointer.lx + Math.cos(a) * r,
        pointer.ly + Math.sin(a) * r,
        12, 1.2
      );
      fadeHint();
    }
  }

  // ── controls ──
  document.getElementById('modes').addEventListener('click', (e) => {
    const b = e.target.closest('.mode-btn');
    if (b && b.dataset.mode) setMode(b.dataset.mode);
  });
  window.addEventListener('keydown', (e) => {
    if (e.key === '1') setMode('still');
    else if (e.key === '2') setMode('drizzle');
    else if (e.key === '3') setMode('deluge');
    else if (e.key === ' ' && !e.repeat) {
      e.preventDefault();
      dropAtScreen(W * (0.15 + Math.random() * 0.7),
                   H * (0.15 + Math.random() * 0.7), 34, 1.9);
      fadeHint();
    }
  });

  // ══════════════════════════════════════════════════════════
  // AMBIENT RAIN
  // ══════════════════════════════════════════════════════════
  function dripDelay() {
    const rate = PRM ? 0 : P.rate;
    if (!rate) return 3600000;
    return -Math.log(1 - Math.random()) / rate * 1000;   // poisson gap
  }
  let nextDrip = null;

  function stepRain(now) {
    if (nextDrip === null) nextDrip = now + dripDelay();
    let guard = 0;
    while (now >= nextDrip && guard++ < 40) {
      dropAtScreen(Math.random() * W, Math.random() * H,
                   P.amp * (0.7 + Math.random() * 0.6), P.rad);
      nextDrip += dripDelay();
    }
    if (guard >= 40) nextDrip = now + dripDelay();   // tab was asleep
  }

  // ══════════════════════════════════════════════════════════
  // LOOP
  // ══════════════════════════════════════════════════════════
  let last = performance.now();
  let frame = 0;

  function frameBody(now) {
    if (canvas.width === 0 && window.innerWidth > 0) resize();   // 0-size load guard
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    frame++;

    stepRain(now);
    stepHold(dt, now);
    stepLeaf(dt, now);

    // PRM: the pond thinks at half speed
    if (!PRM || (frame & 1) === 0) stepWater();

    renderWater();
    ctx.drawImage(water, 0, 0, W, H);
    ctx.drawImage(grain, 0, 0, W, H);
    drawLeaf();
  }

  function loop(now) {
    requestAnimationFrame(loop);
    frameBody(now);
  }

  resize();
  // open on a live surface: three quiet rings already crossing
  drop(GW * 0.30, GH * 0.62, 30, 1.9);
  drop(GW * 0.55, GH * 0.35, 24, 1.7);
  drop(GW * 0.72, GH * 0.68, 27, 1.8);
  requestAnimationFrame(loop);

  // ── QA hook: step the sim without rAF + read a small snapshot.
  //    Occluded windows starve rAF; this keeps the piece testable. ──
  if (location.hostname === 'localhost' || location.search.indexOf('qa') !== -1) {
    window.__lab = {
      tick(n, ms) {
        n = n || 1; ms = ms || 16.7;
        for (let i = 0; i < n; i++) frameBody(last + ms);
      },
      drop: dropAtScreen,
      snap(w) {
        w = w || 320;
        const c = document.createElement('canvas');
        c.width = w; c.height = Math.round(w * H / W);
        c.getContext('2d').drawImage(canvas, 0, 0, c.width, c.height);
        return c.toDataURL('image/jpeg', 0.82);
      },
      info: () => ({ GW, GH, CS, leaf: !!leaf, frame }),
    };
  }
})();
</script>
