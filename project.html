<script>
// Page-specific helpers — short, so kept inline.

// Description rendering: split on blank lines into paragraphs, single
// newlines → <br>. Lets multi-paragraph sheet cells (Alt+Enter) render right.
function renderDescription(text) {
  if (!text) return '';
  return text
    .split(/\n\s*\n/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(para => `<p>${para.replace(/\n/g, '<br>')}</p>`)
    .join('');
}

// One gallery cell — image or video by type. Videos autoplay muted+looped.
function renderMediaCell(m, name) {
  if (m.type === 'video') {
    return `
      <div class="gallery-item reveal">
        <video src="${m.url}" autoplay muted loop playsinline preload="metadata"
               onloadeddata="this.classList.add('loaded')"
               onerror="this.parentElement.style.display='none'"></video>
      </div>`;
  }
  return `
    <div class="gallery-item reveal">
      <img src="${m.url}" alt="${name}" loading="lazy" decoding="async"
           onload="this.classList.add('loaded')"
           onerror="this.parentElement.style.display='none'" />
    </div>`;
}

function setMetaContent(id, value) {
  const el = document.getElementById(id);
  if (el) el.setAttribute('content', value);
}

// Reading progress — orange line fills 0→100% through the body. rAF-throttled.
function initReadProgress() {
  const bar = document.getElementById('readProgress');
  if (!bar) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { bar.style.display = 'none'; return; }
  let scheduled = false;
  function update() {
    scheduled = false;
    const doc = document.documentElement;
    const max = doc.scrollHeight - window.innerHeight;
    const ratio = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
    bar.style.transform = `scaleX(${ratio})`;
  }
  function onScroll() { if (scheduled) return; scheduled = true; requestAnimationFrame(update); }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll);
  update();
}

(async () => {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'index.html'; return; }

  const [p, all] = await Promise.all([DATA.getProjectBySlug(id), DATA.getProjects()]);
  if (!p) {
    document.getElementById('content').innerHTML = `
      <section class="empty-cat">
        <div class="empty-cat-tag">— Not found</div>
        <h1 class="empty-cat-name">404</h1>
        <p class="empty-cat-msg">No project matches "${id}".</p>
        <a class="empty-cat-back" href="index.html">← Back to studio</a>
      </section>`;
    return;
  }

  const title = `${p.name} — Tres.`;
  document.getElementById('page-title').textContent = title;
  setMetaContent('og-title', title);
  const firstLine = (p.description || '').split(/\n+/)[0].trim();
  const descParts = [];
  if (p.location) descParts.push(p.location);
  if (p.year)     descParts.push(p.year);
  const desc = (firstLine || descParts.join(' · ') || `Project by Tres Carter.`).slice(0, 200);
  setMetaContent('page-desc', desc);
  setMetaContent('og-desc', desc);
  if (p.heroUrl) setMetaContent('og-image', p.heroUrl);

  const backHref = p.category ? `category.html?cat=${p.category}` : 'index.html';
  const backLabel = p.category ? p.category.charAt(0).toUpperCase() + p.category.slice(1) : 'Index';

  // Prev/next within the same category, ordered by the sheet's Order column. Wraps.
  const siblings = p.category ? all.filter(x => x.category === p.category) : [];
  const idx = siblings.findIndex(x => x.slug === p.slug);
  let prev = null, next = null;
  if (idx >= 0 && siblings.length > 1) {
    prev = siblings[(idx - 1 + siblings.length) % siblings.length];
    next = siblings[(idx + 1) % siblings.length];
  }

  // Spec-sheet metadata line — Project No · year · location · status.
  const specBits = [];
  if (p.id)       specBits.push(`No. ${String(p.id).padStart(2,'0')}`);
  if (p.year)     specBits.push(p.year);
  if (p.location) specBits.push(p.location);
  if (p.status)   specBits.push(p.status);

  const navHtml = (prev || next) ? `
    <nav class="detail-nav" aria-label="More projects in ${backLabel}">
      ${prev ? `
        <a class="detail-nav-link detail-nav-link--prev" href="project.html?id=${prev.slug}">
          <span class="detail-nav-meta"><span class="detail-nav-arrow">←</span> Previous</span>
          <span class="detail-nav-name">${prev.name}</span>
        </a>` : '<span></span>'}
      ${next ? `
        <a class="detail-nav-link detail-nav-link--next" href="project.html?id=${next.slug}">
          <span class="detail-nav-meta">Next <span class="detail-nav-arrow">→</span></span>
          <span class="detail-nav-name">${next.name}</span>
        </a>` : '<span></span>'}
    </nav>` : '';

  document.getElementById('content').innerHTML = `
    <section class="detail">
      <div class="detail-head">
        <div class="reveal">
          <div class="detail-eyebrow">— ${backLabel} · Project</div>
          <h1 class="detail-title">${p.name}</h1>
          <div class="detail-loc">${specBits.join(' · ')}</div>
        </div>
        <div class="detail-desc reveal">
          ${renderDescription(p.description)}
          ${p.designedAt ? `
            <div class="detail-credit">
              — Designed at ${p.designedAtUrl
                ? `<a href="${p.designedAtUrl}" target="_blank" rel="noopener">${p.designedAt}</a>`
                : `<span>${p.designedAt}</span>`}
            </div>` : ''}
        </div>
      </div>

      ${p.heroUrl ? `
        <section class="gallery" style="margin-top:clamp(40px,8vh,90px)">
          <div class="gallery-item reveal">
            <img src="${p.heroUrl}" alt="${p.name}" fetchpriority="high" decoding="async"
                 onload="this.classList.add('loaded')"
                 onerror="this.parentElement.style.display='none'" />
          </div>
        </section>` : ''}

      <section class="gallery${p.media.length > 50 ? ' gallery--long' : ''}">
        ${p.media.map(m => renderMediaCell(m, p.name)).join('')}
      </section>

      ${navHtml}

      <a class="detail-back" href="${backHref}">← Back to ${backLabel}</a>
    </section>
  `;

  if (window.TRES) window.TRES.scan(document.getElementById('content'));
  initReadProgress();
})();
</script>
