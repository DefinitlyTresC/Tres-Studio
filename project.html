<script>
// Tiny helpers — kept inline because they're page-specific and short.

// Description rendering: split on blank lines into paragraphs, convert
// single newlines into <br>. Lets you write multi-paragraph descriptions
// in the Google Sheet (Alt+Enter to add a line break in a cell) and have
// them render properly instead of collapsing into one wall of text.
function renderDescription(text) {
  if (!text) return '';
  return text
    .split(/\n\s*\n/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(para => `<p>${para.replace(/\n/g, '<br>')}</p>`)
    .join('');
}

// Render one gallery cell — image or video based on the entry's type.
// Videos autoplay muted+looped (silent ambient motion) and reuse the same
// .loaded fade-in pattern the images use, so they don't pop in.
//
// useReveal toggles the per-cell fade-up reveal. Long galleries (e.g., the
// 73-tile thesis page) pass false so 50+ animations don't pile onto the
// scroll thread. The .loaded fade still triggers per image as they decode.
function renderMediaCell(m, name, useReveal) {
  const cls = useReveal ? 'gallery-item reveal' : 'gallery-item';
  if (m.type === 'video') {
    return `
      <div class="${cls}">
        <video src="${m.url}"
               autoplay muted loop playsinline preload="metadata"
               onloadeddata="this.classList.add('loaded')"
               onerror="this.parentElement.style.display='none'"></video>
      </div>`;
  }
  // decoding="async" tells the browser to decode the bitmap off the main
  // thread. Big win when scrolling through many large images at once.
  return `
    <div class="${cls}">
      <img src="${m.url}" alt="${name}" loading="lazy" decoding="async"
           onload="this.classList.add('loaded')"
           onerror="this.parentElement.style.display='none'" />
    </div>`;
}

(async () => {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'index.html'; return; }

  const p = await DATA.getProjectBySlug(id);
  if (!p) {
    document.getElementById('content').innerHTML = '<div class="loading">project not found</div>';
    return;
  }

  document.getElementById('page-title').textContent = `${p.name} — Tres Carter`;
  const backHref = p.category ? `category.html?cat=${p.category}` : 'index.html';
  const backLabel = p.category ? p.category.charAt(0).toUpperCase() + p.category.slice(1) : 'Studio';

  document.getElementById('content').innerHTML = `
    <section class="detail">
      <div class="detail-head">
        <div class="reveal">
          <div class="detail-eyebrow">— Project</div>
          <h1 class="detail-title">${p.name}</h1>
          <div class="detail-loc">${p.location || ''}<span class="y"> · </span>${p.year || ''}</div>
        </div>
        <div class="detail-desc reveal">
          ${renderDescription(p.description)}
          ${p.designedAt ? `
            <div class="detail-credit">
              — Designed at ${p.designedAtUrl
                ? `<a href="${p.designedAtUrl}" target="_blank" rel="noopener">${p.designedAt}</a>`
                : `<span>${p.designedAt}</span>`}
            </div>
          ` : ''}
        </div>
      </div>

      ${p.heroUrl ? `
        <div class="gallery-item reveal" style="width:100%; margin-top:6rem;">
          <img src="${p.heroUrl}" alt="${p.name}"
               onload="this.classList.add('loaded')"
               onerror="this.parentElement.style.display='none'" />
        </div>
      ` : ''}

      <section class="gallery${p.media.length > 50 ? ' gallery--long' : ''}">
        ${p.media.map(m => renderMediaCell(m, p.name, p.media.length <= 50)).join('')}
      </section>

      <a class="detail-back" href="${backHref}">← Back to ${backLabel}</a>
    </section>
  `;
})();
</script>
