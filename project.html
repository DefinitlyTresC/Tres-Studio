<script>
// Tiny helpers — kept inline because they're page-specific and short.

// Description rendering: split on blank lines into paragraphs, convert
// single newlines into <br>. Lets you write multi-paragraph descriptions
// in the Google Sheet (Alt+Enter to add a line break in a cell) and have
// them render properly instead of collapsing into one wall of text.
function renderDescription(text) {
  if (!text) return '';
  return text
    .split(/\n\s*\n/)
    .map(s => s.trim())
    .filter(Boolean)
    .map(para => `<p>${para.replace(/\n/g, '<br>')}</p>`)
    .join('');
}

// Render one gallery cell — image or video based on the entry's type.
// Videos autoplay muted+looped (silent ambient motion) and reuse the same
// .loaded fade-in pattern the images use, so they don't pop in.
//
// useReveal toggles the per-cell fade-up reveal. Long galleries (e.g., the
// 73-tile thesis page) pass false so 50+ animations don't pile onto the
// scroll thread. The .loaded fade still triggers per image as they decode.
function renderMediaCell(m, name, useReveal) {
  const cls = useReveal ? 'gallery-item reveal' : 'gallery-item';
  if (m.type === 'video') {
    return `
      <div class="${cls}">
        <video src="${m.url}"
               autoplay muted loop playsinline preload="metadata"
               onloadeddata="this.classList.add('loaded')"
               onerror="this.parentElement.style.display='none'"></video>
      </div>`;
  }
  // decoding="async" tells the browser to decode the bitmap off the main
  // thread. Big win when scrolling through many large images at once.
  return `
    <div class="${cls}">
      <img src="${m.url}" alt="${name}" loading="lazy" decoding="async"
           onload="this.classList.add('loaded')"
           onerror="this.parentElement.style.display='none'" />
    </div>`;
}

function setMetaContent(id, value) {
  const el = document.getElementById(id);
  if (el) el.setAttribute('content', value);
}

// Reading progress — yellow line at top of page scrolls 0% → 100% as
// the user moves through the detail body. rAF-throttled to one paint
// per frame. Skipped under reduced-motion.
function initReadProgress() {
  const bar = document.getElementById('readProgress');
  if (!bar) return;
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    bar.style.display = 'none';
    return;
  }
  let scheduled = false;
  function update() {
    scheduled = false;
    const doc = document.documentElement;
    const max = doc.scrollHeight - window.innerHeight;
    const ratio = max > 0 ? Math.min(1, Math.max(0, window.scrollY / max)) : 0;
    bar.style.transform = `scaleX(${ratio})`;
  }
  function onScroll() {
    if (scheduled) return;
    scheduled = true;
    requestAnimationFrame(update);
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('resize', onScroll);
  update();
}

(async () => {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { location.href = 'index.html'; return; }

  // Pull the full list in parallel so we can compute prev/next without
  // a second fetch — getProjects() is memoized inside DATA.
  const [p, all] = await Promise.all([DATA.getProjectBySlug(id), DATA.getProjects()]);
  if (!p) {
    document.getElementById('content').innerHTML = `
      <section class="empty-cat">
        <h1 class="empty-cat-name">Not found</h1>
        <p class="empty-cat-msg">No project matches "${id}".</p>
        <a class="empty-cat-back" href="index.html">← Back to studio</a>
      </section>`;
    return;
  }

  const title = `${p.name} — Tres Carter`;
  document.getElementById('page-title').textContent = title;
  setMetaContent('og-title', title);
  // Build a short description from the project: location · year + first
  // sentence of the body. Falls back to a generic line.
  const firstLine = (p.description || '').split(/\n+/)[0].trim();
  const descParts = [];
  if (p.location) descParts.push(p.location);
  if (p.year)     descParts.push(p.year);
  const desc = (firstLine || descParts.join(' · ') || `Project by Tres Carter.`).slice(0, 200);
  setMetaContent('page-desc', desc);
  setMetaContent('og-desc', desc);
  if (p.heroUrl) setMetaContent('og-image', p.heroUrl);

  const backHref = p.category ? `category.html?cat=${p.category}` : 'index.html';
  const backLabel = p.category ? p.category.charAt(0).toUpperCase() + p.category.slice(1) : 'Studio';

  // Prev/next within the same category, ordered by the sheet's Order column.
  // Wraps around so the end loops back to the start.
  const siblings = p.category ? all.filter(x => x.category === p.category) : [];
  const idx = siblings.findIndex(x => x.slug === p.slug);
  let prev = null, next = null;
  if (idx >= 0 && siblings.length > 1) {
    prev = siblings[(idx - 1 + siblings.length) % siblings.length];
    next = siblings[(idx + 1) % siblings.length];
  }

  const navHtml = (prev || next) ? `
    <nav class="detail-nav" aria-label="More projects in ${backLabel}">
      ${prev ? `
        <a class="detail-nav-link detail-nav-link--prev" href="project.html?id=${prev.slug}" data-hover>
          <span class="detail-nav-arrow">←</span>
          <span class="detail-nav-meta">Previous</span>
          <span class="detail-nav-name">${prev.name}</span>
        </a>
      ` : '<span></span>'}
      ${next ? `
        <a class="detail-nav-link detail-nav-link--next" href="project.html?id=${next.slug}" data-hover>
          <span class="detail-nav-meta">Next</span>
          <span class="detail-nav-name">${next.name}</span>
          <span class="detail-nav-arrow">→</span>
        </a>
      ` : '<span></span>'}
    </nav>
  ` : '';

  document.getElementById('content').innerHTML = `
    <section class="detail">
      <div class="detail-head">
        <div class="reveal">
          <div class="detail-eyebrow">— Project</div>
          <h1 class="detail-title">${p.name}</h1>
          <div class="detail-loc">${p.location || ''}<span class="y"> · </span>${p.year || ''}</div>
        </div>
        <div class="detail-desc reveal">
          ${renderDescription(p.description)}
          ${p.designedAt ? `
            <div class="detail-credit">
              — Designed at ${p.designedAtUrl
                ? `<a href="${p.designedAtUrl}" target="_blank" rel="noopener">${p.designedAt}</a>`
                : `<span>${p.designedAt}</span>`}
            </div>
          ` : ''}
        </div>
      </div>

      ${p.heroUrl ? `
        <div class="gallery-item reveal" style="width:100%; margin-top:6rem;">
          <img src="${p.heroUrl}" alt="${p.name}" fetchpriority="high" decoding="async"
               onload="this.classList.add('loaded')"
               onerror="this.parentElement.style.display='none'" />
        </div>
      ` : ''}

      <section class="gallery${p.media.length > 50 ? ' gallery--long' : ''}">
        ${p.media.map(m => renderMediaCell(m, p.name, p.media.length <= 50)).join('')}
      </section>

      ${navHtml}

      <a class="detail-back" href="${backHref}">← Back to ${backLabel}</a>
    </section>
  `;

  initReadProgress();
})();
</script>
