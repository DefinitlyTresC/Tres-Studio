# Astro static build. Netlify runs the build and publishes dist/.
# V3.0 (2026-07-20): the multiverse edge function (roll.js) is gone — "/"
# is a plain static page now. The pulse visitor counter stays.
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Function source never lands in dist/, but keep the guard just in case
# anything copies it through.
[[redirects]]
  from = "/netlify/*"
  to = "/index.html"
  status = 404
  force = true
