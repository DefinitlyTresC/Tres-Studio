# Astro static build. Netlify runs the build and publishes dist/.
# (Since the 2026-07-03 cutover, main == astro-migration; the pre-Astro
# root-published static site is gone — removed in the 2026-07-11 cleanup.)
[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# The multiverse front door: "/" serves a random site (rewrite, not redirect).
[[edge_functions]]
  function = "roll"
  path = "/"

# Function source never lands in dist/, but keep the guard until cutover
# cleanup just in case anything copies it through.
[[redirects]]
  from = "/netlify/*"
  to = "/index.html"
  status = 404
  force = true
