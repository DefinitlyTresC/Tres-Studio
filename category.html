<script>
// Category numbering — matches the cats array on the homepage so the
// "— Category · NN" eyebrow stays in sync if new categories are added.
const CATEGORY_NUM = { architecture: '01', personal: '02' };

function setMeta(name, value) {
  const el = document.getElementById(name);
  if (el) {
    if ('content' in el && el.tagName !== 'TITLE') el.setAttribute('content', value);
    else el.textContent = value;
  }
}

(async () => {
  const params = new URLSearchParams(location.search);
  const cat = (params.get('cat') || 'architecture').toLowerCase();
  const catLabel = cat.charAt(0).toUpperCase() + cat.slice(1);
  const num = CATEGORY_NUM[cat] || '·';
  const title = `${catLabel} — Tres Carter`;

  setMeta('page-title', title);
  setMeta('og-title', title);
  const desc = `${catLabel} work by Tres Carter.`;
  setMeta('page-desc', desc);
  setMeta('og-desc', desc);

  const projects = await DATA.getProjectsByCategory(cat);
  const content = document.getElementById('content');

  if (!projects.length) {
    content.innerHTML = `
      <section class="empty-cat">
        <div class="empty-cat-tag">— Category<span class="y"> · </span>${num}</div>
        <h1 class="empty-cat-name">${catLabel}</h1>
        <p class="empty-cat-msg">No projects in ${catLabel.toLowerCase()} yet.</p>
        <a class="empty-cat-back" href="index.html">← Back to studio</a>
      </section>`;
    return;
  }

  content.innerHTML = `
    <section class="cat-intro">
      <div class="reveal">
        <div class="cat-intro-tag">— Category<span class="y"> · </span>${num}</div>
        <h1 class="cat-intro-name">${catLabel}</h1>
      </div>
      <div class="cat-intro-meta reveal">
        <strong>${projects.length} projects</strong>
        2023 — 2026
      </div>
    </section>

    <section class="proj-list">
      ${projects.map(p => `
        <a class="proj-item reveal" href="project.html?id=${p.slug}">
          <div class="proj-img">
            <img src="${p.heroUrlThumb || ''}" alt="${p.name}" loading="lazy" decoding="async" onerror="this.style.display='none'" />
          </div>
          <div class="proj-meta">
            <span class="name">${p.name}</span>
            <span class="info">${p.location || ''}${p.year ? ' · ' + p.year : ''}</span>
          </div>
        </a>
      `).join('')}
    </section>
  `;
})();
</script>
