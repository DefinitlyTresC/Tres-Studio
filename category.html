<script>
// Category numbering — kept in sync with the homepage genre index.
const CATEGORY_NUM = { architecture: '01', personal: '02', lab: '03' };

function setMeta(id, value) {
  const el = document.getElementById(id);
  if (!el) return;
  if (el.tagName === 'TITLE') el.textContent = value;
  else el.setAttribute('content', value);
}

(async () => {
  const params = new URLSearchParams(location.search);
  const cat = (params.get('cat') || 'architecture').toLowerCase();
  const catLabel = cat.charAt(0).toUpperCase() + cat.slice(1);
  const num = CATEGORY_NUM[cat] || '·';
  const title = `${catLabel} — Tres.`;

  setMeta('page-title', title);
  setMeta('og-title', title);
  const desc = `${catLabel} work by Tres Carter.`;
  setMeta('page-desc', desc);
  setMeta('og-desc', desc);

  const projects = await DATA.getProjectsByCategory(cat);
  const content = document.getElementById('content');

  if (!projects.length) {
    content.innerHTML = `
      <section class="empty-cat">
        <div class="empty-cat-tag">— Category · ${num}</div>
        <h1 class="empty-cat-name">${catLabel}</h1>
        <p class="empty-cat-msg">No projects in ${catLabel.toLowerCase()} yet.</p>
        <a class="empty-cat-back" href="index.html">← Back to studio</a>
      </section>`;
    if (window.TRES) window.TRES.scan(content);
    return;
  }

  content.innerHTML = `
    <section class="cat-intro">
      <div class="reveal">
        <div class="cat-intro-tag">— Category · ${num}</div>
        <h1 class="cat-intro-name">${catLabel}</h1>
      </div>
      <div class="cat-intro-meta reveal">
        <strong>${String(projects.length).padStart(2,'0')} projects</strong>
        2023 — 2026
      </div>
    </section>

    <section class="proj-list">
      ${projects.map(p => `
        <a class="proj-item reveal" href="project.html?id=${p.slug}">
          <div class="proj-img">
            <img src="${p.heroUrlThumb || ''}" alt="${p.name}" loading="lazy" decoding="async" onerror="this.style.display='none'" />
          </div>
          <div class="proj-meta">
            <span class="name">${p.name}</span>
            <span class="info">${[p.location, p.year].filter(Boolean).join(' · ')}</span>
          </div>
        </a>
      `).join('')}
    </section>
  `;

  if (window.TRES) window.TRES.scan(content);
})();
</script>
