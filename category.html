<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
<script src="config.js"></script>
<script src="data.js"></script>
<script src="scroll.js"></script>
<script>
(async () => {
  const params = new URLSearchParams(location.search);
  const cat = (params.get('cat') || 'architecture').toLowerCase();
  const catLabel = cat.charAt(0).toUpperCase() + cat.slice(1);
  document.getElementById('page-title').textContent = `${catLabel} — Tres Carter`;

  const projects = await DATA.getProjectsByCategory(cat);
  const content = document.getElementById('content');

  if (!projects.length) {
    content.innerHTML = `<div class="loading">no projects in ${catLabel} yet</div>`;
    return;
  }

  content.innerHTML = `
    <section class="cat-intro">
      <div class="reveal">
        <div class="cat-intro-tag">— Category<span class="y"> · </span>0${cat === 'architecture' ? '1' : '2'}</div>
        <h1 class="cat-intro-name">${catLabel}</h1>
      </div>
      <div class="cat-intro-meta reveal">
        <strong>${projects.length} projects</strong>
        2023 — 2026
      </div>
    </section>

    <section class="proj-list">
      ${projects.map((p, i) => `
        <a class="proj-item reveal" href="project.html?id=${p.slug}">
          <div class="proj-img">
            <img src="${p.heroUrlThumb || ''}" alt="${p.name}" loading="lazy" onerror="this.style.display='none'" />
          </div>
          <div class="proj-meta">
            <span class="name">${p.name}</span>
            <span class="info">${p.location || ''}${p.year ? ' · ' + p.year : ''}</span>
          </div>
        </a>
      `).join('')}
    </section>
  `;
})();
</script>

</body>
</html>
