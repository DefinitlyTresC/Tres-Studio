<script>
// ═══════════════════════════════════════════════════════════════
// ABOUT — content. Edit these lines freely. Each entry is a
// paragraph; the typewriter handles all spacing and timing.
// Add or remove lines as you like — no other code changes needed.
// ═══════════════════════════════════════════════════════════════
const ABOUT_LINES = [
  "hey, i'm tres carter.",
  "i build things... websites, games, tools, houses, whole neighborhoods, design guidelines, the occasional commercial mixed-use or restaurants.",
  "i live on 30a with my cat exploring point washington and experimenting with projection mapping",
  "i work on my car. i play a few instruments, none particularly well.",
  "day job: architectural designer at chancey in seagrove. auburn architecture before that.",
  "the rest is in the studio. say hi → tres@tres.studio",
];

// ─── Typewriter engine — you shouldn't need to touch any of this ───
(() => {
  const typer   = document.getElementById('typer');
  const actions = document.querySelector('.about-actions');
  if (!typer) return;

  // Honor reduced-motion preference — drop everything in instantly.
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    ABOUT_LINES.forEach(text => {
      const p = document.createElement('p');
      p.className = 'about-line';
      p.textContent = text;
      typer.appendChild(p);
    });
    typer.classList.add('done');
    if (actions) actions.classList.add('ready');
    return;
  }

  // Timing knobs
  const CHAR_MS  = 28;   // base ms per character
  const PUNCT_MS = 110;  // extra pause after . , : — ! ?
  const LINE_MS  = 380;  // pause between paragraphs
  const START_MS = 550;  // pause before the first character

  let cancelled = false;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function run() {
    await sleep(START_MS);
    for (let i = 0; i < ABOUT_LINES.length; i++) {
      if (cancelled) return;
      const p = document.createElement('p');
      p.className = 'about-line';
      typer.appendChild(p);
      const text = ABOUT_LINES[i];
      for (let c = 0; c < text.length; c++) {
        if (cancelled) { p.textContent = text; break; }
        p.textContent += text[c];
        let wait = CHAR_MS;
        if (/[.,!?—:]/.test(text[c])) wait += PUNCT_MS;
        await sleep(wait);
      }
      if (cancelled) break;
      if (i < ABOUT_LINES.length - 1) await sleep(LINE_MS);
    }
    finish();
  }

  function finish() {
    if (cancelled && typer.classList.contains('done')) return;
    cancelled = true;
    // Complete any partially-typed line first
    const lastIdx = typer.children.length - 1;
    if (lastIdx >= 0 && lastIdx < ABOUT_LINES.length) {
      typer.children[lastIdx].textContent = ABOUT_LINES[lastIdx];
    }
    // Drop in any remaining paragraphs
    for (let i = lastIdx + 1; i < ABOUT_LINES.length; i++) {
      const p = document.createElement('p');
      p.className = 'about-line';
      p.textContent = ABOUT_LINES[i];
      typer.appendChild(p);
    }
    typer.classList.add('done');
    setTimeout(() => actions && actions.classList.add('ready'), 500);
  }

  // Skip the typing on click in the body, or Space / Enter
  document.querySelector('.about-body').addEventListener('click', () => {
    if (!cancelled) finish();
  });
  document.addEventListener('keydown', (e) => {
    if ((e.key === ' ' || e.key === 'Enter') && !cancelled) {
      e.preventDefault();
      finish();
    }
  });

  run();
})();
</script>
