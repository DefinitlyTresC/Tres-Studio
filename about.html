<script>
// ═══════════════════════════════════════════════════════════════
// ABOUT — content. Edit these lines freely. Each is a paragraph;
// the typewriter handles spacing and timing.
// ═══════════════════════════════════════════════════════════════
const ABOUT_LINES = [
  "hey, i'm tres carter.",
  "i build things... websites, games, tools, houses, whole neighborhoods, design guidelines, the occasional commercial mixed-use or restaurant.",
  "i live on 30a with my cat, exploring point washington and experimenting with projection mapping.",
  "i work on my car. i play a few instruments, none particularly well.",
  "day job: architectural designer at chancey in seagrove. auburn architecture before that.",
  "the rest is in the studio. say hi → tres@tres.studio",
];

// ─── Typewriter engine ───
(() => {
  const typer   = document.getElementById('typer');
  const actions = document.querySelector('.about-actions');
  if (!typer) return;

  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    ABOUT_LINES.forEach(text => {
      const p = document.createElement('p');
      p.className = 'about-line';
      p.textContent = text;
      typer.appendChild(p);
    });
    typer.classList.add('done');
    if (actions) actions.classList.add('ready');
    return;
  }

  const CHAR_MS = 26, PUNCT_MS = 110, LINE_MS = 360, START_MS = 600;
  let cancelled = false;
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  async function run() {
    await sleep(START_MS);
    for (let i = 0; i < ABOUT_LINES.length; i++) {
      if (cancelled) return;
      const p = document.createElement('p');
      p.className = 'about-line';
      typer.appendChild(p);
      const text = ABOUT_LINES[i];
      for (let c = 0; c < text.length; c++) {
        if (cancelled) { p.textContent = text; break; }
        p.textContent += text[c];
        let wait = CHAR_MS;
        if (/[.,!?—:]/.test(text[c])) wait += PUNCT_MS;
        await sleep(wait);
      }
      if (cancelled) break;
      if (i < ABOUT_LINES.length - 1) await sleep(LINE_MS);
    }
    finish();
  }

  function finish() {
    if (cancelled && typer.classList.contains('done')) return;
    cancelled = true;
    const lastIdx = typer.children.length - 1;
    if (lastIdx >= 0 && lastIdx < ABOUT_LINES.length) {
      typer.children[lastIdx].textContent = ABOUT_LINES[lastIdx];
    }
    for (let i = lastIdx + 1; i < ABOUT_LINES.length; i++) {
      const p = document.createElement('p');
      p.className = 'about-line';
      p.textContent = ABOUT_LINES[i];
      typer.appendChild(p);
    }
    typer.classList.add('done');
    setTimeout(() => actions && actions.classList.add('ready'), 480);
  }

  document.querySelector('.about-body').addEventListener('click', () => { if (!cancelled) finish(); });
  document.addEventListener('keydown', (e) => {
    if ((e.key === ' ' || e.key === 'Enter') && !cancelled) { e.preventDefault(); finish(); }
  });

  run();
})();
</script>
