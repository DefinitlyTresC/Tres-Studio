function renderProjectCards(container, projs) {
  if (!projs.length) {
    container.innerHTML = '<div class="panel-empty">No projects yet.</div>';
    return;
  }
  container.innerHTML = `
    <div class="panel-grid">
      ${projs.map(p => `
        <a class="panel-card" href="project.html?id=${p.slug}" data-hover>
          <div class="panel-card-media">
            <img src="${p.heroUrlThumb || ''}" alt="${p.name}" loading="lazy" decoding="async" onerror="this.style.display='none'" />
          </div>
          <h3 class="panel-card-name">${p.name}</h3>
          <p class="panel-card-info">${[p.location, p.year].filter(Boolean).join(' · ')}</p>
        </a>
      `).join('')}
    </div>`;
}

function renderLabPanel(container) {
  container.innerHTML = `
    <div class="panel-grid panel-grid--lab">
      ${LAB_CARDS.map(c => `
        <a class="panel-card panel-card--lab" href="${c.href}" data-hover>
          <div class="panel-card-media">${c.svg}</div>
          <h3 class="panel-card-name">${c.name}</h3>
          <p class="panel-card-info">${c.info}</p>
        </a>
      `).join('')}
    </div>`;
}

function scrollToLink(link) {
  if (!link) return;
  const rect = link.getBoundingClientRect();
  const targetY = window.scrollY + rect.top - 90;
  if (window.lenis) {
    window.lenis.scrollTo(targetY, { duration: 0.95 });
  } else {
    window.scrollTo({ top: targetY, behavior: 'smooth' });
  }
}

function revealCards(panel) {
  panel.querySelectorAll('.panel-card').forEach((card, i) => {
    card.style.setProperty('--i', i);
    // Two rAFs: first lets the panel start its height transition, the
    // second commits the .in class so the card's transition delay can
    // pick up cleanly from a fresh frame.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => card.classList.add('in'));
    });
  });
}

async function openPanel(panel) {
  // Cancel any pending card-reset timer from a previous close on this
  // same panel — otherwise re-opening within 520ms of closing would
  // strip .in from the cards mid-reveal.
  if (panel._resetTimer) {
    clearTimeout(panel._resetTimer);
    panel._resetTimer = null;
  }

  // Render content BEFORE flipping .open so the panel's natural
  // height resolves to the right size on the first frame of the
  // grid-template-rows transition. Otherwise it'd expand to 0
  // (empty), then snap to full height once cards render — visible
  // pop. getProjectsByCategory is async but memoized after the
  // first call, so this is effectively a microtask delay.
  const cat = panel.dataset.cat;
  if (!panel.dataset.loaded && (cat === 'architecture' || cat === 'personal')) {
    panel.dataset.loaded = '1';
    const projs = await DATA.getProjectsByCategory(cat);
    renderProjectCards(panel.querySelector('.panel-inner'), projs);
  }

  panel.classList.add('open');
  panel.setAttribute('aria-hidden', 'false');
  const link = document.querySelector(`.cat-link[data-cat="${panel.dataset.cat}"]`);
  if (link) {
    link.classList.add('open');
    link.setAttribute('aria-expanded', 'true');
  }

  revealCards(panel);
}

function closePanel(panel) {
  panel.classList.remove('open');
  panel.setAttribute('aria-hidden', 'true');
  const link = document.querySelector(`.cat-link[data-cat="${panel.dataset.cat}"]`);
  if (link) {
    link.classList.remove('open');
    link.setAttribute('aria-expanded', 'false');
  }
  // Reset card states after the height collapse so the next open
  // re-triggers the unroll-reveal from scratch. Stored on the panel
  // so openPanel can cancel it if the user re-opens this panel
  // before the reset fires.
  clearTimeout(panel._resetTimer);
  panel._resetTimer = setTimeout(() => {
    panel.querySelectorAll('.panel-card.in').forEach(c => c.classList.remove('in'));
    panel._resetTimer = null;
  }, 520);
}

function activatePanel(cat) {
  const target = document.querySelector(`.cat-panel[data-cat="${cat}"]`);
  if (!target) return;
  const currentlyOpen = document.querySelector('.cat-panel.open');
  if (currentlyOpen === target) {
    closePanel(target);
    return;
  }
  if (currentlyOpen) closePanel(currentlyOpen);
  openPanel(target);
  scrollToLink(document.querySelector(`.cat-link[data-cat="${cat}"]`));
}

(async () => {
  const projects = await DATA.getProjects();

  // ─── Selected work — curated order ─────────────────────────
  const FEATURED_SLUGS = ['tucker', 'ee13', 'z07', 'drome', 'personalart', 'photography'];
  const featured = FEATURED_SLUGS
    .map(slug => projects.find(p => p.slug === slug))
    .filter(Boolean);
  const listEl = document.getElementById('indexList');
  listEl.innerHTML = '';
  featured.forEach((p, i) => {
    const row = document.createElement('a');
    row.className = 'index-row reveal';
    row.href = `project.html?id=${p.slug}`;
    row.innerHTML = `
      <span class="num">${String(i + 1).padStart(2, '0')}</span>
      <span class="name">${p.name}</span>
      <span class="loc">${p.location || ''}</span>
      <span class="year">${p.year || ''}</span>
      ${p.heroUrlThumb ? `<div class="preview"><img src="${p.heroUrlThumb}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : ''}
    `;
    listEl.appendChild(row);
  });

  // ─── Category accordion ────────────────────────────────────
  const cats = [
    { key: 'architecture', name: 'Architecture', num: '01' },
    { key: 'personal',     name: 'Personal',     num: '02' },
    { key: 'lab',          name: 'Lab',          num: '03' },
  ];
  const catEl = document.getElementById('catList');
  cats.forEach(cat => {
    const projs = projects.filter(p => p.category === cat.key);
    const metaText = cat.key === 'lab' ? 'Experiments' : `${projs.length} projects`;

    // Toggle button (semantically a button — these no longer navigate)
    const link = document.createElement('button');
    link.type = 'button';
    link.className = 'cat-link reveal';
    link.dataset.cat = cat.key;
    link.setAttribute('aria-expanded', 'false');
    link.setAttribute('aria-controls', `panel-${cat.key}`);
    link.innerHTML = `
      <span class="num">${cat.num}</span>
      <span class="label">${cat.name}</span>
      <span class="meta">${metaText}</span>
      <span class="cat-chev" aria-hidden="true"></span>
    `;
    catEl.appendChild(link);

    // Drop-down panel
    const panel = document.createElement('section');
    panel.className = 'cat-panel';
    panel.id = `panel-${cat.key}`;
    panel.dataset.cat = cat.key;
    panel.setAttribute('aria-hidden', 'true');
    panel.innerHTML = `<div class="panel-inner"></div>`;
    catEl.appendChild(panel);

    // Lab is hand-curated — render now so the first open is instant
    if (cat.key === 'lab') {
      renderLabPanel(panel.querySelector('.panel-inner'));
      panel.dataset.loaded = '1';
    }
  });

  // Delegated toggle handler
  catEl.addEventListener('click', e => {
    const link = e.target.closest('.cat-link');
    if (!link) return;
    activatePanel(link.dataset.cat);
  });

  // Keyboard support — arrows move between cat-links, ESC closes
  catEl.addEventListener('keydown', e => {
    const link = e.target.closest('.cat-link');
    if (!link) return;
    const links = Array.from(catEl.querySelectorAll('.cat-link'));
    const idx = links.indexOf(link);
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
      e.preventDefault();
      links[(idx + 1) % links.length].focus();
    } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
      e.preventDefault();
      links[(idx - 1 + links.length) % links.length].focus();
    } else if (e.key === 'Escape') {
      const open = document.querySelector('.cat-panel.open');
      if (open) closePanel(open);
    }
  });
})();
