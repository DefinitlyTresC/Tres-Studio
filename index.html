<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="scroll.js"></script>
<script src="dot.js"></script>
<script src="hammer.js"></script>
<script>
(async () => {
  const projects = await DATA.getProjects();

  // Selected work — curated order. Each slug pulled by name so this
  // list stays the homepage source of truth no matter how the sheet
  // is sorted. Edit this array to reshuffle which projects show up.
  const FEATURED_SLUGS = ['tucker', 'ee13', 'z07', 'drome', 'personalart', 'photography'];
  const featured = FEATURED_SLUGS
    .map(slug => projects.find(p => p.slug === slug))
    .filter(Boolean);
  const listEl = document.getElementById('indexList');
  listEl.innerHTML = '';

  featured.forEach((p, i) => {
    const row = document.createElement('a');
    row.className = 'index-row reveal';
    row.href = `project.html?id=${p.slug}`;
    row.innerHTML = `
      <span class="num">${String(i + 1).padStart(2, '0')}</span>
      <span class="name">${p.name}</span>
      <span class="loc">${p.location || ''}</span>
      <span class="year">${p.year || ''}</span>
      ${p.heroUrlThumb ? `<div class="preview"><img src="${p.heroUrlThumb}" loading="lazy" onerror="this.parentElement.style.display='none'"></div>` : ''}
    `;
    listEl.appendChild(row);
  });

  // Categories
  const cats = [
    { key: 'architecture', name: 'Architecture', num: '01', href: 'category.html?cat=architecture' },
    { key: 'personal',     name: 'Personal',     num: '02', href: 'category.html?cat=personal' },
    { key: 'lab',          name: 'Lab',          num: '03', href: 'lab.html' },
  ];
  const catEl = document.getElementById('catList');
  cats.forEach(cat => {
    const projs = projects.filter(p => p.category === cat.key);
    const link = document.createElement('a');
    link.className = 'cat-link reveal';
    link.href = cat.href;
    link.innerHTML = `
      <span class="num">${cat.num}</span>
      <span class="label">${cat.name}</span>
      <span class="meta">${cat.key === 'lab' ? 'Experiments' : projs.length + ' projects'} →</span>
    `;
    catEl.appendChild(link);
  });
})();
</script>

</body>
